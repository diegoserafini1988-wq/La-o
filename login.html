<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>LAÇO 💘</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#080808;
color:white;

overflow-x:hidden;

}

/* FUNDO */

.bg{

position:fixed;
inset:0;

overflow:hidden;
z-index:-1;

}

.glow{

position:absolute;

border-radius:50%;

filter:blur(100px);

animation:float 10s infinite alternate ease-in-out;

}

.glow1{

width:340px;
height:340px;

background:
rgba(255,107,61,.16);

top:-120px;
left:-100px;

}

.glow2{

width:300px;
height:300px;

background:
rgba(255,140,80,.12);

bottom:-100px;
right:-80px;

animation-delay:2s;

}

@keyframes float{

from{
transform:translateY(0px);
}

to{
transform:translateY(40px);
}

}

/* HERO */

.hero{

padding:70px 26px 20px;

text-align:center;

}

/* LOGO */

.logo{

font-size:48px;
font-weight:800;

color:#FF8A3D;

text-shadow:
0 0 28px rgba(255,138,61,.35);

}

/* SUB */

.sub{

margin-top:14px;

font-size:18px;
line-height:1.7;

color:#d4d4d8;

}

/* PREVIEW */

.preview{

margin-top:42px;

display:flex;
justify-content:center;

}

/* PHONE */

.phone{

width:320px;
height:620px;

border-radius:40px;

padding:12px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 20px 80px rgba(0,0,0,.45);

backdrop-filter:blur(24px);

}

/* TELA */

.screen{

position:relative;

width:100%;
height:100%;

border-radius:30px;

overflow:hidden;

background:#111;

}

/* IMG */

.screen img{

width:100%;
height:100%;

object-fit:cover;

}

/* OVERLAY */

.overlay{

position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,.92) 10%,
rgba(0,0,0,.2) 55%,
transparent 100%
);

display:flex;
flex-direction:column;
justify-content:flex-end;

padding:24px;

}

/* TEXTOS */

.title{

font-size:32px;
font-weight:800;

}

.text{

margin-top:10px;

line-height:1.6;

color:#ddd;

font-size:14px;

}

/* LOGIN */

.login-box{

margin:50px 20px 120px;

padding:24px;

border-radius:30px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);

backdrop-filter:blur(24px);

}

/* INPUT */

.input{

width:100%;
height:60px;

border:none;
outline:none;

padding:0 18px;

border-radius:20px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.05);

color:white;

font-size:15px;

margin-bottom:16px;

}

/* BOTÃO */

.btn{

width:100%;
height:62px;

border:none;

border-radius:22px;

background:
linear-gradient(
135deg,
#FF6B3D,
#FF8A3D
);

color:white;

font-size:16px;
font-weight:700;

cursor:pointer;

box-shadow:
0 0 30px rgba(255,107,61,.25);

transition:.3s;

}

.btn:hover{

transform:scale(1.02);

}

/* FOOT */

.foot{

margin-top:18px;

text-align:center;

font-size:14px;

color:#999;

}

.foot a{

color:#FF8A3D;

text-decoration:none;

font-weight:700;

}

</style>

</head>

<body>

<div class="bg">

<div class="glow glow1"></div>

<div class="glow glow2"></div>

</div>

<!-- HERO -->

<div class="hero">

<div class="logo">
LAÇO 💘
</div>

<div class="sub">

Conexões reais.<br>

Pessoas, energia e lugares na mesma vibe.

</div>

<!-- PREVIEW -->

<div class="preview">

<div class="phone">

<div class="screen">

<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop">

<div class="overlay">

<div class="title">
Entre na vibe.
</div>

<div class="text">

Conheça pessoas com a mesma energia que você.<br><br>

Descubra lugares.<br>
Conecte experiências.<br>
Viva algo raro.

</div>

</div>

</div>

</div>

</div>

</div>

<!-- LOGIN -->

<div class="login-box">

<input
type="email"
id="email"
class="input"
placeholder="Seu e-mail">

<input
type="password"
id="senha"
class="input"
placeholder="Sua senha">

<button
class="btn"
onclick="login()">

Entrar no LAÇO

</button>

<div class="foot">

Não possui conta?

<a href="cadastro.html">

Criar agora

</a>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",

authDomain: "lacoapp.firebaseapp.com",

projectId: "lacoapp",

storageBucket: "lacoapp.firebasestorage.app",

messagingSenderId: "485009455528",

appId: "1:485009455528:web:0c43153be60e62cd6a459d",

measurementId: "G-MSB3J89XLL"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

/* AUTO LOGIN */

onAuthStateChanged(auth,(user)=>{

if(user){

window.location.href =
"app.html";

}

});

/* LOGIN */

window.login = ()=>{

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

signInWithEmailAndPassword(
auth,
email,
senha
)

.then(()=>{

window.location.href =
"app.html";

})

.catch(()=>{

alert("E-mail ou senha inválidos.");

});

};

</script>

</body>
</html>
