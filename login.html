<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Laço 💘</title>

<style>

body{

margin:0;
padding:0;

background:#000;

font-family:Arial;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

color:white;

}

.card{

width:320px;

background:#111;

padding:30px;

border-radius:25px;

border:1px solid #222;

}

h1{

text-align:center;

}

input{

width:100%;

padding:15px;

margin-top:10px;

background:#1a1a1a;

border:none;

border-radius:15px;

color:white;

}

button{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:15px;

background:#ff0066;

color:white;

font-weight:bold;

cursor:pointer;

}

.erro{

margin-top:15px;

color:red;

text-align:center;

}

</style>

</head>

<body>

<div class="card">

<h1>Laço 💘</h1>

<input
type="email"
id="email"
placeholder="Seu email"
>

<input
type="password"
id="senha"
placeholder="Sua senha"
>

<button onclick="login()">
Entrar
</button>

<button onclick="criarConta()">
Criar conta
</button>

<div class="erro" id="erro"></div>

</div>

<script type="module">

import {

auth,

signInWithEmailAndPassword,

createUserWithEmailAndPassword,

onAuthStateChanged

}

from "./firebase.js";

/* VERIFICAR LOGIN */

onAuthStateChanged(auth,(user)=>{

if(user){

window.location.href = "app.html";

}

});

/* LOGIN */

window.login = async function(){

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

try{

await signInWithEmailAndPassword(
auth,
email,
senha
);

window.location.href = "app.html";

}catch(e){

document.getElementById("erro")
.innerHTML =
"Erro ao entrar";

console.log(e);

}

}

/* CRIAR CONTA */

window.criarConta = async function(){

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

try{

await createUserWithEmailAndPassword(
auth,
email,
senha
);

window.location.href = "app.html";

}catch(e){

document.getElementById("erro")
.innerHTML =
"Erro ao criar conta";

console.log(e);

}

}

</script>

</body>
</html>
