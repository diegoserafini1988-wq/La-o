<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Entrar - Laço</title>

<link rel="stylesheet" href="style.css">
</head>

<body class="home">

<div class="card">

<h2>Entrar 💘</h2>

<input type="email" id="email" placeholder="Digite seu email"><br><br>
<input type="password" id="senha" placeholder="Digite sua senha"><br><br>

<button id="loginBtn">Entrar</button>

<br><br>

<a href="cadastro.html">Criar Conta</a>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",
  authDomain: "lacoapp.firebaseapp.com",
  projectId: "lacoapp",
  storageBucket: "lacoapp.firebasestorage.app",
  messagingSenderId: "485009455528",
  appId: "1:485009455528:web:0c43153be60e62cd6a459d",
  measurementId: "G-MSB3J89XLL"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const email = document.getElementById("email");
const senha = document.getElementById("senha");

document.getElementById("loginBtn").addEventListener("click", async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, senha.value);
    alert("Login realizado!");
    window.location.href = "app.html";
  } catch (error) {
    alert("Erro: " + error.message);
  }
});
</script>

</body>
</html>
