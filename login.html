<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Laço 💘</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#080808;
display:flex;
align-items:center;
justify-content:center;
position:relative;
color:white;
}

/* FUNDO CINEMATOGRÁFICO */

.bg{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
background:
radial-gradient(circle at top,#2a0f07 0%,#080808 45%);
}

.glow{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:.45;
animation:float 12s infinite ease-in-out;
}

.glow1{
width:450px;
height:450px;
background:#ff6b3d;
top:-100px;
left:-120px;
}

.glow2{
width:350px;
height:350px;
background:#ff8a3d;
bottom:-120px;
right:-100px;
animation-delay:4s;
}

.glow3{
width:250px;
height:250px;
background:#ff6b3d;
top:40%;
left:55%;
animation-delay:2s;
}

@keyframes float{
0%{
transform:translateY(0px) translateX(0px) scale(1);
}
50%{
transform:translateY(-30px) translateX(20px) scale(1.08);
}
100%{
transform:translateY(0px) translateX(0px) scale(1);
}
}

/* PARTÍCULAS */

.particle{
position:absolute;
width:3px;
height:3px;
background:#ff8a3d;
border-radius:50%;
opacity:.5;
animation:particleMove linear infinite;
}

@keyframes particleMove{
0%{
transform:translateY(0px);
opacity:0;
}
20%{
opacity:.7;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}

/* CARD */

.login-container{
position:relative;
z-index:10;
width:390px;
padding:38px;
border-radius:34px;

background:rgba(255,255,255,0.04);

backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 0 60px rgba(255,107,61,.18),
0 0 120px rgba(255,107,61,.08);

animation:fadeUp 1.2s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0px);
}
}

/* LOGO */

.logo{
text-align:center;
margin-bottom:35px;
}

.logo h1{
font-size:58px;
font-weight:700;
color:#ff7a45;
letter-spacing:-2px;
}

.logo span{
font-size:20px;
letter-spacing:7px;
opacity:.65;
display:block;
margin-top:-8px;
font-weight:300;
}

/* INPUTS */

.input-group{
margin-bottom:20px;
position:relative;
}

.input-group i{
position:absolute;
left:18px;
top:18px;
color:#ff8a3d;
font-size:15px;
}

.input-group input{
width:100%;
padding:18px 18px 18px 50px;

border:none;
outline:none;

border-radius:18px;

background:rgba(255,255,255,0.05);

color:white;
font-size:15px;

transition:.3s;
}

.input-group input:focus{
background:rgba(255,255,255,0.08);

box-shadow:
0 0 0 2px rgba(255,107,61,.3),
0 0 35px rgba(255,107,61,.12);
}

.input-group input::placeholder{
color:rgba(255,255,255,.45);
}

/* BOTÃO */

.login-btn{
width:100%;
padding:18px;
border:none;
border-radius:20px;

background:linear-gradient(
135deg,
#ff6b3d,
#ff8a3d
);

font-size:16px;
font-weight:600;
color:white;
cursor:pointer;

transition:.35s;

box-shadow:
0 0 35px rgba(255,107,61,.35);
}

.login-btn:hover{
transform:translateY(-2px) scale(1.01);

box-shadow:
0 0 45px rgba(255,107,61,.55);
}

/* LINK */

.register{
text-align:center;
margin-top:24px;
font-size:14px;
color:rgba(255,255,255,.6);
}

.register a{
color:#ff8a3d;
text-decoration:none;
font-weight:600;
}

/* RESPONSIVO */

@media(max-width:500px){

.login-container{
width:92%;
padding:30px;
}

.logo h1{
font-size:48px;
}

}

</style>
</head>

<body>

<div class="bg">

<div class="glow glow1"></div>
<div class="glow glow2"></div>
<div class="glow glow3"></div>

</div>

<div id="particles"></div>

<div class="login-container">

<div class="logo">
<h1>Laço</h1>
<span>CONEXÕES QUE AQUECEM</span>
</div>

<div class="input-group">
<i class="fa-solid fa-envelope"></i>
<input
type="email"
id="email"
placeholder="Seu e-mail"
/>
</div>

<div class="input-group">
<i class="fa-solid fa-lock"></i>
<input
type="password"
id="senha"
placeholder="Sua senha"
/>
</div>

<button class="login-btn" onclick="login()">
Entrar
</button>

<div class="register">
Ainda não possui conta?
<a href="cadastro.html">
Criar agora
</a>
</div>

</div>

<script>

/* PARTÍCULAS */

const particlesContainer = document.getElementById('particles');

for(let i=0;i<35;i++){

const particle=document.createElement('div');

particle.classList.add('particle');

particle.style.left=Math.random()*100+'vw';

particle.style.top=Math.random()*100+'vh';

particle.style.animationDuration=
(5+Math.random()*10)+'s';

particle.style.animationDelay=
Math.random()*5+'s';

particlesContainer.appendChild(particle);

}

/* LOGIN */

function login(){

const email =
document.getElementById('email').value;

const senha =
document.getElementById('senha').value;

if(email === "" || senha === ""){

alert("Preencha todos os campos.");

return;

}

/* FUTURO FIREBASE */

window.location.href="app.html";

}

</script>

</body>
</html>
