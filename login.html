<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>LAÇO 💘</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Manrope',sans-serif;
}

body{

background:#080808;
color:white;
overflow-x:hidden;

}

/* FUNDO */

.bg{

position:fixed;
inset:0;
overflow:hidden;
z-index:-1;

}

.glow{

position:absolute;
border-radius:50%;
filter:blur(120px);

animation:float 12s infinite alternate ease-in-out;

}

.glow1{

width:420px;
height:420px;

background:
rgba(255,107,61,.16);

top:-140px;
left:-120px;

}

.glow2{

width:340px;
height:340px;

background:
rgba(255,140,80,.12);

bottom:-120px;
right:-100px;

animation-delay:2s;

}

@keyframes float{

from{
transform:translateY(0px);
}

to{
transform:translateY(50px);
}

}

/* HERO */

.hero{

padding:60px 24px 30px;

text-align:center;

}

.logo{

font-size:56px;
font-weight:800;

color:#FF8A3D;

letter-spacing:-2px;

text-shadow:
0 0 35px rgba(255,138,61,.35);

}

.sub{

margin-top:16px;

font-size:18px;
line-height:1.7;

color:#d4d4d8;

}

/* STACK */

.stack{

position:relative;

width:330px;
height:620px;

margin:50px auto;

}

/* SOMBRAS */

.shadow{

position:absolute;

width:100%;
height:100%;

border-radius:38px;

background:
rgba(255,255,255,.03);

border:
1px solid rgba(255,255,255,.04);

}

.shadow1{

transform:
translateY(14px)
scale(.96);

opacity:.35;

}

.shadow2{

transform:
translateY(28px)
scale(.92);

opacity:.18;

}

/* CARD */

.card{

position:absolute;

width:100%;
height:100%;

overflow:hidden;

border-radius:38px;

background:#111;

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 20px 80px rgba(0,0,0,.45),
0 0 80px rgba(255,107,61,.08);

}

/* IMG */

.card img{

width:100%;
height:100%;

object-fit:cover;

}

/* OVERLAY */

.overlay{

position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,.95) 10%,
rgba(0,0,0,.15) 55%,
transparent 100%
);

display:flex;
flex-direction:column;
justify-content:flex-end;

padding:28px;

}

/* TEXT */

.title{

font-size:36px;
font-weight:800;

}

.desc{

margin-top:12px;

font-size:15px;
line-height:1.7;

color:#ddd;

}

/* MINI VIBE */

.vibe{

margin-top:18px;

display:inline-flex;
align-items:center;
gap:10px;

padding:12px 18px;

border-radius:999px;

background:
rgba(255,255,255,.06);

border:
1px solid rgba(255,255,255,.06);

backdrop-filter:blur(20px);

font-size:13px;
font-weight:700;

color:#FFB089;

width:max-content;

}

/* LOGIN */

.login{

margin:0 20px 120px;

padding:24px;

border-radius:30px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);

backdrop-filter:blur(24px);

}

/* INPUT */

.input{

width:100%;
height:62px;

border:none;
outline:none;

padding:0 20px;

border-radius:22px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.06);

color:white;

font-size:15px;

margin-bottom:16px;

}

/* BTN */

.btn{

width:100%;
height:64px;

border:none;

border-radius:24px;

background:
linear-gradient(
135deg,
#FF6B3D,
#FF8A3D
);

color:white;

font-size:16px;
font-weight:800;

cursor:pointer;

box-shadow:
0 0 30px rgba(255,107,61,.25);

transition:.3s;

}

.btn:hover{

transform:scale(1.02);

}

/* FOOT */

.foot{

margin-top:18px;

text-align:center;

font-size:14px;

color:#999;

}

.foot a{

color:#FF8A3D;

text-decoration:none;

font-weight:700;

}

</style>

</head>

<body>

<div class="bg">

<div class="glow glow1"></div>

<div class="glow glow2"></div>

</div>

<!-- HERO -->

<div class="hero">

<div class="logo">
LAÇO 💘
</div>

<div class="sub">

Pessoas.<br>
Energia.<br>
Lugares na mesma vibe.

</div>

</div>

<!-- STACK -->

<div class="stack">

<div class="shadow shadow2"></div>

<div class="shadow shadow1"></div>

<div class="card">

<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop">

<div class="overlay">

<div class="title">
Entre na vibe.
</div>

<div class="desc">

Conexões reais começam na energia certa.<br><br>

Descubra pessoas e lugares com a mesma frequência que você.

</div>

<div class="vibe">
✨ Vibes ao vivo perto de você
</div>

</div>

</div>

</div>

<!-- LOGIN -->

<div class="login">

<input
type="email"
id="email"
class="input"
placeholder="Seu e-mail">

<input
type="password"
id="senha"
class="input"
placeholder="Sua senha">

<button
class="btn"
onclick="entrar()">

Entrar no LAÇO

</button>

<div class="foot">

Não possui conta?

<a href="cadastro.html">

Criar agora

</a>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",

authDomain: "lacoapp.firebaseapp.com",

projectId: "lacoapp",

storageBucket: "lacoapp.firebasestorage.app",

messagingSenderId: "485009455528",

appId: "1:485009455528:web:0c43153be60e62cd6a459d",

measurementId: "G-MSB3J89XLL"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

window.entrar = ()=>{

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

signInWithEmailAndPassword(
auth,
email,
senha
)

.then(()=>{

window.location.href =
"app.html";

})

.catch(()=>{

alert("E-mail ou senha inválidos.");

});

};

</script>

</body>
</html>
