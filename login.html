<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laço 💘</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top,#ff006633,transparent 40%),
radial-gradient(circle at bottom,#ff4d6d22,transparent 40%);
z-index:-1;
}

.container{
width:100%;
max-width:400px;
padding:30px;
background:#111;
border:1px solid #222;
border-radius:30px;
box-shadow:0 0 40px #ff006620;
animation:fade 0.5s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
text-align:center;
font-size:42px;
margin-bottom:10px;
}

.sub{
text-align:center;
opacity:.7;
margin-bottom:35px;
}

input{
width:100%;
padding:16px;
margin-bottom:15px;
border:none;
border-radius:15px;
background:#1a1a1a;
color:white;
font-size:15px;
outline:none;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff0066,#ff4d6d);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.03);
}

.loading{
margin-top:20px;
text-align:center;
display:none;
opacity:.7;
}

.erro{
margin-top:15px;
color:#ff4d6d;
text-align:center;
display:none;
}

.criar{
margin-top:25px;
text-align:center;
opacity:.8;
}

.criar a{
color:#ff4d6d;
text-decoration:none;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="logo">Laço 💘</div>

<div class="sub">
Conexões que começam no olhar
</div>

<input type="email" id="email" placeholder="Seu email">

<input type="password" id="senha" placeholder="Sua senha">

<button onclick="entrar()">
Entrar
</button>

<div class="loading" id="loading">
Entrando...
</div>

<div class="erro" id="erro"></div>

<div class="criar">
Não possui conta?
<a href="cadastro.html">
Criar conta
</a>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "SUA_APIKEY",
authDomain: "lacoapp.firebaseapp.com",
projectId: "lacoapp",
storageBucket: "lacoapp.appspot.com",
messagingSenderId: "SEU_ID",
appId: "SEU_APP_ID"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

let carregou = false;

onAuthStateChanged(auth, (user)=>{

if(carregou) return;

carregou = true;

if(user){

window.location.href = "app.html";

}

});

window.entrar = async function(){

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

const erro =
document.getElementById("erro");

const loading =
document.getElementById("loading");

erro.style.display = "none";

loading.style.display = "block";

try{

await signInWithEmailAndPassword(
auth,
email,
senha
);

window.location.href = "app.html";

}catch(e){

loading.style.display = "none";

erro.style.display = "block";

erro.innerHTML =
"Email ou senha inválidos";

console.log(e);

}

}

</script>

</body>
</html>
