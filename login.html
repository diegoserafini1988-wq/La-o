<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - Laço</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="home">

<div class="card">

<h2>Entrar no Laço 💘</h2>

<input type="text" id="nome" placeholder="Seu nome">
<br><br>

<input type="email" placeholder="Digite seu email">
<br><br>

<input type="password" placeholder="Digite sua senha">
<br><br>

<button id="loginBtn">Entrar</button>

<br><br>

<button onclick="criarConta()">Criar Conta</button>

<br><br>

<a href="app.html">Entrar sem login</a>
<br>
<a href="index.html">Voltar</a>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",
  authDomain: "lacoapp.firebaseapp.com",
  projectId: "lacoapp",
  storageBucket: "lacoapp.firebasestorage.app",
  messagingSenderId: "485009455528",
  appId: "1:485009455528:web:0c43153be60e62cd6a459d",
  measurementId: "G-MSB3J89XLL"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// CAMPOS
const nome = document.getElementById("nome");
const email = document.querySelector('input[type="email"]');
const senha = document.querySelector('input[type="password"]');
const botao = document.getElementById("loginBtn");

// LOGIN
botao.addEventListener("click", async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, senha.value);
    alert("Login realizado!");
    window.location.href = "app.html";
  } catch (error) {
    alert("Erro no login: " + error.message);
  }
});

// CRIAR CONTA
window.criarConta = async function () {
  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email.value, senha.value);
    const user = userCredential.user;

    await setDoc(doc(db, "usuarios", user.uid), {
      nome: nome.value,
      email: email.value,
      criadoEm: new Date()
    });

    alert("Conta criada com sucesso!");
  } catch (error) {
    alert("Erro: " + error.message);
  }
};
</script>

</body>
</html>
