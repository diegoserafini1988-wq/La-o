<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laço 💘</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* FUNDO PREMIUM */

.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top,#ff006633,transparent 40%),
radial-gradient(circle at bottom,#ff4d6d22,transparent 40%);
z-index:-1;
}

/* CARD */

.card{

width:100%;
max-width:400px;
background:#111;
border:1px solid #222;
border-radius:30px;
padding:35px;
box-shadow:0 0 50px rgba(255,0,102,0.15);

animation:fade .5s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* LOGO */

.logo{
text-align:center;
font-size:45px;
font-weight:bold;
margin-bottom:10px;
}

.sub{
text-align:center;
opacity:.7;
margin-bottom:35px;
}

/* INPUTS */

input{

width:100%;
padding:16px;
margin-bottom:15px;
border:none;
outline:none;
border-radius:15px;
background:#1a1a1a;
color:white;
font-size:15px;

}

/* BOTÃO */

button{

width:100%;
padding:16px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff0066,#ff4d6d);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:scale(1.03);

}

/* TEXTO */

.info{

text-align:center;
margin-top:20px;
opacity:.7;

}

.info a{

color:#ff4d6d;
text-decoration:none;

}

/* LOADING */

.loading{

display:none;
text-align:center;
margin-top:20px;
opacity:.7;

}

/* ERRO */

.erro{

display:none;
margin-top:15px;
text-align:center;
color:#ff4d6d;

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<div class="logo">
Laço 💘
</div>

<div class="sub">
Conexões que começam no olhar
</div>

<input
type="email"
id="email"
placeholder="Seu email"
>

<input
type="password"
id="senha"
placeholder="Sua senha"
>

<button onclick="entrar()">
Entrar
</button>

<div class="loading" id="loading">
Entrando...
</div>

<div class="erro" id="erro"></div>

<div class="info">
Não possui conta?
<a href="cadastro.html">
Criar conta
</a>
</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,
signInWithEmailAndPassword,
onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",

authDomain: "lacoapp.firebaseapp.com",

projectId: "lacoapp",

storageBucket: "lacoapp.firebasestorage.app",

messagingSenderId: "485009455528",

appId: "1:485009455528:web:0c43153be60e62cd6a459d",

measurementId: "G-MSB3J89XLL"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

/* VERIFICAR LOGIN */

onAuthStateChanged(auth,(user)=>{

if(user){

window.location.href = "app.html";

}

});

/* LOGIN */

window.entrar = async function(){

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

const loading =
document.getElementById("loading");

const erro =
document.getElementById("erro");

erro.style.display = "none";

loading.style.display = "block";

try{

await signInWithEmailAndPassword(
auth,
email,
senha
);

window.location.href = "app.html";

}catch(e){

loading.style.display = "none";

erro.style.display = "block";

erro.innerHTML =
"Email ou senha inválidos";

console.log(e);

}

}

</script>

</body>
</html>
