<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laço 💘 Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
radial-gradient(circle at top,#ff006644,transparent 25%),
radial-gradient(circle at bottom,#ff4d6d22,transparent 25%),
#050505;

height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

color:white;

}

/* BG */

.bgGlow{

position:absolute;
width:500px;
height:500px;

background:#ff0066;

filter:blur(180px);

opacity:.18;

border-radius:50%;

top:-150px;
right:-150px;

}

/* CARD */

.loginCard{

width:92%;
max-width:420px;

padding:35px;

border-radius:34px;

background:
rgba(255,255,255,.04);

backdrop-filter:blur(30px);

border:
1px solid rgba(255,255,255,.06);

box-shadow:
0 20px 80px rgba(0,0,0,.5);

position:relative;
z-index:10;

animation:fade .8s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* LOGO */

.logo{

text-align:center;

font-size:52px;
font-weight:800;

margin-bottom:10px;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.sub{

text-align:center;

opacity:.75;

margin-bottom:35px;

font-size:15px;

}

/* INPUT */

.inputBox{

position:relative;
margin-bottom:18px;

}

.inputBox i{

position:absolute;
left:18px;
top:50%;

transform:translateY(-50%);

opacity:.5;

}

.inputBox input{

width:100%;

padding:18px 18px 18px 52px;

border:none;
outline:none;

border-radius:18px;

background:
rgba(255,255,255,.06);

color:white;

font-size:15px;

border:
1px solid transparent;

transition:.3s;

}

.inputBox input:focus{

border:
1px solid rgba(255,0,102,.5);

box-shadow:
0 0 25px rgba(255,0,102,.2);

}

/* BUTTON */

.loginBtn{

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

color:white;

font-size:16px;
font-weight:700;

cursor:pointer;

transition:.3s;

margin-top:8px;

}

.loginBtn:hover{

transform:translateY(-2px);

box-shadow:
0 10px 30px rgba(255,0,102,.3);

}

/* LINK */

.bottom{

text-align:center;

margin-top:25px;

font-size:14px;
opacity:.7;

}

.bottom a{

color:#ff4d8d;

text-decoration:none;
font-weight:600;

}

/* ERROR */

.error{

margin-top:18px;

text-align:center;

color:#ff4d6d;

display:none;

}

/* LOADING */

.loading{

display:none;

text-align:center;

margin-top:20px;

opacity:.7;

}

</style>

</head>

<body>

<div class="bgGlow"></div>

<div class="loginCard">

<div class="logo">
Laço 💘
</div>

<div class="sub">
Conexões reais começam aqui
</div>

<div class="inputBox">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Seu email"
/>

</div>

<div class="inputBox">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="senha"
placeholder="Sua senha"
/>

</div>

<button class="loginBtn" onclick="entrar()">
Entrar
</button>

<div class="loading" id="loading">
Entrando...
</div>

<div class="error" id="error">
Email ou senha inválidos
</div>

<div class="bottom">
Não possui conta?
<a href="cadastro.html">
Criar conta
</a>
</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,
signInWithEmailAndPassword,
onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",

authDomain: "lacoapp.firebaseapp.com",

projectId: "lacoapp",

storageBucket: "lacoapp.firebasestorage.app",

messagingSenderId: "485009455528",

appId: "1:485009455528:web:0c43153be60e62cd6a459d",

measurementId: "G-MSB3J89XLL"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

/* AUTO LOGIN */

onAuthStateChanged(auth,(user)=>{

if(user){

window.location.href =
"app.html";

}

});

/* LOGIN */

window.entrar = async function(){

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

const loading =
document.getElementById("loading");

const error =
document.getElementById("error");

loading.style.display = "block";

error.style.display = "none";

try{

await signInWithEmailAndPassword(
auth,
email,
senha
);

window.location.href =
"app.html";

}catch(e){

loading.style.display = "none";

error.style.display = "block";

console.log(e);

}

}

</script>

</body>
</html>
