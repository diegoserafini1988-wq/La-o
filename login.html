<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laço 💘</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

background:
radial-gradient(circle at top,#ff006655,transparent 30%),
radial-gradient(circle at bottom,#ff4d6d22,transparent 30%),
#050505;

color:white;

}

/* BG */

.bg1{

position:absolute;

width:450px;
height:450px;

background:#ff0066;

filter:blur(160px);

opacity:.15;

top:-150px;
right:-150px;

border-radius:50%;

}

.bg2{

position:absolute;

width:350px;
height:350px;

background:#ff4d6d;

filter:blur(150px);

opacity:.10;

bottom:-120px;
left:-120px;

border-radius:50%;

}

/* CARD */

.card{

width:92%;
max-width:420px;

padding:38px;

border-radius:34px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.06);

backdrop-filter:blur(30px);

box-shadow:
0 25px 80px rgba(0,0,0,.45);

position:relative;
z-index:10;

animation:fade .8s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* LOGO */

.logo{

text-align:center;

font-size:54px;
font-weight:800;

margin-bottom:10px;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.sub{

text-align:center;

opacity:.72;

margin-bottom:35px;

font-size:15px;

}

/* INPUTS */

.inputBox{

position:relative;

margin-bottom:18px;

}

.inputBox i{

position:absolute;

left:18px;
top:50%;

transform:translateY(-50%);

opacity:.45;

}

.inputBox input{

width:100%;

padding:18px 18px 18px 52px;

border:none;
outline:none;

border-radius:18px;

background:
rgba(255,255,255,.06);

color:white;

font-size:15px;

border:
1px solid transparent;

transition:.3s;

}

.inputBox input:focus{

border:
1px solid rgba(255,0,102,.4);

box-shadow:
0 0 20px rgba(255,0,102,.18);

}

/* BUTTON */

button{

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

color:white;

font-size:16px;
font-weight:700;

cursor:pointer;

transition:.3s;

margin-top:8px;

}

button:hover{

transform:translateY(-2px);

box-shadow:
0 12px 35px rgba(255,0,102,.25);

}

/* INFO */

.info{

text-align:center;

margin-top:25px;

opacity:.7;

font-size:14px;

}

.info a{

color:#ff4d8d;

text-decoration:none;

font-weight:600;

}

/* ERROR */

.error{

display:none;

margin-top:18px;

text-align:center;

color:#ff4d6d;

}

/* LOADING */

.loading{

display:none;

margin-top:18px;

text-align:center;

opacity:.7;

}

</style>

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="card">

<div class="logo">
Laço 💘
</div>

<div class="sub">
Conexões reais começam aqui
</div>

<div class="inputBox">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Seu email"
/>

</div>

<div class="inputBox">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="senha"
placeholder="Sua senha"
/>

</div>

<button onclick="entrar()">
Entrar
</button>

<div class="loading" id="loading">
Entrando...
</div>

<div class="error" id="error">
Email ou senha inválidos
</div>

<div class="info">
Não possui conta?
<a href="cadastro.html">
Criar conta
</a>
</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,
signInWithEmailAndPassword

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",

authDomain: "lacoapp.firebaseapp.com",

projectId: "lacoapp",

storageBucket: "lacoapp.firebasestorage.app",

messagingSenderId: "485009455528",

appId: "1:485009455528:web:0c43153be60e62cd6a459d",

measurementId: "G-MSB3J89XLL"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

/* LOGIN */

window.entrar = async function(){

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

const loading =
document.getElementById("loading");

const error =
document.getElementById("error");

loading.style.display = "block";

error.style.display = "none";

try{

await signInWithEmailAndPassword(
auth,
email,
senha
);

window.location.href =
"app.html";

}catch(e){

loading.style.display = "none";

error.style.display = "block";

console.log(e);

}

}

</script>

</body>
</html>
