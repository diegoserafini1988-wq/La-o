<!DOCTYPE html>
<html>
<body style="background:black;color:white;font-family:Segoe UI">

<h2>Seus Matches 💘</h2>

<div id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore,doc,getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = { apiKey:"SUA_API_KEY", projectId:"lacoapp" };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async(user)=>{

const snap = await getDoc(doc(db,"usuarios",user.uid));
const dados = snap.data();

const div = document.getElementById("lista");

(dados.matches||[]).forEach(id=>{
div.innerHTML += `<div onclick="chat('${id}')">💬 Abrir chat</div>`;
});

});

window.chat = function(id){
location.href="chat.html?id="+id;
};

</script>
</body>
</html>
