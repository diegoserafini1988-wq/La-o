<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matches • Laço 💘</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  color:white;
  font-family:Segoe UI;
}

/* FUNDO */

.bg{

  position:fixed;
  inset:0;

  background:
  radial-gradient(circle at top,
  rgba(255,0,90,.15),
  transparent 40%),

  #000;

  z-index:-1;

}

/* TOPO */

.topo{

  padding:25px;

  display:flex;
  justify-content:space-between;
  align-items:center;

}

.logo{

  font-size:30px;
  font-weight:bold;
  color:#ff2d75;

}

.voltar{

  background:#111;

  border:1px solid #222;

  color:white;

  text-decoration:none;

  padding:10px 18px;

  border-radius:30px;

}

/* TITULO */

.titulo{

  padding:0 25px;

  font-size:32px;
  font-weight:bold;

}

/* LISTA */

.lista{

  padding:25px;

  display:flex;
  flex-direction:column;

  gap:18px;

}

/* CARD */

.card{

  background:#090909;

  border:1px solid #1d1d1d;

  border-radius:28px;

  padding:16px;

  display:flex;
  align-items:center;

  gap:18px;

  cursor:pointer;

  transition:.3s;

}

.card:hover{

  transform:translateY(-3px);

  border-color:#ff2d75;

}

/* FOTO */

.card img{

  width:85px;
  height:85px;

  border-radius:50%;

  object-fit:cover;

}

/* INFO */

.info{

  flex:1;

}

.nome{

  font-size:24px;
  font-weight:bold;

}

.bio{

  margin-top:8px;

  opacity:.8;

  line-height:1.4;

}

/* BOTÃO */

.abrir{

  padding:12px 20px;

  border:none;

  border-radius:30px;

  background:#ff2d75;

  color:white;

  cursor:pointer;

  font-size:15px;

}

</style>

</head>

<body>

<div class="bg"></div>

<!-- TOPO -->

<div class="topo">

<div class="logo">
Laço 💘
</div>

<a href="app.html" class="voltar">
Voltar
</a>

</div>

<!-- TITULO -->

<div class="titulo">
Seus Matches 💘
</div>

<!-- LISTA -->

<div class="lista" id="lista">

</div>

<script type="module">

/* FIREBASE */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* CONFIG */

const firebaseConfig = {

  apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",

  authDomain: "lacoapp.firebaseapp.com",

  projectId: "lacoapp",

  storageBucket: "lacoapp.firebasestorage.app",

  messagingSenderId: "485009455528",

  appId: "1:485009455528:web:0c43153be60e62cd6a459d"

};

/* INIT */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);

/* LISTA */

const lista =
document.getElementById("lista");

/* USER */

onAuthStateChanged(auth,
async(user)=>{

  if(!user){

    window.location.href =
    "login.html";

    return;

  }

  const meuDoc =
  await getDoc(
  doc(db,"usuarios",user.uid)
  );

  const meusDados =
  meuDoc.data();

  const matches =
  meusDados.matches || [];

  if(matches.length === 0){

    lista.innerHTML = `
    <h2>
    Nenhum match ainda 😢
    </h2>
    `;

    return;

  }

  for(const id of matches){

    const snap =
    await getDoc(
    doc(db,"usuarios",id)
    );

    const dados =
    snap.data();

    lista.innerHTML += `

    <div
    class="card"
    onclick="abrirChat('${id}')"
    >

      <img src="${dados.foto}">

      <div class="info">

        <div class="nome">
        ${dados.nome}
        </div>

        <div class="bio">
        ${dados.bio || ""}
        </div>

      </div>

      <button class="abrir">
      Conversar
      </button>

    </div>

    `;

  }

});

/* CHAT */

window.abrirChat = function(id){

  window.location.href =
  "bate-papo.html?id=" + id;

};

</script>

</body>
</html>
