<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat • Laço 💘</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#fff;font-family:Segoe UI;display:flex;flex-direction:column;height:100vh}

.topo{padding:14px;border-bottom:1px solid #222;display:flex;justify-content:space-between}
.msgs{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:70%;padding:10px 14px;border-radius:16px}
.me{background:#ff2d75;align-self:flex-end}
.other{background:#111}

.dig{font-size:12px;opacity:.7;padding:6px 14px}

.inputArea{display:flex;border-top:1px solid #222}
input{flex:1;padding:14px;background:#000;border:none;color:#fff}
button{padding:14px;background:#ff2d75;border:none;color:#fff}
</style>
</head>

<body>

<div class="topo">
  <div>Chat</div>
  <a href="app.html">Voltar</a>
</div>

<div class="msgs" id="msgs"></div>
<div class="dig" id="digitando"></div>

<div class="inputArea">
  <input id="msgInput" placeholder="Digite...">
  <button onclick="enviar()">Enviar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,doc,getDoc,setDoc,updateDoc,arrayUnion,onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey:"SUA_API_KEY",
  authDomain:"lacoapp.firebaseapp.com",
  projectId:"lacoapp"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const params = new URLSearchParams(location.search);
const outroId = params.get("id");

let meuId=null;
const msgsDiv = document.getElementById("msgs");
const input = document.getElementById("msgInput");
const dig = document.getElementById("digitando");

const chatId = [outroId].sort().join("_"); // simplificado

onAuthStateChanged(auth, async(user)=>{
  if(!user){ location.href="login.html"; return; }
  meuId = user.uid;

  const ref = doc(db,"chats",chatId);
  await setDoc(ref, { msgs:[], typing:null }, {merge:true});

  onSnapshot(ref, snap=>{
    const d = snap.data()||{};
    msgsDiv.innerHTML="";
    (d.msgs||[]).forEach(m=>{
      msgsDiv.innerHTML += `<div class="msg ${m.de===meuId?'me':'other'}">${m.texto}</div>`;
    });
    msgsDiv.scrollTop = msgsDiv.scrollHeight;

    dig.innerText = d.typing && d.typing!==meuId ? "digitando..." : "";
  });

  input.addEventListener("input", async ()=>{
    await updateDoc(doc(db,"chats",chatId), { typing: meuId });
    setTimeout(()=> updateDoc(doc(db,"chats",chatId), { typing: null }), 1200);
  });
});

window.enviar = async ()=>{
  if(!input.value) return;

  const ref = doc(db,"chats",chatId);
  const snap = await getDoc(ref);
  const dados = snap.data();

  await updateDoc(ref,{
    msgs: arrayUnion({
      de: meuId,
      texto: input.value,
      ts: Date.now()
    }),
    typing: null
  });

  input.value="";
};
</script>

</body>
</html>
