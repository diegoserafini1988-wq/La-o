<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quem te curtiu • Laço 💘</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:white;
  font-family:Segoe UI;
}

/* TOPO */

.topo{
  padding:25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:30px;
  color:#ff2d75;
}

.voltar{
  background:#111;
  padding:10px 18px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  border:1px solid #222;
}

/* LISTA */

.lista{
  padding:25px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* CARD */

.card{
  display:flex;
  gap:18px;
  align-items:center;
  background:#090909;
  border:1px solid #1d1d1d;
  border-radius:25px;
  padding:15px;
}

.card img{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
}

.nome{
  font-size:20px;
  font-weight:bold;
}

</style>

</head>

<body>

<div class="topo">
<div class="logo">Laço 💘</div>
<a href="app.html" class="voltar">Voltar</a>
</div>

<div class="lista" id="lista"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",
  authDomain: "lacoapp.firebaseapp.com",
  projectId: "lacoapp",
  storageBucket: "lacoapp.firebasestorage.app",
  messagingSenderId: "485009455528",
  appId: "1:485009455528:web:0c43153be60e62cd6a459d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const lista = document.getElementById("lista");

onAuthStateChanged(auth, async (user)=>{

  if(!user){
    window.location.href="login.html";
    return;
  }

  const meuDoc = await getDoc(doc(db,"usuarios",user.uid));
  const dados = meuDoc.data();

  const likes = dados.likesRecebidos || [];

  if(likes.length === 0){
    lista.innerHTML = "<h2>Ninguém curtiu você ainda 😢</h2>";
    return;
  }

  for(const id of likes){

    const snap = await getDoc(doc(db,"usuarios",id));
    const u = snap.data();

    lista.innerHTML += `
      <div class="card">
        <img src="${u.foto}">
        <div class="nome">${u.nome}</div>
      </div>
    `;
  }

});

</script>

</body>
</html>
