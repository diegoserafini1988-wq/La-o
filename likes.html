<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quem te curtiu • Laço 💘</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:white;
  font-family:Segoe UI;
}

/* TOPO */

.topo{
  padding:25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:30px;
  color:#ff2d75;
}

.voltar{
  background:#111;
  padding:10px 18px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  border:1px solid #222;
}

/* TITULO */

.titulo{
  padding:0 25px;
  font-size:28px;
  margin-bottom:10px;
}

/* LISTA */

.lista{
  padding:25px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* CARD */

.card{
  display:flex;
  gap:18px;
  align-items:center;
  background:#090909;
  border:1px solid #1d1d1d;
  border-radius:25px;
  padding:15px;
  position:relative;
  overflow:hidden;
}

/* FOTO */

.card img{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
}

/* BLUR */

.blur{
  filter:blur(10px);
}

/* INFO */

.nome{
  font-size:20px;
  font-weight:bold;
}

/* BLOQUEIO */

.lock{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* BOTÃO PREMIUM */

.btn-premium{
  margin-top:10px;
  padding:12px 22px;
  border:none;
  border-radius:30px;
  background:#ff2d75;
  color:white;
  cursor:pointer;
  font-size:14px;
}

</style>

</head>

<body>

<div class="topo">
<div class="logo">Laço 💘</div>
<a href="app.html" class="voltar">Voltar</a>
</div>

<div class="titulo">
🔥 Pessoas que curtiram você
</div>

<div class="lista" id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",
  authDomain: "lacoapp.firebaseapp.com",
  projectId: "lacoapp",
  storageBucket: "lacoapp.firebasestorage.app",
  messagingSenderId: "485009455528",
  appId: "1:485009455528:web:0c43153be60e62cd6a459d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const lista = document.getElementById("lista");

/* MODO (simulação premium) */
let premium = false;

/* BOTÃO FAKE DE COMPRA */
window.ativarPremium = async function(userId){
  await updateDoc(doc(db,"usuarios",userId), {
    premium:true
  });
  location.reload();
};

onAuthStateChanged(auth, async (user)=>{

  if(!user){
    window.location.href="login.html";
    return;
  }

  const meuDoc = await getDoc(doc(db,"usuarios",user.uid));
  const dados = meuDoc.data();

  premium = dados.premium || false;

  const likes = dados.likesRecebidos || [];

  if(likes.length === 0){
    lista.innerHTML = "<h2>Ninguém curtiu você ainda 😢</h2>";
    return;
  }

  for(const id of likes){

    const snap = await getDoc(doc(db,"usuarios",id));
    const u = snap.data();

    lista.innerHTML += `
      <div class="card">

        <img class="${premium ? '' : 'blur'}" src="${u.foto}">

        <div class="nome">
          ${premium ? u.nome : '???'}
        </div>

        ${
          !premium ? `
          <div class="lock">
            <div>🔥 Alguém te curtiu</div>
            <button class="btn-premium"
            onclick="ativarPremium('${user.uid}')">
            Desbloquear Premium
            </button>
          </div>
          ` : ''
        }

      </div>
    `;
  }

});

</script>

</body>
</html>
