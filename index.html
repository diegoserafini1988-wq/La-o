<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Laço 💘</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff4d6d, #6a00f4);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  max-width: 350px;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

p {
  opacity: 0.9;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border-radius: 30px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.login {
  background: white;
  color: #ff4d6d;
}

.cadastro {
  background: transparent;
  border: 2px solid white;
  color: white;
}
</style>
</head>

<body>

<div class="container">

<h1>Laço 💘</h1>
<p>Conexões com propósito</p>

<button class="login" onclick="irLogin()">Entrar</button>
<button class="cadastro" onclick="irCadastro()">Criar Conta</button>

</div>

<script>
function irLogin() {
  window.location.href = "login.html";
}

function irCadastro() {
  window.location.href = "cadastro.html";
}
</script>

</body>
</html>
