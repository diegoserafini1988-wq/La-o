<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Laço 💘</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Laço 💘</h1>
  <button onclick="login()">Entrar</button>
</header>

<main>
  <div class="card" id="card">
    <img src="https://via.placeholder.com/300" id="photo">
    <h2 id="name">Nome, 25</h2>
    <p id="bio">Conexões com propósito.</p>
  </div>

  <div class="actions">
    <button onclick="dislike()">❌</button>
    <button onclick="like()">❤️</button>
  </div>
</main>

<script src="main.js"></script>
</body>
</html>
