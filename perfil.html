<!DOCTYPE html>
<html>
<body style="background:black;color:white;font-family:Segoe UI">

<h2>Seu Perfil 👤</h2>

<input id="nome" placeholder="Nome">
<input id="foto" placeholder="URL da foto">
<input id="bio" placeholder="Bio">

<button onclick="salvar()">Salvar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore,doc,getDoc,updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const app = initializeApp({apiKey:"SUA_API_KEY",projectId:"lacoapp"});
const db = getFirestore(app);
const auth = getAuth(app);

let meuId;

onAuthStateChanged(auth, async(user)=>{

meuId = user.uid;

const snap = await getDoc(doc(db,"usuarios",meuId));
const d = snap.data();

nome.value = d.nome;
foto.value = d.foto;
bio.value = d.bio;

});

window.salvar = async function(){

await updateDoc(doc(db,"usuarios",meuId),{
nome:nome.value,
foto:foto.value,
bio:bio.value
});

alert("Salvo");

};

</script>
</body>
</html>
