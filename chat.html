<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Laço • Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#080808;
color:white;

height:100vh;

display:flex;
flex-direction:column;

overflow:hidden;

}

/* FUNDO */

.bg{

position:fixed;
inset:0;

overflow:hidden;

z-index:-1;

}

.glow{

position:absolute;

border-radius:50%;

filter:blur(100px);

animation:float 8s infinite alternate ease-in-out;

}

.glow1{

width:320px;
height:320px;

background:
rgba(255,107,61,.16);

top:-100px;
left:-80px;

}

.glow2{

width:280px;
height:280px;

background:
rgba(255,140,80,.12);

bottom:-80px;
right:-80px;

animation-delay:2s;

}

@keyframes float{

from{
transform:translateY(0px);
}

to{
transform:translateY(40px);
}

}

/* HEADER */

.header{

height:84px;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 22px;

border-bottom:
1px solid rgba(255,255,255,.05);

background:
rgba(10,10,10,.75);

backdrop-filter:blur(24px);

}

/* USER */

.user{

display:flex;
align-items:center;
gap:14px;

}

.avatar{

position:relative;

width:54px;
height:54px;

}

.avatar img{

width:100%;
height:100%;

border-radius:18px;

object-fit:cover;

}

.online{

position:absolute;

bottom:2px;
right:2px;

width:14px;
height:14px;

border-radius:50%;

background:#4dff91;

border:2px solid #111;

}

/* INFO */

.name{

font-size:18px;
font-weight:700;

}

.status{

margin-top:4px;

font-size:12px;

color:#999;

}

/* CALL */

.call{

width:48px;
height:48px;

border-radius:18px;

display:flex;
justify-content:center;
align-items:center;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.05);

font-size:18px;

}

/* CHAT */

.chat{

flex:1;

padding:24px 18px 120px;

overflow-y:auto;

display:flex;
flex-direction:column;
gap:18px;

}

/* MESSAGE */

.msg{

max-width:78%;

padding:16px 18px;

border-radius:24px;

line-height:1.6;

font-size:14px;

animation:fade .25s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(8px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* RECEIVED */

.received{

align-self:flex-start;

background:
rgba(255,255,255,.06);

border:
1px solid rgba(255,255,255,.05);

color:#fff;

}

/* SENT */

.sent{

align-self:flex-end;

background:
linear-gradient(
135deg,
#FF6B3D,
#FF8A3D
);

box-shadow:
0 0 24px rgba(255,107,61,.18);

}

/* INPUT */

.input-area{

position:fixed;
bottom:0;
left:0;

width:100%;

padding:18px;

display:flex;
gap:14px;

background:
rgba(10,10,10,.82);

backdrop-filter:blur(24px);

border-top:
1px solid rgba(255,255,255,.05);

}

/* INPUT BOX */

.input{

flex:1;

height:58px;

border:none;

outline:none;

padding:0 20px;

border-radius:22px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.06);

color:white;

font-size:14px;

}

/* SEND */

.send{

width:58px;
height:58px;

border:none;

border-radius:20px;

background:
linear-gradient(
135deg,
#FF6B3D,
#FF8A3D
);

color:white;

font-size:20px;

cursor:pointer;

box-shadow:
0 0 24px rgba(255,107,61,.25);

}

</style>

</head>

<body>

<div class="bg">

<div class="glow glow1"></div>

<div class="glow glow2"></div>

</div>

<!-- HEADER -->

<div class="header">

<div class="user">

<div class="avatar">

<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=400&auto=format&fit=crop">

<div class="online"></div>

</div>

<div>

<div class="name">
Aurora
</div>

<div class="status">
online agora
</div>

</div>

</div>

<div class="call">
📞
</div>

</div>

<!-- CHAT -->

<div class="chat" id="chat">

<div class="msg received">
Você também sentiu essa conexão?
</div>

<div class="msg sent">
Talvez seja raro encontrar alguém na mesma vibe.
</div>

<div class="msg received">
Então talvez isso fique interessante...
</div>

</div>

<!-- INPUT -->

<div class="input-area">

<input
type="text"
class="input"
id="mensagem"
placeholder="Digite algo interessante...">

<button
class="send"
onclick="enviar()">

➤

</button>

</div>

<script>

function enviar(){

const input =
document.getElementById("mensagem");

const chat =
document.getElementById("chat");

if(input.value.trim() === "") return;

const div =
document.createElement("div");

div.className = "msg sent";

div.innerText = input.value;

chat.appendChild(div);

input.value = "";

chat.scrollTop =
chat.scrollHeight;

setTimeout(()=>{

const resposta =
document.createElement("div");

resposta.className =
"msg received";

resposta.innerText =
"Estou gostando da sua energia.";

chat.appendChild(resposta);

chat.scrollTop =
chat.scrollHeight;

},1200);

}

</script>

</body>
</html>
