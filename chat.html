<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat • Laço 💘</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  color:white;
  font-family:Segoe UI;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* FUNDO */

.bg{

  position:fixed;
  inset:0;

  background:
  radial-gradient(circle at top,
  rgba(255,0,90,.15),
  transparent 40%),

  #000;

  z-index:-1;

}

/* TOPO */

.topo{

  padding:20px;

  display:flex;
  align-items:center;
  gap:15px;

  border-bottom:1px solid #181818;

  background:#090909;

}

.topo img{

  width:55px;
  height:55px;

  border-radius:50%;

  object-fit:cover;

}

.nome{

  font-size:22px;
  font-weight:bold;

}

/* MENSAGENS */

.mensagens{

  flex:1;

  overflow-y:auto;

  padding:20px;

  display:flex;
  flex-direction:column;

  gap:15px;

}

/* MSG */

.msg{

  max-width:75%;

  padding:14px 18px;

  border-radius:22px;

  line-height:1.5;

  font-size:15px;

}

.eu{

  align-self:flex-end;

  background:#ff2d75;

}

.outro{

  align-self:flex-start;

  background:#161616;

  border:1px solid #222;

}

/* INPUT */

.area{

  padding:20px;

  display:flex;
  gap:12px;

  border-top:1px solid #181818;

  background:#090909;

}

input{

  flex:1;

  padding:16px;

  border:none;
  outline:none;

  border-radius:30px;

  background:#121212;

  color:white;

}

button{

  padding:0 28px;

  border:none;

  border-radius:30px;

  background:#ff2d75;

  color:white;

  cursor:pointer;

  font-size:16px;

}

</style>

</head>

<body>

<div class="bg"></div>

<!-- TOPO -->

<div class="topo">

<img id="foto">

<div class="nome" id="nome">
Carregando...
</div>

</div>

<!-- MENSAGENS -->

<div class="mensagens" id="mensagens">

</div>

<!-- INPUT -->

<div class="area">

<input
type="text"
id="texto"
placeholder="Digite sua mensagem">

<button onclick="enviar()">
Enviar
</button>

</div>

<script type="module">

/* FIREBASE */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
collection,
addDoc,
query,
orderBy,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* CONFIG */

const firebaseConfig = {

  apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",

  authDomain: "lacoapp.firebaseapp.com",

  projectId: "lacoapp",

  storageBucket: "lacoapp.firebasestorage.app",

  messagingSenderId: "485009455528",

  appId: "1:485009455528:web:0c43153be60e62cd6a459d"

};

/* INIT */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);

/* ELEMENTOS */

const mensagens =
document.getElementById("mensagens");

const texto =
document.getElementById("texto");

const nome =
document.getElementById("nome");

const foto =
document.getElementById("foto");

/* URL */

const params =
new URLSearchParams(
window.location.search
);

const matchId =
params.get("id");

/* CHAT ID */

let chatId = null;

let meuId = null;

/* USER */

onAuthStateChanged(auth,
async(user)=>{

  if(!user){

    window.location.href =
    "login.html";

    return;

  }

  meuId = user.uid;

  /* CHAT ID */

  chatId =
  [meuId,matchId]
  .sort()
  .join("_");

  /* PEGAR MATCH */

  const snap =
  await getDoc(
  doc(db,"usuarios",matchId)
  );

  const dados =
  snap.data();

  nome.innerText =
  dados.nome;

  foto.src =
  dados.foto;

  carregarMensagens();

});

/* CARREGAR */

function carregarMensagens(){

  const q =
  query(
  collection(db,"chats",chatId,"mensagens"),
  orderBy("criadoEm")
  );

  onSnapshot(q,(snapshot)=>{

    mensagens.innerHTML = "";

    snapshot.forEach(doc=>{

      const dados =
      doc.data();

      mensagens.innerHTML += `

      <div class="
      msg
      ${dados.userId === meuId ? 'eu' : 'outro'}
      ">

      ${dados.texto}

      </div>

      `;

    });

    mensagens.scrollTop =
    mensagens.scrollHeight;

  });

}

/* ENVIAR */

window.enviar = async function(){

  if(!texto.value) return;

  await addDoc(
  collection(db,"chats",chatId,"mensagens"),
  {

    texto:texto.value,

    userId:meuId,

    criadoEm:Date.now()

  });

  texto.value = "";

};

</script>

</body>
</html>
