<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laço 💘</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#050505;
overflow:hidden;
height:100vh;
color:white;
}

/* FUNDO CINEMATOGRÁFICO */

.background{
position:fixed;
inset:0;
overflow:hidden;
background:
radial-gradient(circle at top left,#2b120b 0%,#050505 38%),
radial-gradient(circle at bottom right,#1a0d09 0%,#050505 45%);
}

/* BRASAS */

.ember{
position:absolute;
border-radius:50%;
filter:blur(120px);
opacity:.18;
mix-blend-mode:screen;
animation:emberFloat 18s infinite ease-in-out;
}

.ember1{
width:500px;
height:500px;
background:#ff6b3d;
top:-140px;
left:-140px;
}

.ember2{
width:380px;
height:380px;
background:#ff8a3d;
bottom:-100px;
right:-120px;
animation-delay:5s;
}

.ember3{
width:260px;
height:260px;
background:#ff6b3d;
top:40%;
left:55%;
animation-delay:9s;
}

@keyframes emberFloat{

0%{
transform:translate(0,0) scale(1);
}

50%{
transform:translate(20px,-40px) scale(1.12);
}

100%{
transform:translate(0,0) scale(1);
}

}

/* PARTÍCULAS */

.particle{
position:absolute;
background:#ff8a3d;
border-radius:50%;
opacity:.25;
animation:particle infinite linear;
}

@keyframes particle{

0%{
transform:translateY(0px);
opacity:0;
}

15%{
opacity:.5;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* APP */

.app{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:22px;
}

/* TOPO */

.topbar{
position:absolute;
top:26px;
left:24px;
right:24px;

display:flex;
justify-content:space-between;
align-items:center;

z-index:100;
}

.brand{
display:flex;
flex-direction:column;
}

.brand h1{
font-size:38px;
font-weight:700;
letter-spacing:-2px;

background:
linear-gradient(
135deg,
#ffd3bf,
#ff6b3d
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.brand span{
font-size:11px;
letter-spacing:4px;
opacity:.45;
margin-top:-4px;
}

.top-actions{
display:flex;
gap:12px;
}

.icon-btn{
width:52px;
height:52px;

border-radius:18px;

background:rgba(255,255,255,.045);

border:1px solid rgba(255,255,255,.05);

backdrop-filter:blur(30px);

display:flex;
justify-content:center;
align-items:center;

font-size:17px;

color:white;

box-shadow:
0 0 25px rgba(255,107,61,.06);
}

/* CARD HERO */

.hero-card{
position:relative;

width:100%;
max-width:390px;
height:78vh;

border-radius:42px;

overflow:hidden;

background:#111;

box-shadow:
0 0 100px rgba(255,107,61,.10),
0 40px 120px rgba(0,0,0,.8);

transform-style:preserve-3d;

transition:
transform .25s ease;
}

/* FOTO */

.hero-card img{
position:absolute;
inset:0;

width:100%;
height:100%;
object-fit:cover;
}

/* CAMADAS */

.overlay{
position:absolute;
inset:0;

background:
linear-gradient(
180deg,
rgba(0,0,0,.0) 18%,
rgba(0,0,0,.2) 45%,
rgba(0,0,0,.92) 100%
);
}

.glass{
position:absolute;
inset:0;

background:
linear-gradient(
180deg,
rgba(255,255,255,.04),
rgba(255,255,255,.01)
);

backdrop-filter:blur(.4px);
}

/* INFO */

.info{
position:absolute;
left:28px;
right:28px;
bottom:28px;
z-index:10;
}

/* VERIFIED */

.verified{
display:inline-flex;
align-items:center;
gap:8px;

padding:10px 16px;

border-radius:18px;

background:rgba(0,0,0,.35);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(20px);

font-size:13px;

margin-bottom:18px;
}

.verified i{
color:#ffb089;
}

/* NOME */

.name{
font-size:54px;
font-weight:700;
line-height:.95;
letter-spacing:-3px;
}

.age{
font-size:32px;
font-weight:500;
color:#ff9b73;
}

/* LOCAL */

.location{
margin-top:14px;

display:flex;
align-items:center;
gap:8px;

font-size:14px;

opacity:.72;
}

/* BIO */

.bio{
margin-top:18px;

line-height:1.7;

font-size:14px;

opacity:.88;
}

/* TAGS */

.tags{
display:flex;
flex-wrap:wrap;
gap:10px;

margin-top:22px;
}

.tag{
padding:11px 16px;

border-radius:18px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.05);

backdrop-filter:blur(20px);

font-size:13px;
}

/* ACTIONS */

.actions{
position:absolute;
bottom:118px;

display:flex;
align-items:center;
gap:22px;

z-index:50;
}

/* BOTÕES */

.action{
border:none;
cursor:pointer;

display:flex;
justify-content:center;
align-items:center;

transition:.25s;
}

.action:hover{
transform:scale(1.06);
}

/* CLOSE */

.close{
width:78px;
height:78px;

border-radius:50%;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.05);

backdrop-filter:blur(20px);

font-size:30px;

color:#ff8f8f;
}

/* LIKE */

.like{
width:100px;
height:100px;

border-radius:50%;

background:
linear-gradient(
135deg,
#ff6b3d,
#ff9a52
);

font-size:40px;
color:white;

box-shadow:
0 0 40px rgba(255,107,61,.35),
0 0 100px rgba(255,107,61,.15);
}

/* NAVBAR */

.navbar{
position:absolute;

bottom:20px;
left:18px;
right:18px;

height:82px;

border-radius:30px;

background:rgba(255,255,255,.045);

border:1px solid rgba(255,255,255,.05);

backdrop-filter:blur(30px);

display:flex;
justify-content:space-around;
align-items:center;

z-index:100;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:7px;

font-size:12px;

opacity:.45;
}

.nav-item.active{
opacity:1;
color:#ff9b73;
}

.nav-item i{
font-size:21px;
}

/* MATCH */

.match{
position:fixed;
inset:0;

background:rgba(0,0,0,.85);

backdrop-filter:blur(30px);

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

z-index:999;

opacity:0;
pointer-events:none;

transition:.5s;
}

.match.show{
opacity:1;
pointer-events:auto;
}

.match h1{
font-size:72px;

background:
linear-gradient(
135deg,
#ffd8c8,
#ff6b3d
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.match p{
margin-top:10px;
opacity:.7;
}

/* RESPONSIVO */

@media(max-width:500px){

.hero-card{
height:76vh;
}

.name{
font-size:44px;
}

.like{
width:88px;
height:88px;
}

.close{
width:70px;
height:70px;
}

}

</style>
</head>

<body>

<!-- FUNDO -->

<div class="background">

<div class="ember ember1"></div>
<div class="ember ember2"></div>
<div class="ember ember3"></div>

<div id="particles"></div>

</div>

<!-- APP -->

<div class="app">

<!-- TOPO -->

<div class="topbar">

<div class="brand">
<h1>Laço</h1>
<span>BRASA VIVA</span>
</div>

<div class="top-actions">

<div class="icon-btn">
<i class="fa-regular fa-bell"></i>
</div>

<div class="icon-btn">
<i class="fa-solid fa-sliders"></i>
</div>

</div>

</div>

<!-- CARD -->

<div class="hero-card" id="card">

<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop"/>

<div class="overlay"></div>

<div class="glass"></div>

<div class="info">

<div class="verified">
<i class="fa-solid fa-circle-check"></i>
Verificada
</div>

<div>
<span class="name">Aurora</span>
<span class="age">26</span>
</div>

<div class="location">
<i class="fa-solid fa-location-dot"></i>
São Paulo • 2km
</div>

<div class="bio">
Conexões reais, cafés demorados e pessoas que sabem sentir.
</div>

<div class="tags">

<div class="tag">Cinema</div>

<div class="tag">Música</div>

<div class="tag">Viagens</div>

<div class="tag">Arte</div>

</div>

</div>

</div>

<!-- AÇÕES -->

<div class="actions">

<button class="action close" onclick="dislike()">
<i class="fa-solid fa-xmark"></i>
</button>

<button class="action like" onclick="like()">
<i class="fa-solid fa-heart"></i>
</button>

</div>

<!-- NAVBAR -->

<div class="navbar">

<div class="nav-item active">
<i class="fa-solid fa-fire"></i>
<span>Explorar</span>
</div>

<div class="nav-item">
<i class="fa-regular fa-heart"></i>
<span>Likes</span>
</div>

<div class="nav-item">
<i class="fa-regular fa-comments"></i>
<span>Chat</span>
</div>

<div class="nav-item">
<i class="fa-solid fa-location-dot"></i>
<span>Vibe</span>
</div>

<div class="nav-item">
<i class="fa-regular fa-user"></i>
<span>Perfil</span>
</div>

</div>

</div>

<!-- MATCH -->

<div class="match" id="match">

<h1>Match</h1>

<p>Vocês sentiram a mesma energia.</p>

</div>

<script>

/* PARTÍCULAS */

const particles =
document.getElementById('particles');

for(let i=0;i<35;i++){

const p=document.createElement('div');

p.classList.add('particle');

const size=Math.random()*3+1;

p.style.width=size+'px';
p.style.height=size+'px';

p.style.left=Math.random()*100+'vw';
p.style.top=Math.random()*100+'vh';

p.style.animationDuration=
(10+Math.random()*10)+'s';

p.style.animationDelay=
Math.random()*5+'s';

particles.appendChild(p);

}

/* EFEITO 3D */

const card =
document.getElementById('card');

document.addEventListener('mousemove',(e)=>{

const x=
(window.innerWidth/2-e.clientX)/35;

const y=
(window.innerHeight/2-e.clientY)/35;

card.style.transform=
`rotateY(${x}deg) rotateX(${-y}deg)`;

});

/* MATCH */

function like(){

card.style.transition='.45s';

card.style.transform=
'translateX(450px) rotate(20deg)';

setTimeout(()=>{

document
.getElementById('match')
.classList.add('show');

},300);

}

/* DISLIKE */

function dislike(){

card.style.transition='.45s';

card.style.transform=
'translateX(-450px) rotate(-20deg)';

}

</script>

</body>
</html>
