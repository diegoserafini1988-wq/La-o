<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laço 💘</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#080808;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* FUNDO CINEMATOGRÁFICO */

.bg{
position:fixed;
inset:0;
overflow:hidden;
background:
radial-gradient(circle at top,#1f0b06 0%,#080808 50%);
z-index:-10;
}

.ember{
position:absolute;
border-radius:50%;
filter:blur(100px);
opacity:.22;
mix-blend-mode:screen;
animation:float 16s infinite ease-in-out;
}

.ember1{
width:500px;
height:500px;
background:#ff6b3d;
top:-140px;
left:-160px;
}

.ember2{
width:400px;
height:400px;
background:#ff8a3d;
bottom:-140px;
right:-140px;
animation-delay:4s;
}

.ember3{
width:300px;
height:300px;
background:#ff6b3d;
top:40%;
left:50%;
animation-delay:8s;
}

@keyframes float{
0%{
transform:translate(0,0) scale(1);
}
50%{
transform:translate(20px,-35px) scale(1.1);
}
100%{
transform:translate(0,0) scale(1);
}
}

/* PARTÍCULAS */

.particle{
position:absolute;
background:#ff8a3d;
border-radius:50%;
opacity:.3;
animation:particle linear infinite;
}

@keyframes particle{
0%{
transform:translateY(0px);
opacity:0;
}
20%{
opacity:.7;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

/* APP */

.app{
width:100%;
max-width:430px;
height:100vh;
position:relative;
overflow:hidden;
}

/* TOPO */

.topbar{
position:absolute;
top:0;
left:0;
width:100%;
padding:24px 22px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:50;
}

.logo{
font-size:42px;
font-weight:700;
letter-spacing:-2px;
background:linear-gradient(135deg,#ffb089,#ff6b3d);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.top-actions{
display:flex;
gap:12px;
}

.top-btn{
width:52px;
height:52px;
border-radius:18px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.06);

display:flex;
justify-content:center;
align-items:center;

backdrop-filter:blur(20px);

font-size:18px;

color:white;

box-shadow:
0 0 25px rgba(255,107,61,.08);
}

/* CARD ÁREA */

.cards{
position:absolute;
top:110px;
left:0;
width:100%;
height:calc(100vh - 240px);

display:flex;
justify-content:center;
align-items:center;
}

/* CARD */

.card{
position:absolute;

width:88%;
height:100%;

border-radius:42px;

overflow:hidden;

background:#111;

box-shadow:
0 0 80px rgba(255,107,61,.15),
0 30px 80px rgba(0,0,0,.65);

user-select:none;

transition:
transform .35s ease,
opacity .35s ease;

cursor:grab;
}

.card::before{
content:"";

position:absolute;
inset:0;

background:
linear-gradient(
180deg,
rgba(0,0,0,.0) 20%,
rgba(0,0,0,.15) 40%,
rgba(0,0,0,.92) 100%
);

z-index:2;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* GLASS */

.card-glass{
position:absolute;
inset:0;

background:
linear-gradient(
180deg,
rgba(255,255,255,.04),
rgba(255,255,255,.01)
);

z-index:1;
}

/* INFO */

.info{
position:absolute;
bottom:30px;
left:28px;
right:28px;
z-index:5;
}

.verified{
display:inline-flex;
align-items:center;
gap:8px;

padding:10px 16px;

background:rgba(0,0,0,.35);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

font-size:13px;

backdrop-filter:blur(20px);

margin-bottom:18px;
}

.name{
font-size:52px;
font-weight:700;
line-height:1;
letter-spacing:-3px;
}

.age{
font-size:36px;
font-weight:500;
color:#ff8a3d;
}

.location{
margin-top:12px;
font-size:15px;
opacity:.85;
display:flex;
align-items:center;
gap:8px;
}

.bio{
margin-top:16px;
line-height:1.7;
font-size:15px;
opacity:.88;
}

/* TAGS */

.tags{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:22px;
}

.tag{
padding:12px 18px;

background:rgba(0,0,0,.35);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

backdrop-filter:blur(20px);

font-size:14px;
}

/* ACTIONS */

.actions{
position:absolute;
bottom:115px;
width:100%;
display:flex;
justify-content:center;
gap:24px;
z-index:100;
}

.action{
border:none;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:.3s;
}

.close-btn{
width:88px;
height:88px;

border-radius:50%;

background:rgba(255,255,255,.06);

backdrop-filter:blur(20px);

font-size:34px;
color:#ff7f7f;

border:1px solid rgba(255,255,255,.05);
}

.like-btn{
width:108px;
height:108px;

border-radius:50%;

background:
linear-gradient(
135deg,
#ff6b3d,
#ff8a3d
);

font-size:42px;
color:white;

box-shadow:
0 0 45px rgba(255,107,61,.45),
0 0 90px rgba(255,107,61,.22);
}

.action:hover{
transform:scale(1.06);
}

/* NAVBAR */

.nav{
position:absolute;
bottom:18px;
left:16px;
right:16px;

height:82px;

border-radius:30px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.06);

backdrop-filter:blur(20px);

display:flex;
justify-content:space-around;
align-items:center;

z-index:200;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:7px;

font-size:13px;

opacity:.55;
}

.nav-item.active{
opacity:1;
color:#ff8a3d;
}

.nav-item i{
font-size:22px;
}

/* MATCH */

.match{
position:absolute;
inset:0;

background:rgba(0,0,0,.82);

backdrop-filter:blur(20px);

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

z-index:500;

opacity:0;
pointer-events:none;

transition:.5s;
}

.match.show{
opacity:1;
pointer-events:auto;
}

.match h1{
font-size:68px;
margin-bottom:12px;

background:linear-gradient(
135deg,
#ffb089,
#ff6b3d
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.match p{
opacity:.75;
font-size:17px;
}

/* RESPONSIVO */

@media(max-width:500px){

.name{
font-size:42px;
}

.age{
font-size:28px;
}

.like-btn{
width:92px;
height:92px;
}

.close-btn{
width:76px;
height:76px;
}

}

</style>
</head>

<body>

<div class="bg">

<div class="ember ember1"></div>
<div class="ember ember2"></div>
<div class="ember ember3"></div>

<div id="particles"></div>

</div>

<div class="app">

<!-- TOPO -->

<div class="topbar">

<div class="logo">
Laço
</div>

<div class="top-actions">

<div class="top-btn">
<i class="fa-regular fa-bell"></i>
</div>

<div class="top-btn">
<i class="fa-solid fa-sliders"></i>
</div>

</div>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card" id="card">

<div class="card-glass"></div>

<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop">

<div class="info">

<div class="verified">
<i class="fa-solid fa-badge-check"></i>
Verificada
</div>

<div>
<span class="name">Marina</span>
<span class="age">25</span>
</div>

<div class="location">
<i class="fa-solid fa-location-dot"></i>
São Paulo, SP • 3km de você
</div>

<div class="bio">
Apaixonada por momentos simples, música boa e conversas que ficam.
</div>

<div class="tags">

<div class="tag">
✈️ Viagens
</div>

<div class="tag">
🎵 Música
</div>

<div class="tag">
☕ Café
</div>

<div class="tag">
🌊 Praia
</div>

</div>

</div>

</div>

</div>

<!-- BOTÕES -->

<div class="actions">

<button class="action close-btn" onclick="swipeLeft()">
<i class="fa-solid fa-xmark"></i>
</button>

<button class="action like-btn" onclick="swipeRight()">
<i class="fa-solid fa-heart"></i>
</button>

</div>

<!-- NAV -->

<div class="nav">

<div class="nav-item active">
<i class="fa-solid fa-fire"></i>
<span>Explorar</span>
</div>

<div class="nav-item">
<i class="fa-regular fa-heart"></i>
<span>Likes</span>
</div>

<div class="nav-item">
<i class="fa-regular fa-comments"></i>
<span>Chat</span>
</div>

<div class="nav-item">
<i class="fa-solid fa-location-dot"></i>
<span>Vibes</span>
</div>

<div class="nav-item">
<i class="fa-regular fa-user"></i>
<span>Perfil</span>
</div>

</div>

<!-- MATCH -->

<div class="match" id="match">

<h1>Match 💘</h1>

<p>Vocês combinaram energia.</p>

</div>

</div>

<script>

/* PARTÍCULAS */

const particles =
document.getElementById('particles');

for(let i=0;i<40;i++){

const p=document.createElement('div');

p.classList.add('particle');

const size=Math.random()*4+1;

p.style.width=size+'px';
p.style.height=size+'px';

p.style.left=Math.random()*100+'vw';
p.style.top=Math.random()*100+'vh';

p.style.animationDuration=
(8+Math.random()*12)+'s';

p.style.animationDelay=
Math.random()*5+'s';

particles.appendChild(p);

}

/* SWIPE */

const card =
document.getElementById('card');

let startX=0;
let currentX=0;
let isDragging=false;

card.addEventListener('mousedown',startDrag);
card.addEventListener('touchstart',startDrag);

function startDrag(e){

isDragging=true;

startX=
e.type.includes('mouse')
? e.clientX
: e.touches[0].clientX;

document.addEventListener('mousemove',drag);
document.addEventListener('touchmove',drag);

document.addEventListener('mouseup',endDrag);
document.addEventListener('touchend',endDrag);

}

function drag(e){

if(!isDragging) return;

currentX=
e.type.includes('mouse')
? e.clientX
: e.touches[0].clientX;

const moveX=currentX-startX;

card.style.transform=
`
translateX(${moveX}px)
rotate(${moveX/12}deg)
`;

}

function endDrag(){

isDragging=false;

const moveX=currentX-startX;

if(moveX > 120){

swipeRight();

}
else if(moveX < -120){

swipeLeft();

}
else{

card.style.transform='';

}

document.removeEventListener('mousemove',drag);
document.removeEventListener('touchmove',drag);

}

/* LIKE */

function swipeRight(){

card.style.transition='.45s';

card.style.transform=
'translateX(500px) rotate(25deg)';

showMatch();

}

/* DISLIKE */

function swipeLeft(){

card.style.transition='.45s';

card.style.transform=
'translateX(-500px) rotate(-25deg)';

}

/* MATCH */

function showMatch(){

const match =
document.getElementById('match');

setTimeout(()=>{

match.classList.add('show');

},400);

}

</script>

</body>
</html>
