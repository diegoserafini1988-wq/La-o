<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Laço 💘</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
radial-gradient(circle at top,#ff006644,transparent 30%),
linear-gradient(to bottom,#050505,#0d0d0d);

height:100vh;
overflow:hidden;
color:white;

display:flex;
justify-content:center;
align-items:center;

}

/* APP */

.app{

width:100%;
max-width:430px;
height:100vh;

position:relative;
overflow:hidden;

background:rgba(255,255,255,0.03);

backdrop-filter:blur(20px);

border-left:1px solid rgba(255,255,255,0.05);
border-right:1px solid rgba(255,255,255,0.05);

}

/* HEADER */

.header{

position:absolute;
top:0;
left:0;

width:100%;
padding:20px;

display:flex;
justify-content:space-between;
align-items:center;

z-index:20;

background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent);

}

.logo{

font-size:34px;
font-weight:700;

background:linear-gradient(45deg,#ff0066,#ff4d8d);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.header-icons{

display:flex;
gap:12px;

}

.icon-btn{

width:45px;
height:45px;

border-radius:50%;

background:rgba(255,255,255,0.08);

display:flex;
justify-content:center;
align-items:center;

backdrop-filter:blur(20px);

font-size:18px;

cursor:pointer;

transition:.3s;

}

.icon-btn:hover{

transform:scale(1.08);

background:rgba(255,255,255,0.14);

}

/* STACK */

.cards{

position:absolute;
top:90px;
left:0;

width:100%;
height:calc(100vh - 190px);

display:flex;
justify-content:center;
align-items:center;

}

/* CARD */

.card{

position:absolute;

width:92%;
height:78%;

border-radius:35px;

overflow:hidden;

background:#111;

box-shadow:
0 30px 80px rgba(0,0,0,.55),
0 0 50px rgba(255,0,102,.2);

cursor:grab;

user-select:none;

transition:
transform .25s ease,
opacity .25s ease;

}

.card img{

width:100%;
height:100%;
object-fit:cover;

}

/* OVERLAY */

.overlay{

position:absolute;
bottom:0;
left:0;

width:100%;
padding:28px;

background:linear-gradient(to top,#000 5%,transparent);

}

/* INFO */

.name{

font-size:36px;
font-weight:700;

margin-bottom:8px;

}

.bio{

font-size:15px;
opacity:.92;

line-height:1.5;

margin-bottom:18px;

}

/* TAGS */

.tags{

display:flex;
gap:10px;
flex-wrap:wrap;

}

.tag{

padding:10px 16px;

border-radius:999px;

background:rgba(255,255,255,.1);

backdrop-filter:blur(10px);

font-size:13px;

}

/* ACTIONS */

.actions{

position:absolute;
bottom:110px;
left:50%;

transform:translateX(-50%);

display:flex;
gap:24px;

z-index:30;

}

.action{

width:75px;
height:75px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:30px;

cursor:pointer;

transition:.25s;

backdrop-filter:blur(20px);

}

.dislike{

background:rgba(255,255,255,.08);

color:#ff4d6d;

}

.like{

background:linear-gradient(45deg,#ff0066,#ff4d8d);

box-shadow:
0 0 40px rgba(255,0,102,.5);

}

.action:hover{

transform:scale(1.12);

}

/* NAV */

.nav{

position:absolute;
bottom:0;
left:0;

width:100%;
height:85px;

display:flex;
justify-content:space-around;
align-items:center;

background:rgba(0,0,0,.55);

backdrop-filter:blur(25px);

border-top:1px solid rgba(255,255,255,.06);

z-index:40;

}

.nav-item{

display:flex;
flex-direction:column;
align-items:center;

gap:6px;

font-size:12px;
opacity:.6;

cursor:pointer;

transition:.25s;

}

.nav-item.active{

opacity:1;
color:#ff4d8d;

}

.nav-item i{

font-size:20px;

}

/* LIKE EFFECT */

.like-effect{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%) scale(.5);

font-size:120px;

opacity:0;

pointer-events:none;

z-index:999;

}

.show-like{

animation:likeAnim .8s ease;

}

@keyframes likeAnim{

0%{
opacity:0;
transform:translate(-50%,-50%) scale(.3);
}

40%{
opacity:1;
transform:translate(-50%,-50%) scale(1.2);
}

100%{
opacity:0;
transform:translate(-50%,-50%) scale(1.8);
}

}

</style>

</head>

<body>

<div class="app">

<!-- HEADER -->

<div class="header">

<div class="logo">
Laço
</div>

<div class="header-icons">

<div class="icon-btn">
<i class="fa-solid fa-magnifying-glass"></i>
</div>

<div class="icon-btn">
<i class="fa-solid fa-bell"></i>
</div>

</div>

</div>

<!-- CARDS -->

<div class="cards" id="cards">

</div>

<!-- ACTIONS -->

<div class="actions">

<div class="action dislike" onclick="swipeLeft()">
<i class="fa-solid fa-xmark"></i>
</div>

<div class="action like" onclick="swipeRight()">
<i class="fa-solid fa-heart"></i>
</div>

</div>

<!-- NAV -->

<div class="nav">

<div class="nav-item active">
<i class="fa-solid fa-house"></i>
<span>Início</span>
</div>

<div class="nav-item">
<i class="fa-solid fa-fire"></i>
<span>Likes</span>
</div>

<div class="nav-item">
<i class="fa-solid fa-comments"></i>
<span>Chat</span>
</div>

<div class="nav-item">
<i class="fa-solid fa-location-dot"></i>
<span>Vibe</span>
</div>

<div class="nav-item">
<i class="fa-solid fa-user"></i>
<span>Perfil</span>
</div>

</div>

<!-- EFFECT -->

<div class="like-effect" id="likeEffect">
💘
</div>

</div>

<script>

const perfis = [

{
nome:"Amanda",
idade:24,
bio:"Apaixonada por viagens, vinho e conexões reais.",
foto:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200",
tags:["Viagens","Música","Vinho"]
},

{
nome:"Beatriz",
idade:26,
bio:"Fotógrafa, intensa e amante de cafés escondidos.",
foto:"https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?q=80&w=1200",
tags:["Arte","Café","Fotografia"]
},

{
nome:"Larissa",
idade:23,
bio:"Viciada em praia, academia e adrenalina.",
foto:"https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200",
tags:["Praia","Fitness","Aventura"]
}

];

const cardsContainer =
document.getElementById("cards");

let current = 0;

/* CREATE CARD */

function createCard(perfil){

const card =
document.createElement("div");

card.className = "card";

card.innerHTML = `

<img src="${perfil.foto}">

<div class="overlay">

<div class="name">
${perfil.nome}, ${perfil.idade}
</div>

<div class="bio">
${perfil.bio}
</div>

<div class="tags">

${perfil.tags.map(tag=>`
<div class="tag">${tag}</div>
`).join("")}

</div>

</div>

`;

cardsContainer.appendChild(card);

drag(card);

}

/* LOAD */

function loadCards(){

cardsContainer.innerHTML = "";

if(current >= perfis.length){

current = 0;

}

createCard(perfis[current]);

}

/* SWIPE RIGHT */

function swipeRight(){

likeAnimation();

nextCard();

}

/* SWIPE LEFT */

function swipeLeft(){

nextCard();

}

/* NEXT */

function nextCard(){

current++;

loadCards();

}

/* LIKE EFFECT */

function likeAnimation(){

const effect =
document.getElementById("likeEffect");

effect.classList.add("show-like");

setTimeout(()=>{

effect.classList.remove("show-like");

},800);

}

/* DRAG */

function drag(card){

let startX = 0;
let currentX = 0;
let isDragging = false;

card.addEventListener("mousedown",start);
card.addEventListener("touchstart",start);

function start(e){

isDragging = true;

startX =
e.type.includes("mouse")
? e.clientX
: e.touches[0].clientX;

document.addEventListener("mousemove",move);
document.addEventListener("touchmove",move);

document.addEventListener("mouseup",end);
document.addEventListener("touchend",end);

}

function move(e){

if(!isDragging) return;

currentX =
e.type.includes("mouse")
? e.clientX
: e.touches[0].clientX;

const diff =
currentX - startX;

card.style.transform =
`translateX(${diff}px) rotate(${diff/12}deg)`;

}

function end(){

isDragging = false;

const diff =
currentX - startX;

if(diff > 120){

swipeRight();

}

else if(diff < -120){

swipeLeft();

}

else{

card.style.transform = "";

}

}

}

/* START */

loadCards();

</script>

</body>
</html>
