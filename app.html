<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LAÇO 💘</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#080808;
overflow:hidden;
color:#fff;

}

/* FUNDO CINEMATOGRÁFICO */

.bg{

position:fixed;
inset:0;
overflow:hidden;
z-index:-1;

}

.glow{

position:absolute;
border-radius:50%;
filter:blur(90px);
animation:float 10s infinite alternate ease-in-out;

}

.glow1{

width:320px;
height:320px;

background:rgba(255,107,61,.18);

top:-60px;
left:-80px;

}

.glow2{

width:300px;
height:300px;

background:rgba(255,140,80,.12);

bottom:-80px;
right:-60px;

animation-delay:2s;

}

@keyframes float{

from{

transform:translateY(0px) translateX(0px);

}

to{

transform:translateY(40px) translateX(20px);

}

}

/* HEADER */

header{

padding:22px;

display:flex;
justify-content:space-between;
align-items:center;

}

.logo{

font-size:34px;
font-weight:800;

color:#FF8A3D;

letter-spacing:1px;

text-shadow:0 0 28px rgba(255,138,61,.35);

}

.premium{

padding:10px 18px;

border-radius:999px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.06);

backdrop-filter:blur(20px);

font-size:13px;
font-weight:600;

}

/* CONTAINER */

.container{

height:calc(100vh - 150px);

display:flex;
justify-content:center;
align-items:center;

padding:20px;

}

/* STACK */

.stack{

position:relative;
width:360px;
height:620px;

}

/* SOMBRAS DAS CARTAS */

.shadow-card{

position:absolute;
width:100%;
height:100%;
border-radius:34px;

background:rgba(255,255,255,.03);

border:1px solid rgba(255,255,255,.04);

}

.shadow1{

transform:translateY(12px) scale(.96);

opacity:.4;

}

.shadow2{

transform:translateY(24px) scale(.92);

opacity:.2;

}

/* CARD */

.card{

position:absolute;

width:100%;
height:100%;

border-radius:34px;

overflow:hidden;

background:#111;

border:1px solid rgba(255,255,255,.05);

box-shadow:
0 20px 80px rgba(0,0,0,.45),
0 0 60px rgba(255,107,61,.08);

transition:.3s ease;

}

.card img{

width:100%;
height:100%;
object-fit:cover;

}

.overlay{

position:absolute;
inset:0;

background:linear-gradient(
to top,
rgba(0,0,0,.92) 10%,
rgba(0,0,0,.2) 55%,
transparent 100%
);

display:flex;
flex-direction:column;
justify-content:flex-end;

padding:28px;

}

.nome{

font-size:34px;
font-weight:800;

margin-bottom:8px;

}

.bio{

font-size:15px;
line-height:1.5;

color:#ddd;

}

/* BOTÕES */

.actions{

position:absolute;
bottom:105px;

width:100%;

display:flex;
justify-content:center;
gap:22px;

}

.btn{

width:78px;
height:78px;

border-radius:50%;

border:none;

font-size:28px;

cursor:pointer;

transition:.3s ease;

backdrop-filter:blur(20px);

}

.nope{

background:rgba(255,255,255,.08);
color:#fff;

}

.like{

background:#FF8A3D;
color:#fff;

box-shadow:0 0 28px rgba(255,138,61,.45);

}

.btn:hover{

transform:scale(1.08);

}

/* NAVBAR */

.bottom-nav{

position:fixed;
bottom:0;
left:0;

width:100%;
height:84px;

display:flex;
justify-content:space-around;
align-items:center;

background:rgba(10,10,10,.78);

backdrop-filter:blur(24px);

border-top:1px solid rgba(255,255,255,.06);

}

.nav-item{

display:flex;
flex-direction:column;
align-items:center;
gap:4px;

text-decoration:none;

font-size:12px;
font-weight:600;

color:#9ca3af;

transition:.3s;

}

.nav-item div{

font-size:22px;

}

.nav-item.active{

color:#FF8A3D;

text-shadow:0 0 20px rgba(255,138,61,.45);

}

.nav-item:hover{

transform:translateY(-2px);

color:#fff;

}

</style>
</head>
<body>

<div class="bg">

<div class="glow glow1"></div>

<div class="glow glow2"></div>

</div>

<header>

<div class="logo">LAÇO 💘</div>

<div class="premium">BRASA VIVA</div>

</header>

<div class="container">

<div class="stack">

<div class="shadow-card shadow2"></div>

<div class="shadow-card shadow1"></div>

<div class="card">

<img id="foto" src="">

<div class="overlay">

<div class="nome" id="nome"></div>

<div class="bio" id="bio"></div>

</div>

</div>

</div>

</div>

<div class="actions">

<button class="btn nope" onclick="proximo()">✕</button>

<button class="btn like" onclick="match()">💘</button>

</div>

<div class="bottom-nav">

<a href="app.html" class="nav-item active">
<div>🔥</div>
<span>Descobrir</span>
</a>

<a href="matches.html" class="nav-item">
<div>💘</div>
<span>Matches</span>
</a>

<a href="chat.html" class="nav-item">
<div>💬</div>
<span>Chat</span>
</a>

<a href="vibe.html" class="nav-item">
<div>✨</div>
<span>Vibe</span>
</a>

<a href="perfil.html" class="nav-item">
<div>👤</div>
<span>Perfil</span>
</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",
  authDomain: "lacoapp.firebaseapp.com",
  projectId: "lacoapp",
  storageBucket: "lacoapp.firebasestorage.app",
  messagingSenderId: "485009455528",
  appId: "1:485009455528:web:0c43153be60e62cd6a459d",
  measurementId: "G-MSB3J89XLL"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href="login.html";

}

});

const perfis = [

{
nome:"Aurora, 26",
bio:"Conexões reais começam na energia certa.",
foto:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Valentina, 24",
bio:"A madrugada sempre aproxima quem vibra igual.",
foto:"https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Emma, 28",
bio:"Química rara. Presença inesquecível.",
foto:"https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Olivia, 25",
bio:"O olhar certo muda tudo.",
foto:"https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200&auto=format&fit=crop"
}

];

let atual = 0;

const foto = document.getElementById("foto");
const nome = document.getElementById("nome");
const bio = document.getElementById("bio");

function carregar(){

if(atual >= perfis.length){

atual = 0;

}

foto.src = perfis[atual].foto;
nome.innerText = perfis[atual].nome;
bio.innerText = perfis[atual].bio;

}

window.proximo = ()=>{

atual++;

carregar();

};

window.match = ()=>{

alert("💘 Novo Match!");

atual++;

carregar();

};

carregar();

</script>

</body>
</html>
