<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Laço 💘</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #000;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #000;
  border-bottom: 1px solid #111;
}

.logo {
  color: #ff4d6d;
  font-size: 20px;
  font-weight: bold;
}

/* CARD */
.container {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

.card {
  width: 320px;
  height: 500px;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 10px 40px rgba(0,0,0,0.8);
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* INFO */
.overlay {
  position: absolute;
  bottom: 0;
  padding: 20px;
  width: 100%;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
}

.nome {
  font-size: 22px;
  font-weight: bold;
}

/* BOTÕES */
.actions {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 15px;
}

.btn {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  border: none;
  font-size: 26px;
  cursor: pointer;
  background: #111;
  color: white;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.1);
}

.like {
  color: #00ff88;
}

.nope {
  color: #ff4d4d;
}

/* MATCH */
.match {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.95);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
  text-align:center;
}
</style>

</head>

<body>

<div class="header">
  <div class="logo">Laço 💘</div>
  <div onclick="irMatches()">💬</div>
</div>

<div class="container">
  <div class="card">
    <img id="foto">
    <div class="overlay">
      <div class="nome" id="nome"></div>
      <div id="idade"></div>
    </div>
  </div>
</div>

<div class="actions">
  <button class="btn nope" onclick="pular()">❌</button>
  <button class="btn like" onclick="curtir()">❤️</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, getDoc, arrayUnion } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "lacoapp.firebaseapp.com",
  projectId: "lacoapp"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let usuarios = [];
let index = 0;
let usuarioId = null;

// CARREGAR
async function carregarUsuarios() {
  const snap = await getDocs(collection(db, "usuarios"));

  usuarios = snap.docs
    .map(doc => ({ id: doc.id, ...doc.data() }))
    .filter(u => u.id !== usuarioId);

  mostrar();
}

// MOSTRAR
function mostrar() {
  if (index >= usuarios.length) {
    document.getElementById("nome").innerText = "Sem mais perfis";
    return;
  }

  const u = usuarios[index];

  document.getElementById("foto").src = u.foto || "https://via.placeholder.com/300";
  document.getElementById("nome").innerText = u.nome || "Sem nome";
  document.getElementById("idade").innerText = u.idade || "";
}

// CURTIR
window.curtir = async function() {
  const user = usuarios[index];

  await updateDoc(doc(db, "usuarios", usuarioId), {
    likes: arrayUnion(user.id)
  });

  const outroSnap = await getDoc(doc(db, "usuarios", user.id));
  const outro = outroSnap.data();

  if (outro.likes && outro.likes.includes(usuarioId)) {

    await updateDoc(doc(db, "usuarios", usuarioId), {
      matches: arrayUnion(user.id)
    });

    await updateDoc(doc(db, "usuarios", user.id), {
      matches: arrayUnion(usuarioId)
    });

    mostrarMatch(user.nome);
  }

  proximo();
};

// PULAR
window.pular = function() {
  proximo();
};

// PROXIMO
function proximo() {
  index++;
  mostrar();
}

// MATCH
function mostrarMatch(nome) {
  const div = document.createElement("div");
  div.className = "match";

  div.innerHTML = `
    <h1>💘 MATCH!</h1>
    <p>Você e ${nome} se curtiram</p>
    <button onclick="this.parentElement.remove()" style="
      padding:15px;
      border:none;
      border-radius:20px;
      background:#ff4d6d;
      color:white;
      margin-top:20px;
    ">
      Continuar
    </button>
  `;

  document.body.appendChild(div);
}

// NAV
window.irMatches = function() {
  window.location.href = "matches.html";
};

// LOGIN
onAuthStateChanged(auth, (user) => {
  if (user) {
    usuarioId = user.uid;
    carregarUsuarios();
  } else {
    window.location.href = "login.html";
  }
});
</script>

</body>
</html>
