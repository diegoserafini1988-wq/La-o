<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Laço 💘</title>

<style>

/* RESET */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  font-family:Segoe UI;
  color:white;
  overflow:hidden;
}

/* FUNDO */

.bg{

  position:fixed;
  inset:0;

  background:
  radial-gradient(circle at top,
  rgba(255,0,90,.18),
  transparent 40%),

  radial-gradient(circle at bottom,
  rgba(255,0,120,.12),
  transparent 35%),

  #000;

  z-index:-1;

}

/* TOPO */

.topo{

  width:100%;
  padding:20px;

  display:flex;
  justify-content:space-between;
  align-items:center;

}

.logo{

  font-size:32px;
  font-weight:bold;
  color:#ff2d75;

}

/* ICONES */

.top-icons{

  display:flex;
  gap:14px;

}

.icon{

  width:48px;
  height:48px;

  border-radius:50%;

  background:#111;

  border:1px solid #222;

  display:flex;
  justify-content:center;
  align-items:center;

  cursor:pointer;

  transition:.3s;

  font-size:20px;

}

.icon:hover{

  transform:scale(1.08);

  background:#181818;

}

/* AREA */

.area{

  width:100%;
  height:calc(100vh - 90px);

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;

}

/* CARD */

.card{

  width:370px;
  max-width:95%;

  height:670px;

  background:#090909;

  border-radius:35px;

  overflow:hidden;

  position:relative;

  border:1px solid #1d1d1d;

  box-shadow:
  0 0 45px rgba(255,0,90,.18);

  transition:.3s;

}

/* FOTO */

.card img{

  width:100%;
  height:100%;

  object-fit:cover;

}

/* OVERLAY */

.overlay{

  position:absolute;
  bottom:0;

  width:100%;

  padding:30px;

  background:
  linear-gradient(
  transparent,
  rgba(0,0,0,.96)
  );

}

/* INFO */

.nome{

  font-size:34px;
  font-weight:bold;

}

.idade{

  opacity:.8;

  margin-top:5px;

}

.bio{

  margin-top:14px;

  line-height:1.5;

  opacity:.92;

}

/* INTERESSES */

.tags{

  display:flex;
  flex-wrap:wrap;
  gap:10px;

  margin-top:18px;

}

.tag{

  padding:8px 14px;

  border-radius:30px;

  background:#141414;

  border:1px solid #222;

  font-size:13px;

}

/* AÇÕES */

.actions{

  position:absolute;
  bottom:20px;

  width:100%;

  display:flex;
  justify-content:center;
  gap:25px;

}

.btn{

  width:78px;
  height:78px;

  border:none;
  border-radius:50%;

  cursor:pointer;

  font-size:30px;

  transition:.25s;

}

.nope{

  background:#1a1a1a;

  color:#ff4d6d;

}

.like{

  background:#ff2d75;

  color:white;

}

.btn:hover{

  transform:scale(1.08);

}

/* MATCH */

.match{

  position:fixed;
  inset:0;

  background:rgba(0,0,0,.94);

  display:none;

  justify-content:center;
  align-items:center;
  flex-direction:column;

  z-index:999;

}

.match h1{

  color:#ff2d75;

  font-size:60px;

}

.match p{

  margin-top:15px;

  font-size:22px;

}

.match button{

  margin-top:30px;

  padding:16px 40px;

  border:none;
  border-radius:40px;

  background:#ff2d75;

  color:white;

  cursor:pointer;

  font-size:17px;

}

/* MOBILE */

@media(max-width:600px){

  .card{

    height:78vh;

  }

  .nome{

    font-size:28px;

  }

}

</style>

</head>

<body>

<div class="bg"></div>

<!-- TOPO -->

<div class="topo">

<div class="logo">
Laço 💘
</div>

<div class="top-icons">

<div class="icon">
🔥
</div>

<div class="icon">
💬
</div>

<div class="icon">
⭐
</div>

<div
class="icon"
onclick="window.location.href='perfil.html'">
👤
</div>

</div>

</div>

<!-- AREA -->

<div class="area">

<div class="card" id="card">

<img id="foto">

<div class="overlay">

<div class="nome" id="nome">
Carregando...
</div>

<div class="idade" id="idade"></div>

<div class="bio" id="bio"></div>

<div class="tags" id="tags"></div>

</div>

<div class="actions">

<button
class="btn nope"
onclick="passar()">
✖
</button>

<button
class="btn like"
onclick="curtir()">
❤
</button>

</div>

</div>

</div>

<!-- MATCH -->

<div class="match" id="match">

<h1>
💘 MATCH
</h1>

<p>
Vocês se curtiram
</p>

<button onclick="fecharMatch()">
Continuar
</button>

</div>

<script type="module">

/* FIREBASE */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* CONFIG */

const firebaseConfig = {

  apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",

  authDomain: "lacoapp.firebaseapp.com",

  projectId: "lacoapp",

  storageBucket: "lacoapp.firebasestorage.app",

  messagingSenderId: "485009455528",

  appId: "1:485009455528:web:0c43153be60e62cd6a459d"

};

/* INICIAR */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);

/* ELEMENTOS */

const foto =
document.getElementById("foto");

const nome =
document.getElementById("nome");

const idade =
document.getElementById("idade");

const bio =
document.getElementById("bio");

const tags =
document.getElementById("tags");

const card =
document.getElementById("card");

/* LISTA */

let usuarios = [];

let index = 0;

/* PEGAR USERS */

onAuthStateChanged(auth,
async(user)=>{

  if(!user){

    window.location.href =
    "login.html";

    return;

  }

  const querySnapshot =
  await getDocs(
  collection(db, "usuarios")
  );

  usuarios =
  querySnapshot.docs.map(doc => doc.data());

  mostrar();

});

/* MOSTRAR */

function mostrar(){

  if(usuarios.length === 0){

    nome.innerText =
    "Nenhum usuário";

    return;

  }

  const user =
  usuarios[index];

  foto.src =
  user.foto || "";

  nome.innerText =
  user.nome || "Sem nome";

  idade.innerText =
  (user.idade || "?")
  + " anos • "
  + (user.cidade || "");

  bio.innerText =
  user.bio || "";

  /* TAGS */

  tags.innerHTML = "";

  if(user.interesses){

    user.interesses.forEach(item=>{

      tags.innerHTML += `
      <div class="tag">
      ${item}
      </div>
      `;

    });

  }

}

/* PASSAR */

window.passar = function(){

  card.style.transform =
  "translateX(-400px) rotate(-20deg)";

  setTimeout(()=>{

    proximo();

  },300);

};

/* CURTIR */

window.curtir = function(){

  card.style.transform =
  "translateX(400px) rotate(20deg)";

  setTimeout(()=>{

    document
    .getElementById("match")
    .style.display = "flex";

    proximo();

  },300);

};

/* PROXIMO */

function proximo(){

  index++;

  if(index >= usuarios.length){

    index = 0;

  }

  mostrar();

  card.style.transition =
  ".3s";

  card.style.transform =
  "translateX(0px) rotate(0deg)";

}

/* FECHAR MATCH */

window.fecharMatch = function(){

  document
  .getElementById("match")
  .style.display = "none";

};

</script>

</body>
</html>
