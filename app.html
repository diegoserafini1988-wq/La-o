<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laço 💘</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
font-family:Segoe UI;
color:white;
overflow:hidden;
}

/* TOPO */

.topo{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

.logo{
font-size:28px;
color:#ff2d75;
}

/* ICONES */

.icons{
display:flex;
gap:12px;
position:relative;
}

.icon{
width:45px;
height:45px;
border-radius:50%;
background:#111;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
position:relative;
}

/* BADGE */

.badge{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:12px;
padding:3px 7px;
border-radius:50%;
}

/* AREA */

.area{
height:calc(100vh - 80px);
display:flex;
justify-content:center;
align-items:center;
}

/* CARD */

.card{
width:360px;
height:640px;
border-radius:30px;
overflow:hidden;
position:relative;
background:#000;
box-shadow:0 0 50px rgba(255,0,90,.25);
transition:.3s;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* INFO */

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:20px;
background:linear-gradient(transparent,black);
}

.nome{
font-size:28px;
font-weight:bold;
}

.bio{
margin-top:8px;
opacity:.9;
}

/* BOTÕES */

.actions{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
}

.btn{
width:70px;
height:70px;
border-radius:50%;
border:none;
cursor:pointer;
font-size:24px;
}

.nope{
background:#1a1a1a;
color:#ff4d6d;
}

.like{
background:#ff2d75;
color:white;
}

/* NOTIFICAÇÃO */

.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:12px 20px;
border-radius:30px;
border:1px solid #222;
display:none;
z-index:999;
}

/* MATCH */

.match{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

.match h1{
color:#ff2d75;
}

.match button{
margin-top:20px;
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff2d75;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topo">

<div class="logo">Laço 💘</div>

<div class="icons">

<div class="icon" onclick="window.location.href='vibe.html'">📍</div>

<div class="icon" onclick="window.location.href='matches.html'">
💬
<div class="badge" id="badgeChat">0</div>
</div>

<div class="icon" onclick="window.location.href='likes.html'">
⭐
<div class="badge" id="badgeLikes">0</div>
</div>

<div class="icon" onclick="window.location.href='perfil.html'">👤</div>

</div>

</div>

<div class="area">

<div class="card" id="card">

<img id="foto">

<div class="overlay">
<div class="nome" id="nome"></div>
<div class="bio" id="bio"></div>
</div>

<div class="actions">
<button class="btn nope" onclick="passar()">✖</button>
<button class="btn like" onclick="curtir()">❤</button>
</div>

</div>

</div>

<div class="toast" id="toast"></div>

<div class="match" id="match">
<h1>💘 MATCH</h1>
<button onclick="fecharMatch()">Continuar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore,collection,getDocs,doc,updateDoc,arrayUnion,getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "lacoapp.firebaseapp.com",
projectId: "lacoapp"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let usuarios=[];
let index=0;
let meuId=null;

const foto=document.getElementById("foto");
const nome=document.getElementById("nome");
const bio=document.getElementById("bio");

const badgeLikes=document.getElementById("badgeLikes");
const badgeChat=document.getElementById("badgeChat");

const toast=document.getElementById("toast");

/* LOGIN */

onAuthStateChanged(auth,async(user)=>{

if(!user){
window.location.href="login.html";
return;
}

meuId=user.uid;

const snap=await getDocs(collection(db,"usuarios"));

usuarios=snap.docs.map(doc=>({id:doc.id,...doc.data()}))
.filter(u=>u.id!==meuId);

mostrar();

/* CONTADORES */

setInterval(async ()=>{

const me = await getDoc(doc(db,"usuarios",meuId));
const dados = me.data();

badgeLikes.innerText = (dados.likesRecebidos || []).length;
badgeChat.innerText = (dados.matches || []).length;

if(Math.random() < 0.4){
mostrarToast("🔥 Alguém te curtiu agora");
}

},5000);

});

/* MOSTRAR */

function mostrar(){

const user=usuarios[index];

foto.src=user.foto;
nome.innerText=user.nome;
bio.innerText=user.bio;

}

/* PASSAR */

window.passar=function(){
proximo();
};

/* CURTIR */

window.curtir=async function(){

const user=usuarios[index];

await updateDoc(doc(db,"usuarios",meuId),{
likes:arrayUnion(user.id)
});

await updateDoc(doc(db,"usuarios",user.id),{
likesRecebidos:arrayUnion(meuId)
});

const snap=await getDoc(doc(db,"usuarios",user.id));
const dados=snap.data();

if(dados.likes && dados.likes.includes(meuId)){
document.getElementById("match").style.display="flex";
}

proximo();

};

/* PROXIMO */

function proximo(){
index++;
if(index>=usuarios.length){index=0;}
mostrar();
}

/* MATCH */

window.fecharMatch=function(){
document.getElementById("match").style.display="none";
};

/* TOAST */

function mostrarToast(msg){

toast.innerText=msg;
toast.style.display="block";

setTimeout(()=>{
toast.style.display="none";
},2000);

}

</script>

</body>
</html>
