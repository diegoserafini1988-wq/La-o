<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>LAÇO 💘</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Manrope',sans-serif;
}

body{

background:#080808;
color:white;
overflow:hidden;

}

/* FUNDO */

.bg{

position:fixed;
inset:0;
overflow:hidden;
z-index:-1;

}

.glow{

position:absolute;
border-radius:50%;
filter:blur(120px);

animation:float 12s infinite alternate ease-in-out;

}

.glow1{

width:420px;
height:420px;

background:
rgba(255,107,61,.16);

top:-140px;
left:-120px;

}

.glow2{

width:340px;
height:340px;

background:
rgba(255,140,80,.12);

bottom:-120px;
right:-100px;

animation-delay:2s;

}

@keyframes float{

from{
transform:translateY(0px);
}

to{
transform:translateY(50px);
}

}

/* HEADER */

.header{

padding:24px;

display:flex;
justify-content:space-between;
align-items:center;

}

.logo{

font-size:34px;
font-weight:800;

color:#FF8A3D;

letter-spacing:-1px;

text-shadow:
0 0 28px rgba(255,138,61,.35);

}

.badge{

padding:12px 18px;

border-radius:999px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.05);

backdrop-filter:blur(20px);

font-size:13px;
font-weight:700;

}

/* APP */

.app{

height:calc(100vh - 180px);

display:flex;
justify-content:center;
align-items:center;

padding:20px;

}

/* STACK */

.stack{

position:relative;

width:360px;
height:620px;

}

/* SOMBRAS */

.shadow{

position:absolute;

width:100%;
height:100%;

border-radius:38px;

background:
rgba(255,255,255,.03);

border:
1px solid rgba(255,255,255,.04);

}

.shadow1{

transform:
translateY(14px)
scale(.96);

opacity:.35;

}

.shadow2{

transform:
translateY(28px)
scale(.92);

opacity:.18;

}

/* CARD */

.card{

position:absolute;

width:100%;
height:100%;

overflow:hidden;

border-radius:38px;

background:#111;

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 20px 80px rgba(0,0,0,.45),
0 0 80px rgba(255,107,61,.08);

animation:fade .35s ease;

}

@keyframes fade{

from{
opacity:0;
transform:scale(.96);
}

to{
opacity:1;
transform:scale(1);
}

}

/* IMG */

.card img{

width:100%;
height:100%;

object-fit:cover;

}

/* OVERLAY */

.overlay{

position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,.96) 10%,
rgba(0,0,0,.15) 55%,
transparent 100%
);

display:flex;
flex-direction:column;
justify-content:flex-end;

padding:28px;

}

/* INFO */

.info h2{

font-size:34px;
font-weight:800;

}

.info p{

margin-top:10px;

font-size:15px;
line-height:1.7;

color:#ddd;

}

/* VIBE */

.vibe{

margin-top:18px;

display:inline-flex;
align-items:center;
gap:10px;

padding:12px 18px;

border-radius:999px;

background:
rgba(255,255,255,.06);

border:
1px solid rgba(255,255,255,.06);

backdrop-filter:blur(20px);

font-size:13px;
font-weight:700;

color:#FFB089;

width:max-content;

}

/* BOTÕES */

.actions{

position:absolute;

bottom:100px;

width:100%;

display:flex;
justify-content:center;
gap:24px;

}

.btn{

width:82px;
height:82px;

border:none;

border-radius:50%;

cursor:pointer;

font-size:30px;

transition:.25s;

backdrop-filter:blur(20px);

}

.nope{

background:
rgba(255,255,255,.08);

color:white;

}

.like{

background:
linear-gradient(
135deg,
#FF6B3D,
#FF8A3D
);

color:white;

box-shadow:
0 0 40px rgba(255,107,61,.35);

}

.btn:hover{

transform:scale(1.08);

}

/* MATCH */

.match{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

padding:18px 34px;

border-radius:24px;

background:
rgba(10,10,10,.82);

border:
1px solid rgba(255,107,61,.25);

backdrop-filter:blur(24px);

font-size:22px;
font-weight:800;

color:#FF8A3D;

box-shadow:
0 0 40px rgba(255,107,61,.25);

display:none;

z-index:9999;

}

/* NAV */

.bottom-nav{

position:fixed;
bottom:0;
left:0;

width:100%;
height:88px;

display:flex;
justify-content:space-around;
align-items:center;

background:
rgba(10,10,10,.85);

backdrop-filter:blur(24px);

border-top:
1px solid rgba(255,255,255,.05);

}

.nav-item{

display:flex;
flex-direction:column;
align-items:center;
gap:4px;

text-decoration:none;

font-size:12px;
font-weight:700;

color:#999;

transition:.3s;

}

.nav-item div{

font-size:22px;

}

.nav-item.active{

color:#FF8A3D;

text-shadow:
0 0 20px rgba(255,138,61,.4);

}

</style>

</head>

<body>

<div class="bg">

<div class="glow glow1"></div>

<div class="glow glow2"></div>

</div>

<!-- HEADER -->

<div class="header">

<div class="logo">
LAÇO 💘
</div>

<div class="badge">
BRASA VIVA
</div>

</div>

<!-- APP -->

<div class="app">

<div class="stack">

<div class="shadow shadow2"></div>

<div class="shadow shadow1"></div>

<div class="card"
id="card">

</div>

</div>

</div>

<!-- BOTÕES -->

<div class="actions">

<button
class="btn nope"
onclick="nope()">

✕

</button>

<button
class="btn like"
onclick="like()">

💘

</button>

</div>

<!-- MATCH -->

<div class="match"
id="matchBox">

💘 Novo Match

</div>

<!-- NAV -->

<div class="bottom-nav">

<a href="app.html"
class="nav-item active">

<div>🔥</div>
<span>Explorar</span>

</a>

<a href="matches.html"
class="nav-item">

<div>💘</div>
<span>Matches</span>

</a>

<a href="chat.html"
class="nav-item">

<div>💬</div>
<span>Chat</span>

</a>

<a href="vibe.html"
class="nav-item">

<div>✨</div>
<span>Vibe</span>

</a>

<a href="perfil.html"
class="nav-item">

<div>👤</div>
<span>Perfil</span>

</a>

</div>

<script>

/* PERFIS PREMIUM */

const perfis = [

{
nome:"Sophia",
idade:"26",
foto:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Emma",
idade:"24",
foto:"https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Olivia",
idade:"28",
foto:"https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Charlotte",
idade:"25",
foto:"https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Amelia",
idade:"27",
foto:"https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?q=80&w=1200&auto=format&fit=crop"
}

];

let atual = 0;

/* CARD */

function mostrarPerfil(){

if(atual >= perfis.length){

atual = 0;

}

const p =
perfis[atual];

document.getElementById("card")
.innerHTML = `

<img src="${p.foto}">

<div class="overlay">

<div class="info">

<h2>
${p.nome}, ${p.idade}
</h2>

<p>

Conexões reais começam na energia certa.

</p>

<div class="vibe">

✨ Na mesma vibe que você

</div>

</div>

</div>

`;

}

/* MATCH */

function mostrarMatch(){

const box =
document.getElementById("matchBox");

box.style.display = "block";

setTimeout(()=>{

box.style.display = "none";

},1400);

}

/* LIKE */

window.like = ()=>{

mostrarMatch();

atual++;

mostrarPerfil();

};

/* NOPE */

window.nope = ()=>{

atual++;

mostrarPerfil();

};

/* START */

mostrarPerfil();

</script>

</body>
</html>
