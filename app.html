<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laço 💘</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:Segoe UI;color:#fff;overflow:hidden}

/* TOPO */
.topo{display:flex;justify-content:space-between;align-items:center;padding:18px 20px}
.logo{font-size:26px;color:#ff2d75;font-weight:700}
.right{display:flex;align-items:center;gap:12px}
.streak{background:#111;border:1px solid #222;padding:6px 12px;border-radius:20px;font-size:13px}
.icons{display:flex;gap:10px}
.icon{width:44px;height:44px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.badge{position:absolute;top:-5px;right:-5px;background:#ff2d75;color:#fff;font-size:11px;padding:2px 6px;border-radius:50%}

/* CARD */
.area{height:calc(100vh - 80px);display:flex;justify-content:center;align-items:center}
.card{width:360px;height:640px;border-radius:28px;overflow:hidden;position:relative;box-shadow:0 0 40px rgba(255,0,90,.25)}
.card img{width:100%;height:100%;object-fit:cover}
.overlay{position:absolute;bottom:0;width:100%;padding:18px;background:linear-gradient(transparent,#000)}
.nome{font-size:26px;font-weight:700}
.meta{font-size:13px;opacity:.8;margin-top:4px}
.bio{margin-top:8px;opacity:.9}

/* AÇÕES */
.actions{position:absolute;bottom:16px;width:100%;display:flex;justify-content:center;gap:18px}
.btn{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;font-size:22px}
.nope{background:#1a1a1a;color:#ff4d6d}
.like{background:#ff2d75;color:#fff}

/* TOAST */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#111;border:1px solid #222;padding:10px 16px;border-radius:24px;display:none;z-index:999}

/* MATCH */
.match{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;justify-content:center;align-items:center;flex-direction:column}
.match h1{color:#ff2d75}
.match button{margin-top:18px;padding:12px 26px;border:none;border-radius:24px;background:#ff2d75;color:#fff;cursor:pointer}
</style>
</head>

<body>

<div class="topo">
  <div class="logo">Laço 💘</div>

  <div class="right">
    <div class="streak">🔥 <span id="streak">0</span> dias</div>

    <div class="icons">
      <div class="icon" onclick="location.href='vibe.html'">📍</div>
      <div class="icon" onclick="location.href='matches.html'">💬
        <div class="badge" id="badgeChat">0</div>
      </div>
      <div class="icon" onclick="location.href='likes.html'">⭐
        <div class="badge" id="badgeLikes">0</div>
      </div>
      <div class="icon" onclick="location.href='perfil.html'">👤</div>
    </div>
  </div>
</div>

<div class="area">
  <div class="card" id="card">
    <img id="foto">
    <div class="overlay">
      <div class="nome" id="nome"></div>
      <div class="meta" id="meta"></div>
      <div class="bio" id="bio"></div>
    </div>
    <div class="actions">
      <button class="btn nope" onclick="passar()">✖</button>
      <button class="btn like" onclick="curtir()">❤</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="match" id="match">
  <h1>💘 MATCH</h1>
  <button onclick="fecharMatch()">Continuar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,collection,getDocs,doc,updateDoc,arrayUnion,getDoc,setDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "lacoapp.firebaseapp.com",
  projectId: "lacoapp"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let usuarios=[], index=0, meuId=null;

const foto = document.getElementById("foto");
const nome = document.getElementById("nome");
const meta = document.getElementById("meta");
const bio = document.getElementById("bio");
const badgeLikes = document.getElementById("badgeLikes");
const badgeChat = document.getElementById("badgeChat");
const streakEl = document.getElementById("streak");
const toast = document.getElementById("toast");

/* ===== HELPERS ===== */
const todayKey = () => new Date().toISOString().slice(0,10);

function showToast(t){
  toast.innerText=t;
  toast.style.display="block";
  setTimeout(()=>toast.style.display="none",1800);
}

/* ===== LOGIN ===== */
onAuthStateChanged(auth, async (user)=>{
  if(!user){ location.href="login.html"; return; }
  meuId = user.uid;

  // garante doc
  await setDoc(doc(db,"usuarios",meuId), {}, {merge:true});

  // atualiza presença
  await updateDoc(doc(db,"usuarios",meuId), {
    lastSeen: Date.now()
  });

  // streak
  const meSnap = await getDoc(doc(db,"usuarios",meuId));
  let me = meSnap.data() || {};
  const today = todayKey();

  let streak = me.streak || 0;
  if(me.lastLoginDate !== today){
    const ontem = new Date(); ontem.setDate(ontem.getDate()-1);
    const ontemKey = ontem.toISOString().slice(0,10);
    if(me.lastLoginDate === ontemKey){ streak += 1; }
    else{ streak = 1; }
    await updateDoc(doc(db,"usuarios",meuId), {
      streak, lastLoginDate: today
    });
  }
  streakEl.innerText = streak || 1;

  // carregar usuários
  const snap = await getDocs(collection(db,"usuarios"));
  usuarios = snap.docs.map(d=>({id:d.id,...d.data()}))
    .filter(u=>u.id!==meuId);

  mostrar();

  // badges + presença refresh
  setInterval(async ()=>{
    const me2 = (await getDoc(doc(db,"usuarios",meuId))).data() || {};
    badgeLikes.innerText = (me2.likesRecebidos||[]).length;
    badgeChat.innerText  = (me2.matches||[]).length;

    // ping presença
    await updateDoc(doc(db,"usuarios",meuId), { lastSeen: Date.now() });

    if(Math.random()<0.3){ showToast("🔥 Novas pessoas na sua área"); }
  }, 6000);
});

/* ===== UI ===== */
function mostrar(){
  if(!usuarios.length) return;

  const u = usuarios[index];
  foto.src = u.foto || "";
  nome.innerText = u.nome || "Sem nome";

  const online = (u.lastSeen && (Date.now()-u.lastSeen) < 60*1000);
  meta.innerText = online ? "🟢 Online agora" : "🕓 Visto recentemente";

  bio.innerText = u.bio || "";
}

/* ===== AÇÕES ===== */
window.passar = ()=> proximo();

window.curtir = async ()=>{
  const u = usuarios[index];

  await updateDoc(doc(db,"usuarios",meuId), {
    likes: arrayUnion(u.id)
  });

  await updateDoc(doc(db,"usuarios",u.id), {
    likesRecebidos: arrayUnion(meuId)
  });

  const snap = await getDoc(doc(db,"usuarios",u.id));
  const dados = snap.data();

  if(dados.likes && dados.likes.includes(meuId)){
    document.getElementById("match").style.display="flex";
  }
  proximo();
};

function proximo(){
  index = (index+1) % usuarios.length;
  mostrar();
}

window.fecharMatch = ()=> {
  document.getElementById("match").style.display="none";
};
</script>
</body>
</html>
