<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Laço 💘</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff4d6d, #6a00f4);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 100%;
  max-width: 350px;
  text-align: center;
}

.card {
  background: white;
  border-radius: 25px;
  overflow: hidden;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.card img {
  width: 100%;
  height: 400px;
  object-fit: cover;
}

.info {
  padding: 15px;
}

.actions {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 20px;
}

.actions button {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  font-size: 28px;
  cursor: pointer;
}

.nope {
  background: red;
  color: white;
}

.like {
  background: green;
  color: white;
}

.empty {
  color: white;
  font-size: 20px;
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">

<div class="card">
  <img id="foto" src="">
  <div class="info">
    <h2 id="nome"></h2>
    <p id="idade"></p>
  </div>
</div>

<div class="actions">
  <button class="nope" onclick="pular()">❌</button>
  <button class="like" onclick="curtir()">❤️</button>
</div>

<p id="mensagem" class="empty"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, arrayUnion } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",
  authDomain: "lacoapp.firebaseapp.com",
  projectId: "lacoapp"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const foto = document.getElementById("foto");
const nome = document.getElementById("nome");
const idade = document.getElementById("idade");
const mensagem = document.getElementById("mensagem");

let usuarios = [];
let index = 0;
let usuarioId = null;

// 🔥 CARREGAR USUÁRIOS (FILTRADO)
async function carregarUsuarios() {
  const snap = await getDocs(collection(db, "usuarios"));

  usuarios = snap.docs
    .map(doc => ({ id: doc.id, ...doc.data() }))
    .filter(u => u.id !== usuarioId); // remove você mesmo

  if (usuarios.length === 0) {
    mensagem.innerText = "Sem usuários disponíveis 😢";
    return;
  }

  mostrar();
}

// 🔥 MOSTRAR USUÁRIO
function mostrar() {
  if (index >= usuarios.length) {
    mensagem.innerText = "Acabaram os perfis 😢";
    foto.src = "";
    nome.innerText = "";
    idade.innerText = "";
    return;
  }

  const user = usuarios[index];

  foto.src = user.foto || "https://via.placeholder.com/300";
  nome.innerText = user.nome || "Sem nome";
  idade.innerText = user.idade || "";
}

// ❤️ CURTIR
window.curtir = async function() {
  if (index >= usuarios.length) return;

  const user = usuarios[index];

  await updateDoc(doc(db, "usuarios", usuarioId), {
    likes: arrayUnion(user.id)
  });

  proximo();
};

// ❌ PULAR
window.pular = function() {
  proximo();
};

// 👉 PRÓXIMO
function proximo() {
  index++;
  mostrar();
}

// LOGIN
onAuthStateChanged(auth, (user) => {
  if (user) {
    usuarioId = user.uid;
    carregarUsuarios();
  } else {
    window.location.href = "login.html";
  }
});
</script>

</body>
</html>
