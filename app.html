<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laço 💘</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{

height:100vh;
overflow:hidden;
color:white;
background:#050505;

}

/* FUNDO CINEMATOGRÁFICO */

.bg{

position:fixed;
inset:0;
overflow:hidden;
z-index:0;

}

.fire{

position:absolute;
border-radius:50%;
filter:blur(120px);
animation:float 10s ease-in-out infinite;

}

.fire1{

width:420px;
height:420px;

background:
rgba(255,0,102,.18);

top:-120px;
right:-120px;

}

.fire2{

width:360px;
height:360px;

background:
rgba(255,80,80,.12);

bottom:-120px;
left:-120px;

animation-delay:2s;

}

.fire3{

width:260px;
height:260px;

background:
rgba(255,120,0,.10);

top:40%;
left:50%;

transform:translate(-50%,-50%);

animation-delay:4s;

}

@keyframes float{

0%{
transform:translateY(0px) scale(1);
}

50%{
transform:translateY(-20px) scale(1.04);
}

100%{
transform:translateY(0px) scale(1);
}

}

/* HEADER */

.header{

position:fixed;

top:0;
left:0;

width:100%;

padding:22px 22px 14px;

display:flex;
justify-content:space-between;
align-items:center;

z-index:100;

background:
linear-gradient(to bottom,rgba(0,0,0,.55),transparent);

backdrop-filter:blur(10px);

}

.logo{

font-size:30px;
font-weight:800;

letter-spacing:-1px;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.headerRight{

display:flex;
gap:12px;

}

.topBtn{

width:42px;
height:42px;

border-radius:14px;

display:flex;
justify-content:center;
align-items:center;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.05);

backdrop-filter:blur(20px);

color:white;

font-size:16px;

}

/* ÁREA */

.area{

width:100%;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding-top:70px;
padding-bottom:120px;

position:relative;
z-index:10;

}

/* STACK */

.stack{

position:relative;

width:92%;
max-width:410px;

height:74vh;

}

/* CARD */

.card{

position:absolute;

width:100%;
height:100%;

border-radius:34px;

overflow:hidden;

background:#111;

box-shadow:
0 30px 90px rgba(0,0,0,.55);

transition:
transform .35s ease,
opacity .35s ease;

will-change:transform;

touch-action:none;

}

.card img{

width:100%;
height:100%;

object-fit:cover;

}

/* CARD ATRÁS */

.card.second{

transform:
scale(.96)
translateY(12px);

opacity:.55;

filter:brightness(.75);

}

/* OVERLAY */

.overlay{

position:absolute;

inset:0;

background:
linear-gradient(to top,#000 12%,transparent 45%);

}

/* INFO */

.info{

position:absolute;

left:24px;
right:24px;
bottom:26px;

z-index:5;

}

.topInfo{

display:flex;
align-items:center;
gap:10px;

margin-bottom:10px;

}

.nome{

font-size:34px;
font-weight:800;

letter-spacing:-1px;

}

.idade{

font-size:28px;
font-weight:500;

opacity:.88;

}

.verify{

color:#4da6ff;
font-size:18px;

}

.local{

font-size:14px;

opacity:.75;

margin-bottom:14px;

}

.bio{

font-size:14px;
line-height:1.6;

opacity:.92;

max-width:88%;

}

/* TAGS */

.tags{

display:flex;
gap:10px;
flex-wrap:wrap;

margin-top:18px;

}

.tag{

padding:10px 14px;

border-radius:999px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.05);

backdrop-filter:blur(20px);

font-size:12px;

}

/* LIKE / NOPE */

.like,
.nope{

position:absolute;

top:35px;

padding:10px 18px;

border-radius:16px;

font-size:28px;
font-weight:800;

opacity:0;

transition:.2s;

}

.like{

left:25px;

border:3px solid #00ff88;

color:#00ff88;

transform:rotate(-12deg);

}

.nope{

right:25px;

border:3px solid #ff3b5c;

color:#ff3b5c;

transform:rotate(12deg);

}

/* BOTÕES */

.actions{

position:fixed;

bottom:98px;
left:50%;

transform:translateX(-50%);

display:flex;
align-items:center;
gap:18px;

z-index:120;

}

.action{

display:flex;
justify-content:center;
align-items:center;

border-radius:50%;

backdrop-filter:blur(20px);

transition:.2s;

border:
1px solid rgba(255,255,255,.05);

}

.action:active{

transform:scale(.92);

}

.dislike{

width:68px;
height:68px;

background:
rgba(255,77,109,.10);

color:#ff4d6d;

font-size:28px;

}

.super{

width:56px;
height:56px;

background:
rgba(255,212,74,.10);

color:#ffd54a;

font-size:22px;

}

.likeBtn{

width:78px;
height:78px;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

box-shadow:
0 14px 40px rgba(255,0,102,.35);

color:white;

font-size:30px;

}

/* NAVBAR */

.nav{

position:fixed;

bottom:0;
left:0;

width:100%;

padding:14px 10px 28px;

display:flex;
justify-content:space-around;
align-items:center;

background:
rgba(8,8,8,.85);

backdrop-filter:blur(30px);

border-top:
1px solid rgba(255,255,255,.05);

z-index:200;

}

.navItem{

display:flex;
flex-direction:column;
align-items:center;
gap:6px;

font-size:11px;
font-weight:500;

opacity:.45;

transition:.3s;

}

.navItem.active{

opacity:1;
color:#ff4d8d;

}

.navItem i{

font-size:20px;

}

/* MATCH */

.match{

position:fixed;

top:50%;
left:50%;

transform:
translate(-50%,-50%) scale(.8);

width:88%;
max-width:340px;

padding:36px;

border-radius:34px;

background:
rgba(15,15,15,.92);

border:
1px solid rgba(255,255,255,.06);

backdrop-filter:blur(30px);

text-align:center;

z-index:999;

opacity:0;
pointer-events:none;

transition:.35s;

}

.match.show{

opacity:1;
pointer-events:auto;

transform:
translate(-50%,-50%) scale(1);

}

.match h1{

font-size:40px;
font-weight:800;

margin-bottom:12px;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.match p{

opacity:.72;

line-height:1.5;

margin-bottom:25px;

}

.match button{

width:100%;

padding:16px;

border:none;

border-radius:18px;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

color:white;

font-weight:700;

font-size:15px;

}

/* RESPONSIVO */

@media(max-width:500px){

.stack{
height:70vh;
}

.nome{
font-size:28px;
}

.idade{
font-size:24px;
}

}

</style>
</head>

<body>

<!-- BG -->

<div class="bg">

<div class="fire fire1"></div>
<div class="fire fire2"></div>
<div class="fire fire3"></div>

</div>

<!-- HEADER -->

<div class="header">

<div class="logo">
Laço 💘
</div>

<div class="headerRight">

<div class="topBtn">
<i class="fa-solid fa-bell"></i>
</div>

<div class="topBtn">
<i class="fa-solid fa-sliders"></i>
</div>

</div>

</div>

<!-- AREA -->

<div class="area">

<div class="stack" id="stack"></div>

</div>

<!-- BOTÕES -->

<div class="actions">

<div class="action dislike" onclick="swipeLeft()">
<i class="fa-solid fa-xmark"></i>
</div>

<div class="action super">
<i class="fa-solid fa-star"></i>
</div>

<div class="action likeBtn" onclick="swipeRight()">
<i class="fa-solid fa-heart"></i>
</div>

</div>

<!-- NAV -->

<div class="nav">

<div class="navItem active">
<i class="fa-solid fa-fire"></i>
<span>Explorar</span>
</div>

<div class="navItem">
<i class="fa-solid fa-heart"></i>
<span>Likes</span>
</div>

<div class="navItem">
<i class="fa-solid fa-comments"></i>
<span>Chat</span>
</div>

<div class="navItem">
<i class="fa-solid fa-location-dot"></i>
<span>Vibe</span>
</div>

<div class="navItem">
<i class="fa-solid fa-user"></i>
<span>Perfil</span>
</div>

</div>

<!-- MATCH -->

<div class="match" id="match">

<h1>É Match 💘</h1>

<p>
A conexão aconteceu.
Agora começa a melhor parte.
</p>

<button onclick="closeMatch()">
Continuar
</button>

</div>

<script>

const perfis = [

{
nome:"Amanda",
idade:24,
cidade:"Rio de Janeiro",
bio:"Praia, viagens e pessoas que fazem a conversa valer a pena.",
foto:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop",
interesses:["Viagens","Praia","Música"]
},

{
nome:"Camila",
idade:27,
cidade:"São Paulo",
bio:"Café forte, academia e conversas de madrugada.",
foto:"https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?q=80&w=1200&auto=format&fit=crop",
interesses:["Cinema","Fitness","Café"]
},

{
nome:"Isabella",
idade:22,
cidade:"Belo Horizonte",
bio:"Adrenalina, rolês inesperados e boas risadas.",
foto:"https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200&auto=format&fit=crop",
interesses:["Shows","Trilhas","Fotografia"]
}

];

const stack =
document.getElementById("stack");

let current = 0;

/* RENDER */

function renderCards(){

stack.innerHTML = "";

const currentProfile =
perfis[current];

const nextProfile =
perfis[(current + 1) % perfis.length];

const secondCard =
createCard(nextProfile,true);

const firstCard =
createCard(currentProfile,false);

stack.appendChild(secondCard);
stack.appendChild(firstCard);

drag(firstCard);

}

/* CARD */

function createCard(p,isSecond){

const card =
document.createElement("div");

card.className =
isSecond
? "card second"
: "card";

card.innerHTML = `

<img src="${p.foto}">

<div class="overlay"></div>

<div class="like">LIKE</div>

<div class="nope">NOPE</div>

<div class="info">

<div class="topInfo">

<div class="nome">
${p.nome}
</div>

<div class="idade">
${p.idade}
</div>

<i class="fa-solid fa-circle-check verify"></i>

</div>

<div class="local">
📍 ${p.cidade}
</div>

<div class="bio">
${p.bio}
</div>

<div class="tags">

${p.interesses.map(tag =>
`<div class="tag">${tag}</div>`
).join("")}

</div>

</div>

`;

return card;

}

/* DRAG */

function drag(card){

let startX = 0;
let currentX = 0;
let dragging = false;

card.addEventListener("mousedown",start);
card.addEventListener("touchstart",start);

function start(e){

dragging = true;

startX =
e.type.includes("mouse")
? e.pageX
: e.touches[0].pageX;

document.addEventListener("mousemove",move);
document.addEventListener("touchmove",move);

document.addEventListener("mouseup",end);
document.addEventListener("touchend",end);

}

function move(e){

if(!dragging) return;

currentX =
e.type.includes("mouse")
? e.pageX
: e.touches[0].pageX;

const dx =
currentX - startX;

const rotate =
dx / 16;

card.style.transition = "none";

card.style.transform =
`translateX(${dx}px) rotate(${rotate}deg)`;

const like =
card.querySelector(".like");

const nope =
card.querySelector(".nope");

if(dx > 0){

like.style.opacity =
dx / 100;

nope.style.opacity = 0;

}else{

nope.style.opacity =
Math.abs(dx) / 100;

like.style.opacity = 0;

}

}

function end(){

dragging = false;

const dx =
currentX - startX;

card.style.transition =
".35s ease";

if(dx > 110){

card.style.transform =
"translateX(140%) rotate(24deg)";

setTimeout(()=>{

showMatch();
nextCard();

},300);

}else if(dx < -110){

card.style.transform =
"translateX(-140%) rotate(-24deg)";

setTimeout(()=>{

nextCard();

},300);

}else{

card.style.transform = "";

card.querySelector(".like").style.opacity = 0;

card.querySelector(".nope").style.opacity = 0;

}

document.removeEventListener("mousemove",move);
document.removeEventListener("touchmove",move);

}

}

/* NEXT */

function nextCard(){

current++;

if(current >= perfis.length){

current = 0;

}

renderCards();

}

/* BOTÕES */

function swipeRight(){

showMatch();
nextCard();

}

function swipeLeft(){

nextCard();

}

/* MATCH */

function showMatch(){

document
.getElementById("match")
.classList.add("show");

}

function closeMatch(){

document
.getElementById("match")
.classList.remove("show");

}

renderCards();

</script>

</body>
</html>
