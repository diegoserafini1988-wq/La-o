<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Laço 💘</title>

<link rel="stylesheet" href="style.css">
</head>

<body class="home">

<div class="card">

<h2 id="nomeUsuario">Carregando...</h2>

<img id="foto" src="https://via.placeholder.com/300" />

<h3 id="nomeCard">Nome</h3>
<p id="idadeCard">Idade</p>

<div class="actions">
<button onclick="naoCurtir()">❌</button>
<button onclick="curtir()">❤️</button>
</div>

<br>

<button onclick="logout()">Sair</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs, updateDoc, arrayUnion } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",
  authDomain: "lacoapp.firebaseapp.com",
  projectId: "lacoapp",
  storageBucket: "lacoapp.firebasestorage.app",
  messagingSenderId: "485009455528",
  appId: "1:485009455528:web:0c43153be60e62cd6a459d",
  measurementId: "G-MSB3J89XLL"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const nomeUsuario = document.getElementById("nomeUsuario");
const nomeCard = document.getElementById("nomeCard");
const idadeCard = document.getElementById("idadeCard");
const foto = document.getElementById("foto");

let usuarios = [];
let index = 0;
let usuarioLogado = null;
let usuarioId = null;

// 🔥 CARREGAR USUÁRIOS
async function carregarUsuarios() {
  const querySnapshot = await getDocs(collection(db, "usuarios"));

  usuarios = querySnapshot.docs.map(doc => ({
    id: doc.id,
    ...doc.data()
  }));

  mostrarUsuario();
}

// 🔥 MOSTRAR USUÁRIO
function mostrarUsuario() {
  if (usuarios.length === 0) return;

  const user = usuarios[index];

  nomeCard.innerText = user.nome || "Sem nome";
  idadeCard.innerText = user.idade || "Sem idade";
  foto.src = user.foto || "https://via.placeholder.com/300";
}

// ❤️ CURTIR (AGORA SALVA)
window.curtir = async function() {
  const alvo = usuarios[index];

  if (!usuarioId || !alvo) return;

  const userRef = doc(db, "usuarios", usuarioId);

  await updateDoc(userRef, {
    likes: arrayUnion(alvo.id)
  });

  index++;
  mostrarUsuario();
};

// ❌ NÃO CURTIR
window.naoCurtir = function() {
  index++;
  mostrarUsuario();
};

// LOGIN
onAuthStateChanged(auth, async (user) => {
  if (user) {
    usuarioId = user.uid;

    const docRef = doc(db, "usuarios", user.uid);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      usuarioLogado = docSnap.data();
      nomeUsuario.innerText = "Olá, " + usuarioLogado.nome;
    }

    carregarUsuarios();
  } else {
    window.location.href = "login.html";
  }
});

// LOGOUT
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>

</body>
</html>
