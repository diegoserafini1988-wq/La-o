<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Laço 💘</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:white;
}

.header {
  padding:15px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #111;
}

.card {
  width:320px;
  height:500px;
  margin:20px auto;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

.card img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay {
  position:absolute;
  bottom:0;
  padding:20px;
  width:100%;
  background:linear-gradient(transparent, rgba(0,0,0,0.9));
}

.actions {
  display:flex;
  justify-content:center;
  gap:20px;
}

button {
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:25px;
}
</style>
</head>

<body>

<div class="header">
  <div>Laço 💘</div>
  <div onclick="location.href='matches.html'">💬</div>
</div>

<div class="card">
  <img id="foto">
  <div class="overlay">
    <h2 id="nome"></h2>
    <p id="idade"></p>
  </div>
</div>

<div class="actions">
  <button onclick="pular()">❌</button>
  <button onclick="curtir()">❤️</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, getDoc, arrayUnion } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",
  authDomain: "lacoapp.firebaseapp.com",
  projectId: "lacoapp"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let usuarioId = null;
let usuarios = [];
let index = 0;

// 🔥 GARANTE QUE NÃO VOLTA PRO LOGIN ERRADO
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    setTimeout(() => {
      if (!auth.currentUser) {
        window.location.href = "login.html";
      }
    }, 500);
    return;
  }

  usuarioId = user.uid;

  const snap = await getDocs(collection(db, "usuarios"));
  usuarios = snap.docs
    .map(d => ({ id: d.id, ...d.data() }))
    .filter(u => u.id !== usuarioId);

  mostrar();
});

function mostrar() {
  if (index >= usuarios.length) return;

  const u = usuarios[index];

  foto.src = u.foto || "https://via.placeholder.com/300";
  nome.innerText = u.nome || "Sem nome";
  idade.innerText = u.idade || "";
}

window.curtir = async function() {
  const u = usuarios[index];

  await updateDoc(doc(db, "usuarios", usuarioId), {
    likes: arrayUnion(u.id)
  });

  const outro = await getDoc(doc(db, "usuarios", u.id));

  if (outro.data().likes?.includes(usuarioId)) {
    alert("💘 MATCH!");
  }

  index++;
  mostrar();
};

window.pular = function() {
  index++;
  mostrar();
};

const foto = document.getElementById("foto");
const nome = document.getElementById("nome");
const idade = document.getElementById("idade");
</script>

</body>
</html>
