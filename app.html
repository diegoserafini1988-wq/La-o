<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Laço 💘</title>

<link rel="stylesheet" href="style.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  font-family:Segoe UI;
  overflow:hidden;
  color:white;
}

/* FUNDO */

.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:
  radial-gradient(circle at top, rgba(255,0,90,.18), transparent 40%),
  radial-gradient(circle at bottom, rgba(255,0,120,.12), transparent 35%),
  #000;
  z-index:-1;
}

/* TOPO */

.topo{
  width:100%;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:32px;
  font-weight:bold;
  color:#ff2d75;
}

.top-icons{
  display:flex;
  gap:15px;
}

.icon{
  width:45px;
  height:45px;
  background:#111;
  border:1px solid #222;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:.3s;
}

.icon:hover{
  transform:scale(1.08);
  background:#181818;
}

/* ÁREA */

.area{
  width:100%;
  height:calc(100vh - 100px);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* CARD */

.card{
  width:360px;
  max-width:95%;
  height:650px;
  background:#090909;
  border-radius:30px;
  overflow:hidden;
  position:relative;
  box-shadow:
  0 0 30px rgba(255,0,90,.18);
  border:1px solid #1d1d1d;
}

/* FOTO */

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.4s;
}

/* OVERLAY */

.overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:30px;
  background:linear-gradient(
    transparent,
    rgba(0,0,0,.95)
  );
}

/* INFO */

.nome{
  font-size:34px;
  font-weight:bold;
}

.idade{
  opacity:.8;
  margin-top:4px;
}

.bio{
  margin-top:12px;
  line-height:1.4;
  opacity:.9;
}

/* INTERESSES */

.tags{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:15px;
}

.tag{
  padding:8px 14px;
  background:#141414;
  border:1px solid #222;
  border-radius:30px;
  font-size:13px;
}

/* BOTÕES */

.actions{
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:25px;
}

.btn{
  width:75px;
  height:75px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  font-size:30px;
  transition:.25s;
}

.nope{
  background:#1a1a1a;
  color:#ff4d6d;
}

.like{
  background:#ff2d75;
  color:white;
}

.btn:hover{
  transform:scale(1.1);
}

/* MATCH */

.match{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.93);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
  animation:fade .4s;
}

.match h1{
  color:#ff2d75;
  font-size:60px;
}

.match p{
  margin-top:15px;
  font-size:22px;
}

.match button{
  margin-top:30px;
  padding:16px 40px;
  border:none;
  border-radius:40px;
  background:#ff2d75;
  color:white;
  font-size:18px;
  cursor:pointer;
}

@keyframes fade{
  from{
    opacity:0;
  }
  to{
    opacity:1;
  }
}

/* MOBILE */

@media(max-width:600px){

  .card{
    height:78vh;
  }

  .nome{
    font-size:28px;
  }

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="topo">

<div class="logo">
Laço 💘
</div>

<div class="top-icons">

<div class="icon">🔥</div>
<div class="icon">💬</div>
<div class="icon">⭐</div>

</div>

</div>

<div class="area">

<div class="card" id="card">

<img id="foto" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop">

<div class="overlay">

<div class="nome" id="nome">
Sophia
</div>

<div class="idade" id="idade">
24 anos • Rio de Janeiro
</div>

<div class="bio" id="bio">
Apaixonada por viagens, música e cafés noturnos ☕✨
</div>

<div class="tags">

<div class="tag">Viagens</div>
<div class="tag">Música</div>
<div class="tag">Romance</div>

</div>

</div>

<div class="actions">

<button class="btn nope" onclick="passar()">
✖
</button>

<button class="btn like" onclick="curtir()">
❤
</button>

</div>

</div>

</div>

<!-- MATCH -->

<div class="match" id="match">

<h1>💘 MATCH!</h1>

<p>Vocês se curtiram</p>

<button onclick="fecharMatch()">
Continuar
</button>

</div>

<script>

const usuarios = [

{
nome:"Sophia",
idade:"24 anos • Rio de Janeiro",
bio:"Apaixonada por viagens, música e cafés noturnos ☕✨",
foto:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Amanda",
idade:"26 anos • São Paulo",
bio:"Treino, praia e vinho 🍷",
foto:"https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Julia",
idade:"22 anos • Curitiba",
bio:"Filmes, sushi e risadas sinceras 🎬",
foto:"https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1200&auto=format&fit=crop"
}

];

let index = 0;

function atualizar(){

  const user = usuarios[index];

  document.getElementById("foto").src = user.foto;
  document.getElementById("nome").innerText = user.nome;
  document.getElementById("idade").innerText = user.idade;
  document.getElementById("bio").innerText = user.bio;

}

function passar(){

  document.getElementById("card").style.transform =
  "translateX(-400px) rotate(-20deg)";

  setTimeout(()=>{

    proximo();

  },300);

}

function curtir(){

  document.getElementById("card").style.transform =
  "translateX(400px) rotate(20deg)";

  setTimeout(()=>{

    document.getElementById("match").style.display="flex";

    proximo();

  },300);

}

function proximo(){

  index++;

  if(index >= usuarios.length){
    index = 0;
  }

  atualizar();

  document.getElementById("card").style.transition=".3s";

  document.getElementById("card").style.transform =
  "translateX(0px) rotate(0deg)";

}

function fecharMatch(){

  document.getElementById("match").style.display="none";

}

</script>

</body>
</html>
