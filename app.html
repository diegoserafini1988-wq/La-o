<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Laço 💘</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ff4d6d, #6a00f4);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 360px;
  text-align: center;
}

/* CARD */
.card {
  background: white;
  border-radius: 25px;
  overflow: hidden;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  transition: 0.3s;
}

/* FOTO */
.card img {
  width: 100%;
  height: 420px;
  object-fit: cover;
}

/* INFO */
.info {
  padding: 15px;
}

.info h2 {
  margin: 0;
}

/* BOTÕES */
.actions {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 20px;
}

.actions button {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  font-size: 28px;
  cursor: pointer;
}

.nope {
  background: #ff4d4d;
  color: white;
}

.like {
  background: #00c853;
  color: white;
}

/* MATCH POPUP */
.match {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  z-index:999;
  text-align:center;
}
</style>

</head>

<body>

<div class="container">

<div class="card">
  <img id="foto" src="">
  <div class="info">
    <h2 id="nome"></h2>
    <p id="idade"></p>
  </div>
</div>

<div class="actions">
  <button class="nope" onclick="pular()">❌</button>
  <button class="like" onclick="curtir()">❤️</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, getDoc, arrayUnion } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",
  authDomain: "lacoapp.firebaseapp.com",
  projectId: "lacoapp"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const foto = document.getElementById("foto");
const nome = document.getElementById("nome");
const idade = document.getElementById("idade");

let usuarios = [];
let index = 0;
let usuarioId = null;

// 🔥 CARREGAR USUÁRIOS
async function carregarUsuarios() {
  const snap = await getDocs(collection(db, "usuarios"));

  usuarios = snap.docs
    .map(doc => ({ id: doc.id, ...doc.data() }))
    .filter(u => u.id !== usuarioId);

  mostrar();
}

// 🔥 MOSTRAR PERFIL
function mostrar() {
  if (index >= usuarios.length) {
    nome.innerText = "Acabaram os perfis 😢";
    foto.src = "";
    idade.innerText = "";
    return;
  }

  const user = usuarios[index];

  foto.src = user.foto || "https://via.placeholder.com/300";
  nome.innerText = user.nome || "Sem nome";
  idade.innerText = user.idade || "";
}

// ❤️ CURTIR (COM MATCH REAL + SALVANDO)
window.curtir = async function() {
  if (index >= usuarios.length) return;

  const user = usuarios[index];

  // salva like no seu perfil
  await updateDoc(doc(db, "usuarios", usuarioId), {
    likes: arrayUnion(user.id)
  });

  // pega dados atualizados do outro
  const outroSnap = await getDoc(doc(db, "usuarios", user.id));
  const outro = outroSnap.data();

  // 🔥 VERIFICA MATCH REAL
  if (outro.likes && outro.likes.includes(usuarioId)) {

    // salva match nos dois
    await updateDoc(doc(db, "usuarios", usuarioId), {
      matches: arrayUnion(user.id)
    });

    await updateDoc(doc(db, "usuarios", user.id), {
      matches: arrayUnion(usuarioId)
    });

    mostrarMatch(user.nome);
  }

  proximo();
};

// ❌ PULAR
window.pular = function() {
  proximo();
};

// 👉 PRÓXIMO PERFIL
function proximo() {
  index++;
  mostrar();
}

// 💘 POPUP MATCH
function mostrarMatch(nome) {
  const div = document.createElement("div");
  div.className = "match";

  div.innerHTML = `
    <h1>💘 DEU MATCH!</h1>
    <p>Você e ${nome} se curtiram</p>
    <button onclick="this.parentElement.remove()" style="
      padding:15px 25px;
      border:none;
      border-radius:30px;
      background:#ff4d6d;
      color:white;
      cursor:pointer;
      margin-top:20px;
    ">
      Continuar
    </button>
  `;

  document.body.appendChild(div);
}

// 🔐 LOGIN
onAuthStateChanged(auth, (user) => {
  if (user) {
    usuarioId = user.uid;
    carregarUsuarios();
  } else {
    window.location.href = "login.html";
  }
});
</script>

</body>
</html>
