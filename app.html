<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laço 💘</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#050505;
height:100vh;
overflow:hidden;
font-family:'Inter',sans-serif;
color:white;
}

/* FUNDO */

.bg{
position:fixed;
inset:0;
overflow:hidden;

background:
radial-gradient(circle at top left,#2c130d 0%,#050505 40%),
radial-gradient(circle at bottom right,#1d0d09 0%,#050505 45%);
}

/* BRASAS */

.glow{
position:absolute;
border-radius:50%;
filter:blur(120px);
opacity:.16;
mix-blend-mode:screen;
animation:ambient 18s infinite ease-in-out;
}

.glow1{
width:500px;
height:500px;
background:#ff6b3d;
top:-160px;
left:-140px;
}

.glow2{
width:380px;
height:380px;
background:#ff954f;
bottom:-120px;
right:-120px;
animation-delay:6s;
}

.glow3{
width:240px;
height:240px;
background:#ff6b3d;
top:45%;
left:55%;
animation-delay:10s;
}

@keyframes ambient{

0%{
transform:translate(0,0) scale(1);
}

50%{
transform:translate(20px,-25px) scale(1.1);
}

100%{
transform:translate(0,0) scale(1);
}

}

/* PARTÍCULAS */

.particle{
position:absolute;
background:#ff8a5c;
border-radius:50%;
opacity:.18;
animation:particle linear infinite;
}

@keyframes particle{

0%{
transform:translateY(0px);
opacity:0;
}

20%{
opacity:.4;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* APP */

.app{
position:relative;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:24px;
}

/* TOPO */

.topbar{
position:absolute;
top:26px;
left:24px;
right:24px;

display:flex;
justify-content:space-between;
align-items:center;

z-index:100;
}

/* LOGO */

.logo{
display:flex;
flex-direction:column;
}

.logo h1{

font-family:'Cormorant Garamond',serif;

font-size:52px;
font-weight:600;

letter-spacing:-2px;

background:
linear-gradient(
135deg,
#ffe0d1,
#ff6b3d
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.logo span{

font-size:10px;
letter-spacing:5px;
opacity:.45;
margin-top:-10px;
padding-left:4px;

}

/* BOTÕES TOPO */

.top-actions{
display:flex;
gap:12px;
}

.top-btn{
width:52px;
height:52px;

border-radius:18px;

background:rgba(255,255,255,.045);

border:1px solid rgba(255,255,255,.05);

backdrop-filter:blur(25px);

display:flex;
justify-content:center;
align-items:center;

font-size:17px;

color:white;
}

/* ÁREA CARD */

.cards-area{
position:relative;
width:100%;
max-width:390px;
height:78vh;
}

/* STACK */

.stack{
position:absolute;
inset:0;

border-radius:42px;
}

/* SOMBRA 1 */

.stack1{

transform:
translateY(16px)
scale(.96);

background:
linear-gradient(
180deg,
rgba(255,255,255,.03),
rgba(255,255,255,.015)
);

border:1px solid rgba(255,255,255,.03);

opacity:.5;

filter:blur(.3px);
}

/* SOMBRA 2 */

.stack2{

transform:
translateY(30px)
scale(.92);

background:
linear-gradient(
180deg,
rgba(255,255,255,.02),
rgba(255,255,255,.01)
);

border:1px solid rgba(255,255,255,.02);

opacity:.3;
}

/* CARD PRINCIPAL */

.card{
position:absolute;
inset:0;

border-radius:42px;

overflow:hidden;

background:#111;

box-shadow:
0 0 100px rgba(255,107,61,.08),
0 50px 120px rgba(0,0,0,.8);

transition:
transform .45s ease,
opacity .45s ease;
}

/* FOTO */

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* OVERLAY */

.overlay{
position:absolute;
inset:0;

background:
linear-gradient(
180deg,
rgba(0,0,0,.0) 18%,
rgba(0,0,0,.18) 45%,
rgba(0,0,0,.92) 100%
);
}

/* GLASS */

.glass{
position:absolute;
inset:0;

background:
linear-gradient(
180deg,
rgba(255,255,255,.04),
rgba(255,255,255,.01)
);
}

/* INFO */

.info{
position:absolute;

left:28px;
right:28px;
bottom:28px;

z-index:10;
}

/* VERIFIED */

.verified{

display:inline-flex;
align-items:center;
gap:8px;

padding:10px 16px;

border-radius:18px;

background:rgba(0,0,0,.35);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(20px);

font-size:13px;

margin-bottom:18px;
}

.verified i{
color:#ffb089;
}

/* NOME */

.name{

font-family:'Cormorant Garamond',serif;

font-size:62px;
font-weight:600;

line-height:.9;

letter-spacing:-3px;
}

.age{
font-size:28px;
color:#ff9d74;
margin-left:10px;
}

/* LOCAL */

.location{

margin-top:16px;

display:flex;
align-items:center;
gap:8px;

font-size:14px;
opacity:.72;
}

/* BIO */

.bio{

margin-top:18px;

font-size:14px;
line-height:1.8;

opacity:.88;
}

/* TAGS */

.tags{

display:flex;
flex-wrap:wrap;
gap:10px;

margin-top:24px;
}

.tag{

padding:11px 16px;

border-radius:18px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.05);

backdrop-filter:blur(20px);

font-size:13px;
}

/* BOTÕES */

.actions{

position:absolute;

bottom:118px;

display:flex;
align-items:center;
gap:24px;

z-index:100;
}

.action{

border:none;
cursor:pointer;

display:flex;
justify-content:center;
align-items:center;

transition:.25s;
}

.action:hover{
transform:scale(1.05);
}

/* X */

.close{

width:78px;
height:78px;

border-radius:50%;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.05);

backdrop-filter:blur(20px);

font-size:28px;

color:#ff9f9f;
}

/* CORAÇÃO */

.like{

width:100px;
height:100px;

border-radius:50%;

background:
linear-gradient(
135deg,
#ff6b3d,
#ff9852
);

font-size:40px;
color:white;

box-shadow:
0 0 40px rgba(255,107,61,.35),
0 0 100px rgba(255,107,61,.12);
}

/* NAVBAR */

.navbar{

position:absolute;

bottom:20px;
left:18px;
right:18px;

height:82px;

border-radius:30px;

background:rgba(255,255,255,.045);

border:1px solid rgba(255,255,255,.05);

backdrop-filter:blur(30px);

display:flex;
justify-content:space-around;
align-items:center;
}

.nav-item{

display:flex;
flex-direction:column;
align-items:center;
gap:7px;

font-size:12px;

opacity:.45;
}

.nav-item.active{
opacity:1;
color:#ff9d74;
}

.nav-item i{
font-size:21px;
}

/* MATCH */

.match{

position:fixed;
inset:0;

background:rgba(0,0,0,.85);

backdrop-filter:blur(30px);

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

z-index:999;

opacity:0;
pointer-events:none;

transition:.45s;
}

.match.show{
opacity:1;
pointer-events:auto;
}

.match h1{

font-family:'Cormorant Garamond',serif;

font-size:84px;

background:
linear-gradient(
135deg,
#ffe0d1,
#ff6b3d
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.match p{
opacity:.7;
margin-top:8px;
}

/* MOBILE */

@media(max-width:500px){

.cards-area{
height:76vh;
}

.name{
font-size:50px;
}

.like{
width:88px;
height:88px;
}

.close{
width:70px;
height:70px;
}

}

</style>
</head>

<body>

<!-- FUNDO -->

<div class="bg">

<div class="glow glow1"></div>
<div class="glow glow2"></div>
<div class="glow glow3"></div>

<div id="particles"></div>

</div>

<!-- APP -->

<div class="app">

<!-- TOPO -->

<div class="topbar">

<div class="logo">

<h1>Laço</h1>

<span>BRASA VIVA</span>

</div>

<div class="top-actions">

<div class="top-btn">
<i class="fa-regular fa-bell"></i>
</div>

<div class="top-btn">
<i class="fa-solid fa-sliders"></i>
</div>

</div>

</div>

<!-- ÁREA DOS CARDS -->

<div class="cards-area">

<div class="stack stack2"></div>

<div class="stack stack1"></div>

<!-- CARD -->

<div class="card" id="card">

<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop">

<div class="overlay"></div>

<div class="glass"></div>

<div class="info">

<div class="verified">
<i class="fa-solid fa-circle-check"></i>
Verificada
</div>

<div>
<span class="name">Aurora</span>
<span class="age">26</span>
</div>

<div class="location">
<i class="fa-solid fa-location-dot"></i>
São Paulo • 2km
</div>

<div class="bio">
Conexões reais, cafés demorados e pessoas que sabem sentir.
</div>

<div class="tags">

<div class="tag">Cinema</div>

<div class="tag">Arte</div>

<div class="tag">Música</div>

<div class="tag">Viagens</div>

</div>

</div>

</div>

</div>

<!-- BOTÕES -->

<div class="actions">

<button class="action close" onclick="dislike()">
<i class="fa-solid fa-xmark"></i>
</button>

<button class="action like" onclick="like()">
<i class="fa-solid fa-heart"></i>
</button>

</div>

<!-- NAVBAR -->

<div class="navbar">

<div class="nav-item active">
<i class="fa-solid fa-fire"></i>
<span>Explorar</span>
</div>

<div class="nav-item">
<i class="fa-regular fa-heart"></i>
<span>Likes</span>
</div>

<div class="nav-item">
<i class="fa-regular fa-comments"></i>
<span>Chat</span>
</div>

<div class="nav-item">
<i class="fa-solid fa-location-dot"></i>
<span>Vibe</span>
</div>

<div class="nav-item">
<i class="fa-regular fa-user"></i>
<span>Perfil</span>
</div>

</div>

</div>

<!-- MATCH -->

<div class="match" id="match">

<h1>Match</h1>

<p>Vocês sentiram a mesma energia.</p>

</div>

<script>

/* PARTÍCULAS */

const particles =
document.getElementById('particles');

for(let i=0;i<35;i++){

const p=document.createElement('div');

p.classList.add('particle');

const size=Math.random()*3+1;

p.style.width=size+'px';
p.style.height=size+'px';

p.style.left=Math.random()*100+'vw';
p.style.top=Math.random()*100+'vh';

p.style.animationDuration=
(10+Math.random()*12)+'s';

p.style.animationDelay=
Math.random()*5+'s';

particles.appendChild(p);

}

/* MATCH */

function like(){

const card =
document.getElementById('card');

card.style.transform=
'translateX(120%) scale(.92)';

card.style.opacity='0';

setTimeout(()=>{

document
.getElementById('match')
.classList.add('show');

},300);

}

/* DISLIKE */

function dislike(){

const card =
document.getElementById('card');

card.style.transform=
'translateX(-120%) scale(.92)';

card.style.opacity='0';

}

</script>

</body>
</html>
