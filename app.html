<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Laço 💘</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ff4d6d, #6a00f4);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  max-width: 360px;
  width: 100%;
  text-align: center;
}

.card {
  background: white;
  border-radius: 25px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 400px;
  object-fit: cover;
}

.actions {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}

button {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  font-size: 25px;
}

.premium {
  margin-top: 15px;
  background: gold;
  padding: 10px;
  border-radius: 20px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="card">
  <img id="foto">
  <h2 id="nome"></h2>
</div>

<div class="actions">
  <button onclick="pular()">❌</button>
  <button onclick="curtir()">❤️</button>
</div>

<div class="premium" onclick="virarPremium()">
  👑 Virar Premium
</div>

<p id="limite"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, getDoc, arrayUnion } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "lacoapp.firebaseapp.com",
  projectId: "lacoapp"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let usuarios = [];
let index = 0;
let usuarioId;
let likesHoje = 0;
let premium = false;

const limiteTexto = document.getElementById("limite");

// carregar
async function carregarUsuarios() {
  const snap = await getDocs(collection(db, "usuarios"));

  usuarios = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

  mostrar();
}

// mostrar
function mostrar() {
  if (index >= usuarios.length) return;

  const u = usuarios[index];

  document.getElementById("foto").src = u.foto;
  document.getElementById("nome").innerText = u.nome;
}

// curtir
window.curtir = async function() {

  if (!premium && likesHoje >= 5) {
    alert("Limite diário atingido! 😢");
    return;
  }

  likesHoje++;

  limiteTexto.innerText = "Likes hoje: " + likesHoje;

  index++;
  mostrar();
};

// pular
window.pular = function() {
  index++;
  mostrar();
};

// virar premium
window.virarPremium = function() {
  premium = true;
  alert("Agora você é Premium 👑");
};

// login
onAuthStateChanged(auth, (user) => {
  if (user) {
    usuarioId = user.uid;
    carregarUsuarios();
  }
});
</script>

</body>
</html>
