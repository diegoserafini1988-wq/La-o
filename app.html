<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>LAÇO 💘</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#080808;
overflow:hidden;
color:#fff;

}

/* FUNDO */

.bg{

position:fixed;
inset:0;
overflow:hidden;
z-index:-1;

}

.glow{

position:absolute;
border-radius:50%;
filter:blur(100px);

animation:float 10s infinite alternate ease-in-out;

}

.glow1{

width:320px;
height:320px;

background:
rgba(255,107,61,.18);

top:-80px;
left:-80px;

}

.glow2{

width:320px;
height:320px;

background:
rgba(255,140,80,.12);

bottom:-120px;
right:-80px;

animation-delay:2s;

}

@keyframes float{

from{
transform:translateY(0px);
}

to{
transform:translateY(40px);
}

}

/* HEADER */

.header{

padding:22px;

display:flex;
justify-content:space-between;
align-items:center;

}

.logo{

font-size:34px;
font-weight:800;

color:#FF8A3D;

text-shadow:
0 0 28px rgba(255,138,61,.35);

}

.badge{

padding:10px 16px;

border-radius:999px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.05);

backdrop-filter:blur(20px);

font-size:13px;
font-weight:600;

}

/* CONTAINER */

.container{

height:calc(100vh - 170px);

display:flex;
justify-content:center;
align-items:center;

padding:20px;

}

/* CARD STACK */

.stack{

position:relative;

width:360px;
height:620px;

}

/* SOMBRAS */

.shadow-card{

position:absolute;

width:100%;
height:100%;

border-radius:34px;

background:
rgba(255,255,255,.03);

border:
1px solid rgba(255,255,255,.04);

}

.shadow1{

transform:
translateY(12px)
scale(.96);

opacity:.35;

}

.shadow2{

transform:
translateY(24px)
scale(.92);

opacity:.18;

}

/* CARD */

.card{

position:absolute;

width:100%;
height:100%;

border-radius:34px;

overflow:hidden;

background:#111;

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 20px 80px rgba(0,0,0,.45),
0 0 60px rgba(255,107,61,.08);

}

.card img{

width:100%;
height:100%;

object-fit:cover;

transition:.25s;

}

/* OVERLAY */

.overlay{

position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,.92) 10%,
rgba(0,0,0,.22) 55%,
transparent 100%
);

display:flex;
flex-direction:column;
justify-content:flex-end;

padding:28px;

}

/* TEXTOS */

.nome{

font-size:34px;
font-weight:800;

margin-bottom:8px;

}

.bio{

font-size:15px;
line-height:1.6;

color:#ddd;

}

/* AÇÕES */

.actions{

position:absolute;
bottom:105px;

width:100%;

display:flex;
justify-content:center;
gap:22px;

}

.btn{

width:78px;
height:78px;

border:none;

border-radius:50%;

font-size:28px;

cursor:pointer;

transition:.25s;

backdrop-filter:blur(20px);

}

.nope{

background:
rgba(255,255,255,.08);

color:#fff;

}

.like{

background:
linear-gradient(
135deg,
#FF6B3D,
#FF8A3D
);

color:white;

box-shadow:
0 0 30px rgba(255,107,61,.35);

}

.btn:hover{

transform:scale(1.08);

}

/* NAV */

.bottom-nav{

position:fixed;
bottom:0;
left:0;

width:100%;
height:84px;

display:flex;
justify-content:space-around;
align-items:center;

background:
rgba(10,10,10,.82);

backdrop-filter:blur(24px);

border-top:
1px solid rgba(255,255,255,.05);

}

.nav-item{

display:flex;
flex-direction:column;
align-items:center;
gap:4px;

text-decoration:none;

font-size:12px;
font-weight:600;

color:#999;

transition:.3s;

}

.nav-item div{

font-size:22px;

}

.nav-item.active{

color:#FF8A3D;

text-shadow:
0 0 20px rgba(255,138,61,.4);

}

</style>

</head>

<body>

<div class="bg">

<div class="glow glow1"></div>

<div class="glow glow2"></div>

</div>

<!-- HEADER -->

<div class="header">

<div class="logo">
LAÇO 💘
</div>

<div class="badge">
BRASA VIVA
</div>

</div>

<!-- APP -->

<div class="container">

<div class="stack">

<div class="shadow-card shadow2"></div>

<div class="shadow-card shadow1"></div>

<div class="card">

<img id="foto" src="">

<div class="overlay">

<div class="nome" id="nome"></div>

<div class="bio" id="bio"></div>

</div>

</div>

</div>

</div>

<!-- AÇÕES -->

<div class="actions">

<button class="btn nope"
onclick="proximo()">

✕

</button>

<button class="btn like"
onclick="match()">

💘

</button>

</div>

<!-- NAV -->

<div class="bottom-nav">

<a href="app.html"
class="nav-item active">

<div>🔥</div>
<span>Explorar</span>

</a>

<a href="matches.html"
class="nav-item">

<div>💘</div>
<span>Matches</span>

</a>

<a href="chat.html"
class="nav-item">

<div>💬</div>
<span>Chat</span>

</a>

<a href="vibe.html"
class="nav-item">

<div>✨</div>
<span>Vibe</span>

</a>

<a href="perfil.html"
class="nav-item">

<div>👤</div>
<span>Perfil</span>

</a>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",

authDomain: "lacoapp.firebaseapp.com",

projectId: "lacoapp",

storageBucket: "lacoapp.firebasestorage.app",

messagingSenderId: "485009455528",

appId: "1:485009455528:web:0c43153be60e62cd6a459d",

measurementId: "G-MSB3J89XLL"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

/* PROTEÇÃO */

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href =
"login.html";

}

});

/* PERFIS */

const perfis = [

{
nome:"Aurora, 26",
bio:"Conexões reais começam na energia certa.",
foto:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Valentina, 24",
bio:"A madrugada aproxima pessoas raras.",
foto:"https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Emma, 28",
bio:"Química rara. Intensidade elegante.",
foto:"https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Olivia, 25",
bio:"Poucas conexões mudam tudo.",
foto:"https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Charlotte, 27",
bio:"A vibe certa sempre encontra você.",
foto:"https://images.unsplash.com/photo-1520813792240-56fc4a3765a7?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Mia, 23",
bio:"Conversas profundas valem mais.",
foto:"https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?q=80&w=1200&auto=format&fit=crop"
}

];

let atual = 0;

const foto =
document.getElementById("foto");

const nome =
document.getElementById("nome");

const bio =
document.getElementById("bio");

/* EMBARALHAR */

function embaralhar(){

for(
let i = perfis.length - 1;
i > 0;
i--
){

const j =
Math.floor(
Math.random() * (i + 1)
);

[perfis[i], perfis[j]] =
[perfis[j], perfis[i]];

}

}

/* CARREGAR */

function carregar(){

if(atual >= perfis.length){

embaralhar();

atual = 0;

}

const perfil =
perfis[atual];

foto.style.opacity = "0";

setTimeout(()=>{

foto.src = perfil.foto;

nome.innerText = perfil.nome;

bio.innerText = perfil.bio;

foto.style.opacity = "1";

},180);

}

/* PASSAR */

window.proximo = ()=>{

const card =
document.querySelector(".card");

card.animate([

{
transform:"translateX(0px) rotate(0deg)",
opacity:1
},

{
transform:"translateX(-140px) rotate(-10deg)",
opacity:0
}

],{

duration:260,
fill:"forwards"

});

setTimeout(()=>{

atual++;

carregar();

card.style.opacity = "1";

card.style.transform =
"translateX(0px)";

},250);

};

/* MATCH */

window.match = ()=>{

const card =
document.querySelector(".card");

card.animate([

{
transform:"translateX(0px) rotate(0deg)",
opacity:1
},

{
transform:"translateX(140px) rotate(10deg)",
opacity:0
}

],{

duration:260,
fill:"forwards"

});

mostrarMatch();

setTimeout(()=>{

atual++;

carregar();

card.style.opacity = "1";

card.style.transform =
"translateX(0px)";

},250);

};

/* ALERTA */

function mostrarMatch(){

const div =
document.createElement("div");

div.innerHTML =
"💘 Novo Match";

div.style.position =
"fixed";

div.style.top =
"50%";

div.style.left =
"50%";

div.style.transform =
"translate(-50%,-50%)";

div.style.padding =
"18px 34px";

div.style.borderRadius =
"22px";

div.style.background =
"rgba(10,10,10,.82)";

div.style.border =
"1px solid rgba(255,107,61,.25)";

div.style.backdropFilter =
"blur(24px)";

div.style.color =
"#FF8A3D";

div.style.fontWeight =
"700";

div.style.fontSize =
"20px";

div.style.zIndex =
"999999";

div.style.boxShadow =
"0 0 40px rgba(255,107,61,.25)";

document.body.appendChild(div);

setTimeout(()=>{

div.remove();

},1600);

}

/* START */

embaralhar();

carregar();

</script>

</body>
</html>
