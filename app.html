<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laço 💘</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{

height:100vh;
overflow:hidden;

background:
radial-gradient(circle at top,#ff006620,transparent 25%),
#050505;

color:white;

}

/* FUNDO */

.blur1{

position:fixed;

width:350px;
height:350px;

background:#ff0066;

filter:blur(140px);

opacity:.08;

top:-120px;
right:-120px;

border-radius:50%;

z-index:0;

}

.blur2{

position:fixed;

width:300px;
height:300px;

background:#ff4d6d;

filter:blur(120px);

opacity:.06;

bottom:-120px;
left:-120px;

border-radius:50%;

z-index:0;

}

/* HEADER */

.header{

position:fixed;

top:0;
left:0;

width:100%;

padding:22px 22px 14px;

display:flex;
justify-content:space-between;
align-items:center;

z-index:100;

background:
linear-gradient(to bottom,rgba(0,0,0,.6),transparent);

}

.logo{

font-size:30px;
font-weight:800;

letter-spacing:-1px;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.headerIcons{

display:flex;
gap:12px;

}

.headerBtn{

width:42px;
height:42px;

display:flex;
justify-content:center;
align-items:center;

border-radius:14px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.05);

backdrop-filter:blur(20px);

font-size:16px;

color:white;

}

/* AREA */

.area{

width:100%;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding-top:60px;
padding-bottom:110px;

position:relative;

}

/* CARD */

.card{

position:absolute;

width:92%;
max-width:410px;

height:74vh;

border-radius:34px;

overflow:hidden;

background:#111;

box-shadow:
0 25px 80px rgba(0,0,0,.5);

cursor:grab;

user-select:none;

transition:
transform .28s ease,
opacity .28s ease;

}

.card img{

width:100%;
height:100%;

object-fit:cover;

position:absolute;

}

/* GRADIENTE */

.gradient{

position:absolute;

bottom:0;
left:0;

width:100%;
height:55%;

background:
linear-gradient(to top,#000 10%,transparent);

}

/* INFO */

.info{

position:absolute;

bottom:24px;
left:24px;
right:24px;

z-index:5;

}

.topLine{

display:flex;
align-items:center;
gap:10px;

margin-bottom:8px;

}

.nome{

font-size:32px;
font-weight:800;

letter-spacing:-1px;

}

.idade{

font-size:28px;
font-weight:500;

opacity:.9;

}

.verify{

color:#4da6ff;
font-size:18px;

}

.local{

font-size:14px;

opacity:.78;

margin-bottom:14px;

}

.bio{

font-size:14px;
line-height:1.6;

opacity:.92;

max-width:90%;

}

/* INTERESSES */

.tags{

display:flex;
gap:10px;
flex-wrap:wrap;

margin-top:18px;

}

.tag{

padding:10px 14px;

border-radius:999px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,.05);

font-size:12px;
font-weight:500;

}

/* LIKE */

.like{

position:absolute;

top:35px;
left:25px;

padding:10px 18px;

border-radius:16px;

border:3px solid #00ff88;

color:#00ff88;

font-size:28px;
font-weight:800;

transform:rotate(-12deg);

opacity:0;

}

/* NOPE */

.nope{

position:absolute;

top:35px;
right:25px;

padding:10px 18px;

border-radius:16px;

border:3px solid #ff3b5c;

color:#ff3b5c;

font-size:28px;
font-weight:800;

transform:rotate(12deg);

opacity:0;

}

/* AÇÕES */

.actions{

position:fixed;

bottom:100px;
left:50%;

transform:translateX(-50%);

display:flex;
align-items:center;
gap:18px;

z-index:100;

}

.action{

display:flex;
justify-content:center;
align-items:center;

border-radius:50%;

backdrop-filter:blur(20px);

transition:.2s;

border:
1px solid rgba(255,255,255,.05);

}

.action:active{

transform:scale(.92);

}

.x{

width:66px;
height:66px;

background:
rgba(255,77,109,.12);

color:#ff4d6d;

font-size:28px;

}

.star{

width:56px;
height:56px;

background:
rgba(255,212,74,.10);

color:#ffd54a;

font-size:22px;

}

.heart{

width:76px;
height:76px;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

box-shadow:
0 12px 40px rgba(255,0,102,.25);

color:white;

font-size:30px;

}

/* NAVBAR */

.nav{

position:fixed;

bottom:0;
left:0;

width:100%;

padding:14px 10px 26px;

display:flex;
justify-content:space-around;
align-items:center;

background:
rgba(8,8,8,.92);

backdrop-filter:blur(30px);

border-top:
1px solid rgba(255,255,255,.05);

z-index:200;

}

.navItem{

display:flex;
flex-direction:column;
align-items:center;
gap:6px;

font-size:11px;
font-weight:500;

opacity:.45;

transition:.3s;

}

.navItem.active{

opacity:1;

color:#ff4d8d;

}

.navItem i{

font-size:20px;

}

/* MATCH */

.match{

position:fixed;

top:50%;
left:50%;

transform:
translate(-50%,-50%) scale(.8);

width:88%;
max-width:340px;

padding:35px;

border-radius:34px;

background:
rgba(15,15,15,.95);

backdrop-filter:blur(30px);

border:
1px solid rgba(255,255,255,.05);

text-align:center;

z-index:999;

opacity:0;
pointer-events:none;

transition:.35s;

}

.match.show{

opacity:1;
pointer-events:auto;

transform:
translate(-50%,-50%) scale(1);

}

.match h1{

font-size:38px;
font-weight:800;

margin-bottom:12px;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.match p{

opacity:.72;

line-height:1.5;

margin-bottom:25px;

}

.match button{

width:100%;

padding:16px;

border:none;

border-radius:18px;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

color:white;

font-weight:700;

font-size:15px;

}

/* RESPONSIVO */

@media(max-width:500px){

.card{
height:70vh;
}

.nome{
font-size:28px;
}

.idade{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="blur1"></div>
<div class="blur2"></div>

<!-- HEADER -->

<div class="header">

<div class="logo">
Laço 💘
</div>

<div class="headerIcons">

<div class="headerBtn">
<i class="fa-solid fa-bell"></i>
</div>

<div class="headerBtn">
<i class="fa-solid fa-sliders"></i>
</div>

</div>

</div>

<!-- AREA -->

<div class="area" id="area"></div>

<!-- ACTIONS -->

<div class="actions">

<div class="action x" onclick="swipeLeft()">
<i class="fa-solid fa-xmark"></i>
</div>

<div class="action star">
<i class="fa-solid fa-star"></i>
</div>

<div class="action heart" onclick="swipeRight()">
<i class="fa-solid fa-heart"></i>
</div>

</div>

<!-- NAV -->

<div class="nav">

<div class="navItem active">
<i class="fa-solid fa-fire"></i>
<span>Explorar</span>
</div>

<div class="navItem">
<i class="fa-solid fa-heart"></i>
<span>Likes</span>
</div>

<div class="navItem">
<i class="fa-solid fa-comments"></i>
<span>Chat</span>
</div>

<div class="navItem">
<i class="fa-solid fa-location-dot"></i>
<span>Vibe</span>
</div>

<div class="navItem">
<i class="fa-solid fa-user"></i>
<span>Perfil</span>
</div>

</div>

<!-- MATCH -->

<div class="match" id="match">

<h1>É Match 💘</h1>

<p>
Vocês curtiram um ao outro.
Agora a conversa pode começar.
</p>

<button onclick="closeMatch()">
Continuar
</button>

</div>

<script>

const perfis = [

{
nome:"Amanda",
idade:24,
cidade:"Rio de Janeiro",
bio:"Praia, viagens e pessoas que fazem a conversa valer a pena.",
foto:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop",
interesses:["Viagens","Praia","Música"]
},

{
nome:"Camila",
idade:27,
cidade:"São Paulo",
bio:"Café forte, academia e conversas de madrugada.",
foto:"https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?q=80&w=1200&auto=format&fit=crop",
interesses:["Cinema","Fitness","Café"]
},

{
nome:"Isabella",
idade:22,
cidade:"Belo Horizonte",
bio:"Adrenalina, rolês inesperados e boas risadas.",
foto:"https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200&auto=format&fit=crop",
interesses:["Shows","Trilhas","Fotografia"]
}

];

const area =
document.getElementById("area");

let current = 0;

function render(){

area.innerHTML = "";

for(let i = perfis.length - 1; i >= current; i--){

const p = perfis[i];

const card =
document.createElement("div");

card.className = "card";

card.innerHTML = `

<img src="${p.foto}">

<div class="like">LIKE</div>

<div class="nope">NOPE</div>

<div class="gradient"></div>

<div class="info">

<div class="topLine">

<div class="nome">
${p.nome}
</div>

<div class="idade">
${p.idade}
</div>

<i class="fa-solid fa-circle-check verify"></i>

</div>

<div class="local">
📍 ${p.cidade}
</div>

<div class="bio">
${p.bio}
</div>

<div class="tags">

${p.interesses.map(tag =>
`<div class="tag">${tag}</div>`
).join("")}

</div>

</div>

`;

area.appendChild(card);

if(i === current){

drag(card);

}

}

}

render();

/* DRAG */

function drag(card){

let startX = 0;
let currentX = 0;
let dragging = false;

card.addEventListener("mousedown",start);
card.addEventListener("touchstart",start);

function start(e){

dragging = true;

startX =
e.type.includes("mouse")
? e.pageX
: e.touches[0].pageX;

document.addEventListener("mousemove",move);
document.addEventListener("touchmove",move);

document.addEventListener("mouseup",end);
document.addEventListener("touchend",end);

}

function move(e){

if(!dragging) return;

currentX =
e.type.includes("mouse")
? e.pageX
: e.touches[0].pageX;

const dx =
currentX - startX;

const rotate =
dx / 14;

card.style.transform =
`translateX(${dx}px) rotate(${rotate}deg)`;

const like =
card.querySelector(".like");

const nope =
card.querySelector(".nope");

if(dx > 0){

like.style.opacity =
dx / 100;

nope.style.opacity = 0;

}else{

nope.style.opacity =
Math.abs(dx) / 100;

like.style.opacity = 0;

}

}

function end(){

dragging = false;

const dx =
currentX - startX;

if(dx > 110){

likeCard();

}else if(dx < -110){

dislikeCard();

}else{

card.style.transform = "";

card.querySelector(".like").style.opacity = 0;

card.querySelector(".nope").style.opacity = 0;

}

document.removeEventListener("mousemove",move);
document.removeEventListener("touchmove",move);

}

function likeCard(){

card.style.transform =
"translateX(130%) rotate(25deg)";

setTimeout(()=>{

showMatch();

next();

},280);

}

function dislikeCard(){

card.style.transform =
"translateX(-130%) rotate(-25deg)";

setTimeout(()=>{

next();

},280);

}

}

function next(){

current++;

if(current >= perfis.length){

current = 0;

}

render();

}

function swipeRight(){

showMatch();
next();

}

function swipeLeft(){

next();

}

function showMatch(){

document
.getElementById("match")
.classList.add("show");

}

function closeMatch(){

document
.getElementById("match")
.classList.remove("show");

}

</script>

</body>
</html>
