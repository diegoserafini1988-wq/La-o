<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laço 💘</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{

background:
radial-gradient(circle at top,#ff006655,transparent 30%),
radial-gradient(circle at bottom,#ff4d6d22,transparent 30%),
#050505;

height:100vh;
overflow:hidden;
color:white;

}

/* TOPO */

.topo{

position:fixed;

top:0;
left:0;

width:100%;

padding:22px;

display:flex;
justify-content:space-between;
align-items:center;

z-index:100;

backdrop-filter:blur(20px);

background:
linear-gradient(to bottom,rgba(0,0,0,.45),transparent);

}

.logo{

font-size:34px;
font-weight:800;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.topIcons{

display:flex;
gap:12px;

}

.topIcons i{

width:44px;
height:44px;

display:flex;
justify-content:center;
align-items:center;

border-radius:16px;

background:
rgba(255,255,255,.06);

border:
1px solid rgba(255,255,255,.05);

font-size:18px;

backdrop-filter:blur(20px);

}

/* AREA */

.area{

width:100%;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding-top:80px;
padding-bottom:120px;

position:relative;

}

/* CARD */

.card{

position:absolute;

width:92%;
max-width:420px;
height:72vh;

border-radius:34px;

overflow:hidden;

background:#111;

box-shadow:
0 25px 80px rgba(0,0,0,.55);

user-select:none;

cursor:grab;

transition:
transform .25s ease,
opacity .25s ease;

}

.card img{

width:100%;
height:100%;

object-fit:cover;

position:absolute;
top:0;
left:0;

}

.overlay{

position:absolute;

bottom:0;
left:0;

width:100%;

padding:26px;

background:
linear-gradient(to top,#000 5%,transparent);

}

.nome{

font-size:34px;
font-weight:700;

margin-bottom:6px;

display:flex;
align-items:center;
gap:10px;

}

.verificado{

color:#4da6ff;
font-size:18px;

}

.bio{

font-size:14px;
line-height:1.6;

opacity:.92;

margin-top:10px;

}

.info{

display:flex;
gap:10px;
flex-wrap:wrap;

margin-top:16px;

}

.tag{

padding:10px 14px;

border-radius:999px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(10px);

font-size:12px;

border:
1px solid rgba(255,255,255,.05);

}

/* LIKE */

.like{

position:absolute;

top:30px;
left:25px;

padding:12px 18px;

border:4px solid #00ff88;

color:#00ff88;

font-size:32px;
font-weight:800;

border-radius:18px;

transform:rotate(-15deg);

opacity:0;

}

/* NOPE */

.nope{

position:absolute;

top:30px;
right:25px;

padding:12px 18px;

border:4px solid #ff3b5c;

color:#ff3b5c;

font-size:32px;
font-weight:800;

border-radius:18px;

transform:rotate(15deg);

opacity:0;

}

/* BOTÕES */

.actions{

position:fixed;

bottom:95px;
left:50%;

transform:translateX(-50%);

display:flex;
gap:18px;

z-index:100;

}

.btn{

width:70px;
height:70px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:24px;

background:
rgba(255,255,255,.06);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 10px 40px rgba(0,0,0,.3);

transition:.25s;

}

.btn:active{

transform:scale(.92);

}

.dislike{
color:#ff4d6d;
}

.likeBtn{
color:#00ff88;
}

.star{
color:#ffd54a;
}

/* NAVBAR */

.nav{

position:fixed;

bottom:0;
left:0;

width:100%;

padding:18px 10px 28px;

display:flex;
justify-content:space-around;
align-items:center;

background:
rgba(10,10,10,.82);

backdrop-filter:blur(30px);

border-top:
1px solid rgba(255,255,255,.05);

z-index:200;

}

.navItem{

display:flex;
flex-direction:column;
align-items:center;
gap:6px;

font-size:12px;

opacity:.55;

transition:.3s;

}

.navItem.active{

opacity:1;

color:#ff4d8d;

}

.navItem i{

font-size:22px;

}

/* MATCH */

.match{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%) scale(.7);

background:
rgba(15,15,15,.95);

padding:40px;

border-radius:34px;

text-align:center;

z-index:999;

opacity:0;
pointer-events:none;

transition:.4s;

backdrop-filter:blur(30px);

border:
1px solid rgba(255,255,255,.06);

}

.match.show{

opacity:1;

transform:translate(-50%,-50%) scale(1);

}

.match h1{

font-size:42px;

margin-bottom:12px;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.match p{

opacity:.75;

margin-bottom:25px;

}

.match button{

padding:15px 24px;

border:none;

border-radius:16px;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

color:white;

font-weight:700;

font-size:15px;

}

/* RESPONSIVO */

@media(max-width:500px){

.card{
height:68vh;
}

.nome{
font-size:28px;
}

}

</style>

</head>

<body>

<!-- TOPO -->

<div class="topo">

<div class="logo">
Laço 💘
</div>

<div class="topIcons">

<i class="fa-solid fa-bell"></i>

<i class="fa-solid fa-sliders"></i>

</div>

</div>

<!-- AREA -->

<div class="area" id="area"></div>

<!-- BOTÕES -->

<div class="actions">

<div class="btn dislike" onclick="swipeLeft()">
<i class="fa-solid fa-xmark"></i>
</div>

<div class="btn star">
<i class="fa-solid fa-star"></i>
</div>

<div class="btn likeBtn" onclick="swipeRight()">
<i class="fa-solid fa-heart"></i>
</div>

</div>

<!-- NAV -->

<div class="nav">

<div class="navItem active">
<i class="fa-solid fa-fire"></i>
<span>Descobrir</span>
</div>

<div class="navItem">
<i class="fa-solid fa-heart"></i>
<span>Matches</span>
</div>

<div class="navItem">
<i class="fa-solid fa-comments"></i>
<span>Chat</span>
</div>

<div class="navItem">
<i class="fa-solid fa-location-dot"></i>
<span>Vibe</span>
</div>

<div class="navItem">
<i class="fa-solid fa-user"></i>
<span>Perfil</span>
</div>

</div>

<!-- MATCH -->

<div class="match" id="match">

<h1>É MATCH 💘</h1>

<p>
Vocês curtiram um ao outro.
</p>

<button onclick="fecharMatch()">
Continuar
</button>

</div>

<script>

const perfis = [

{
nome:"Amanda",
idade:24,
cidade:"Rio de Janeiro",
bio:"Apaixonada por viagens, praia e conexões intensas.",
foto:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop",
interesses:["Praia","Viagens","Música","Fitness"]
},

{
nome:"Camila",
idade:27,
cidade:"São Paulo",
bio:"Café, academia e conversas até de madrugada.",
foto:"https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?q=80&w=1200&auto=format&fit=crop",
interesses:["Café","Cinema","Treino","Pets"]
},

{
nome:"Isabella",
idade:22,
cidade:"Belo Horizonte",
bio:"Gosto de adrenalina, risadas e pessoas verdadeiras.",
foto:"https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200&auto=format&fit=crop",
interesses:["Rolês","Trilhas","Shows","Fotografia"]
}

];

const area =
document.getElementById("area");

let current = 0;

function renderCards(){

area.innerHTML = "";

for(let i = perfis.length - 1; i >= current; i--){

const p = perfis[i];

const card =
document.createElement("div");

card.className = "card";

card.innerHTML = `

<img src="${p.foto}">

<div class="like">LIKE</div>

<div class="nope">NOPE</div>

<div class="overlay">

<div class="nome">

${p.nome}, ${p.idade}

<i class="fa-solid fa-circle-check verificado"></i>

</div>

<div>${p.cidade}</div>

<div class="bio">
${p.bio}
</div>

<div class="info">

${p.interesses.map(i =>
`<div class="tag">${i}</div>`
).join("")}

</div>

</div>

`;

area.appendChild(card);

if(i === current){

drag(card);

}

}

}

renderCards();

/* DRAG */

function drag(card){

let startX = 0;

let currentX = 0;

let isDragging = false;

card.addEventListener("mousedown",start);
card.addEventListener("touchstart",start);

function start(e){

isDragging = true;

startX =
e.type.includes("mouse")
? e.pageX
: e.touches[0].pageX;

document.addEventListener("mousemove",move);
document.addEventListener("touchmove",move);

document.addEventListener("mouseup",end);
document.addEventListener("touchend",end);

}

function move(e){

if(!isDragging) return;

currentX =
e.type.includes("mouse")
? e.pageX
: e.touches[0].pageX;

const x =
currentX - startX;

card.style.transform =
`translateX(${x}px) rotate(${x/10}deg)`;

const like =
card.querySelector(".like");

const nope =
card.querySelector(".nope");

if(x > 0){

like.style.opacity =
x / 120;

nope.style.opacity = 0;

}else{

nope.style.opacity =
Math.abs(x) / 120;

like.style.opacity = 0;

}

}

function end(){

isDragging = false;

const x =
currentX - startX;

if(x > 120){

like();

}else if(x < -120){

dislike();

}else{

card.style.transform = "";
card.querySelector(".like").style.opacity = 0;
card.querySelector(".nope").style.opacity = 0;

}

document.removeEventListener("mousemove",move);
document.removeEventListener("touchmove",move);

}

function like(){

card.style.transform =
"translateX(120%) rotate(25deg)";

setTimeout(()=>{

showMatch();

next();

},300);

}

function dislike(){

card.style.transform =
"translateX(-120%) rotate(-25deg)";

setTimeout(()=>{

next();

},300);

}

}

function next(){

current++;

if(current >= perfis.length){

current = 0;

}

renderCards();

}

function swipeRight(){

showMatch();

next();

}

function swipeLeft(){

next();

}

function showMatch(){

document
.getElementById("match")
.classList.add("show");

}

function fecharMatch(){

document
.getElementById("match")
.classList.remove("show");

}

</script>

</body>
</html>
