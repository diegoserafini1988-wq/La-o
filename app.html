<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laço 💘</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
font-family:Segoe UI;
color:white;
overflow:hidden;
}

/* TOPO */

.topo{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

.logo{
font-size:30px;
color:#ff2d75;
font-weight:bold;
}

.icons{
display:flex;
gap:12px;
}

/* ICONES */

.icon{
width:45px;
height:45px;
border-radius:50%;
background:#111;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:.2s;
font-size:20px;
}

.icon:hover{
transform:scale(1.1);
background:#1a1a1a;
}

/* AREA */

.area{
height:calc(100vh - 80px);
display:flex;
justify-content:center;
align-items:center;
}

/* CARD */

.card{
width:360px;
height:640px;
border-radius:30px;
overflow:hidden;
position:relative;
background:#000;
box-shadow:0 0 50px rgba(255,0,90,.25);
transition:.3s;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* OVERLAY */

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:25px;
background:linear-gradient(transparent,black);
}

.nome{
font-size:30px;
font-weight:bold;
}

.bio{
margin-top:10px;
opacity:.9;
}

/* STAMP */

.stamp{
position:absolute;
top:40px;
left:20px;
font-size:28px;
padding:8px 18px;
border-radius:10px;
font-weight:bold;
display:none;
}

.likeStamp{
color:#00ff88;
border:3px solid #00ff88;
}

.nopeStamp{
color:#ff4d6d;
border:3px solid #ff4d6d;
}

/* BOTÕES */

.actions{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:25px;
}

.btn{
width:70px;
height:70px;
border-radius:50%;
border:none;
cursor:pointer;
font-size:25px;
}

.nope{
background:#1a1a1a;
color:#ff4d6d;
}

.like{
background:#ff2d75;
color:white;
}

/* MATCH */

.match{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

.match h1{
color:#ff2d75;
font-size:50px;
}

.match p{
margin-top:10px;
}

.match button{
margin-top:20px;
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff2d75;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topo">

<div class="logo">Laço 💘</div>

<div class="icons">

<div class="icon" onclick="window.location.href='vibe.html'">📍</div>

<div class="icon" onclick="window.location.href='matches.html'">💬</div>

<div class="icon" onclick="window.location.href='likes.html'">⭐</div>

<div class="icon" onclick="window.location.href='perfil.html'">👤</div>

</div>

</div>

<div class="area">

<div class="card" id="card">

<img id="foto">

<div class="stamp likeStamp" id="likeStamp">LIKE</div>
<div class="stamp nopeStamp" id="nopeStamp">NOPE</div>

<div class="overlay">
<div class="nome" id="nome"></div>
<div class="bio" id="bio"></div>
</div>

<div class="actions">
<button class="btn nope" onclick="passar()">✖</button>
<button class="btn like" onclick="curtir()">❤</button>
</div>

</div>

</div>

<div class="match" id="match">
<h1>💘 MATCH</h1>
<p id="textoMatch"></p>
<button onclick="fecharMatch()">Continuar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getFirestore,collection,getDocs,doc,updateDoc,arrayUnion,getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
getAuth,onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",
authDomain: "lacoapp.firebaseapp.com",
projectId: "lacoapp",
storageBucket: "lacoapp.firebasestorage.app",
messagingSenderId: "485009455528",
appId: "1:485009455528:web:0c43153be60e62cd6a459d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let usuarios=[];
let index=0;
let meuId=null;

const foto=document.getElementById("foto");
const nome=document.getElementById("nome");
const bio=document.getElementById("bio");
const card=document.getElementById("card");

const likeStamp=document.getElementById("likeStamp");
const nopeStamp=document.getElementById("nopeStamp");

onAuthStateChanged(auth,async(user)=>{

if(!user){
window.location.href="login.html";
return;
}

meuId=user.uid;

const snap=await getDocs(collection(db,"usuarios"));

usuarios=snap.docs.map(doc=>({id:doc.id,...doc.data()}))
.filter(u=>u.id!==meuId);

mostrar();

});

function mostrar(){

const user=usuarios[index];

foto.src=user.foto || "";
nome.innerText=user.nome || "Sem nome";
bio.innerText=user.bio || "";

likeStamp.style.display="none";
nopeStamp.style.display="none";

}

/* PASSAR */

window.passar=function(){
nopeStamp.style.display="block";
animar(-400,-20);
};

/* CURTIR */

window.curtir=async function(){

likeStamp.style.display="block";

const user=usuarios[index];

await updateDoc(doc(db,"usuarios",meuId),{
likes:arrayUnion(user.id)
});

await updateDoc(doc(db,"usuarios",user.id),{
likesRecebidos:arrayUnion(meuId)
});

const snap=await getDoc(doc(db,"usuarios",user.id));
const dados=snap.data();

if(dados.likes && dados.likes.includes(meuId)){

await updateDoc(doc(db,"usuarios",meuId),{
matches:arrayUnion(user.id)
});

await updateDoc(doc(db,"usuarios",user.id),{
matches:arrayUnion(meuId)
});

document.getElementById("textoMatch").innerText =
"Você e " + user.nome + " se curtiram 💘";

document.getElementById("match").style.display="flex";
}

animar(400,20);

};

/* ANIMAÇÃO */

function animar(x,rot){
card.style.transform=`translateX(${x}px) rotate(${rot}deg)`;
setTimeout(()=>{proximo();},250);
}

/* PROXIMO */

function proximo(){
index++;
if(index>=usuarios.length){index=0;}
card.style.transform="translateX(0)";
mostrar();
}

/* MATCH */

window.fecharMatch=function(){
document.getElementById("match").style.display="none";
};

</script>

</body>
</html>
