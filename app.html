<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */

const firebaseConfig = {
  apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",
  authDomain: "lacoapp.firebaseapp.com",
  projectId: "lacoapp",
  storageBucket: "lacoapp.firebasestorage.app",
  messagingSenderId: "485009455528",
  appId: "1:485009455528:web:0c43153be60e62cd6a459d",
  measurementId: "G-MSB3J89XLL"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

/* PROTEÇÃO */

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href="login.html";

}

});

/* BASE DE PERFIS PREMIUM */

const perfis = [

{
nome:"Sophie, 26",
bio:"Conexões reais. Conversas profundas. Madrugadas inesquecíveis.",
foto:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Aurora, 28",
bio:"A química certa muda tudo.",
foto:"https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Emma, 24",
bio:"Jazz, vinho e tensão elegante.",
foto:"https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Olivia, 27",
bio:"Poucas conexões. Intensidade verdadeira.",
foto:"https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Valentina, 25",
bio:"Energia boa atrai pessoas raras.",
foto:"https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Charlotte, 29",
bio:"A madrugada sempre revela quem é real.",
foto:"https://images.unsplash.com/photo-1520813792240-56fc4a3765a7?q=80&w=1200&auto=format&fit=crop"
},

{
nome:"Mia, 23",
bio:"Conexões começam no olhar.",
foto:"https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?q=80&w=1200&auto=format&fit=crop"
}

];

let atual = 0;

/* ELEMENTOS */

const foto = document.getElementById("foto");

const nome = document.getElementById("nome");

const bio = document.getElementById("bio");

const card = document.querySelector(".card");

/* TROCAR PERFIL */

function trocarPerfil(){

card.style.opacity = "0";

card.style.transform = "scale(.96)";

setTimeout(()=>{

if(atual >= perfis.length){

embaralharPerfis();

atual = 0;

}

foto.src = perfis[atual].foto;

nome.innerText = perfis[atual].nome;

bio.innerText = perfis[atual].bio;

card.style.opacity = "1";

card.style.transform = "scale(1)";

},250);

}

/* EMBARALHAR */

function embaralharPerfis(){

for(let i = perfis.length - 1; i > 0; i--){

const j = Math.floor(Math.random() * (i + 1));

[perfis[i], perfis[j]] = [perfis[j], perfis[i]];

}

}

/* PASSAR */

window.proximo = ()=>{

card.animate([

{
transform:"translateX(0) rotate(0deg)",
opacity:1
},

{
transform:"translateX(-120px) rotate(-8deg)",
opacity:0
}

],{
duration:320,
fill:"forwards"
});

setTimeout(()=>{

atual++;

trocarPerfil();

},280);

};

/* MATCH */

window.match = ()=>{

card.animate([

{
transform:"translateX(0) rotate(0deg)",
opacity:1
},

{
transform:"translateX(120px) rotate(8deg)",
opacity:0
}

],{
duration:320,
fill:"forwards"
});

setTimeout(()=>{

mostrarMatch();

atual++;

trocarPerfil();

},280);

};

/* MATCH PREMIUM */

function mostrarMatch(){

const div = document.createElement("div");

div.innerHTML = "💘 Novo Match";

div.style.position = "fixed";

div.style.top = "50%";

div.style.left = "50%";

div.style.transform = "translate(-50%,-50%)";

div.style.padding = "18px 34px";

div.style.background = "rgba(15,15,15,.88)";

div.style.border = "1px solid rgba(255,107,61,.35)";

div.style.borderRadius = "18px";

div.style.backdropFilter = "blur(20px)";

div.style.fontSize = "20px";

div.style.fontWeight = "700";

div.style.color = "#FF8A3D";

div.style.boxShadow = "0 0 40px rgba(255,107,61,.25)";

div.style.zIndex = "999999";

document.body.appendChild(div);

setTimeout(()=>{

div.remove();

},1800);

}

/* INICIAR */

trocarPerfil();

</script>
