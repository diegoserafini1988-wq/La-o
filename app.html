<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Laço 💘</title>

<style>
body {
  margin:0;
  background:#000;
  color:white;
  font-family: Arial;
  overflow:hidden;
}

/* HEADER */
.header {
  padding:15px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #111;
}

/* CARD */
.container {
  display:flex;
  justify-content:center;
  align-items:center;
  height:80vh;
}

.card {
  width:320px;
  height:500px;
  border-radius:20px;
  overflow:hidden;
  position:absolute;
  touch-action:none;
  transition: transform 0.3s ease;
}

.card img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay {
  position:absolute;
  bottom:0;
  padding:20px;
  width:100%;
  background:linear-gradient(transparent, rgba(0,0,0,0.9));
}

/* BOTÕES */
.actions {
  display:flex;
  justify-content:center;
  gap:20px;
}

button {
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:25px;
}
</style>

</head>

<body>

<div class="header">
  <div>Laço 💘</div>
  <div onclick="location.href='matches.html'">💬</div>
</div>

<div class="container">
  <div class="card" id="card">
    <img id="foto">
    <div class="overlay">
      <h2 id="nome"></h2>
      <p id="idade"></p>
    </div>
  </div>
</div>

<div class="actions">
  <button onclick="nope()">❌</button>
  <button onclick="like()">❤️</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",
  authDomain: "lacoapp.firebaseapp.com",
  projectId: "lacoapp"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let usuarios = [];
let index = 0;

const card = document.getElementById("card");

function mostrar() {
  if (index >= usuarios.length) return;

  const u = usuarios[index];
  foto.src = u.foto;
  nome.innerText = u.nome;
  idade.innerText = u.idade;
}

onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href = "login.html";

  const snap = await getDocs(collection(db, "usuarios"));
  usuarios = snap.docs.map(d => d.data());

  mostrar();
});

// 👉 SWIPE
let startX = 0;

card.addEventListener("pointerdown", e => {
  startX = e.clientX;
});

card.addEventListener("pointermove", e => {
  let move = e.clientX - startX;
  card.style.transform = `translateX(${move}px) rotate(${move/10}deg)`;
});

card.addEventListener("pointerup", e => {
  let move = e.clientX - startX;

  if (move > 100) {
    like();
  } else if (move < -100) {
    nope();
  } else {
    card.style.transform = "";
  }
});

window.like = function() {
  card.style.transform = "translateX(500px) rotate(30deg)";
  setTimeout(proximo, 200);
};

window.nope = function() {
  card.style.transform = "translateX(-500px) rotate(-30deg)";
  setTimeout(proximo, 200);
};

function proximo() {
  index++;
  card.style.transform = "";
  mostrar();
}
</script>

</body>
</html>
