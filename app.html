<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laço 💘</title>

<!-- FONT -->

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"
>

<!-- ICONS -->

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
radial-gradient(circle at top,#ff006633,transparent 25%),
radial-gradient(circle at bottom,#ff4d6d22,transparent 25%),
#050505;

height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

color:white;

}

/* APP */

.app{

width:100%;
max-width:430px;
height:100vh;

position:relative;
overflow:hidden;

background:
linear-gradient(to bottom,
rgba(255,255,255,.04),
rgba(255,255,255,.02)
);

backdrop-filter:blur(30px);

border-left:1px solid rgba(255,255,255,.05);
border-right:1px solid rgba(255,255,255,.05);

}

/* PARTICLES */

.particle{

position:absolute;
border-radius:50%;
background:rgba(255,0,102,.18);

animation:float 12s infinite linear;

}

@keyframes float{

from{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:1;
}

to{
transform:translateY(-120vh);
opacity:0;
}

}

/* HEADER */

.header{

position:absolute;
top:0;
left:0;

width:100%;
padding:20px;

display:flex;
justify-content:space-between;
align-items:center;

z-index:50;

background:
linear-gradient(to bottom,
rgba(0,0,0,.65),
transparent);

}

.logo{

font-size:34px;
font-weight:800;

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.header-actions{

display:flex;
gap:12px;

}

.header-btn{

width:46px;
height:46px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

font-size:18px;

cursor:pointer;

transition:.3s;

}

.header-btn:hover{

transform:scale(1.08);

background:rgba(255,255,255,.14);

}

/* CARDS */

.cards{

position:absolute;

top:90px;
left:0;

width:100%;
height:calc(100vh - 200px);

display:flex;
justify-content:center;
align-items:center;

}

/* CARD */

.card{

position:absolute;

width:92%;
height:100%;

border-radius:36px;

overflow:hidden;

background:#111;

box-shadow:
0 30px 80px rgba(0,0,0,.6),
0 0 60px rgba(255,0,102,.12);

cursor:grab;

user-select:none;

transition:
transform .25s ease,
opacity .25s ease;

}

.card img{

width:100%;
height:100%;
object-fit:cover;

}

/* GRADIENT */

.card::after{

content:"";

position:absolute;
left:0;
bottom:0;

width:100%;
height:55%;

background:
linear-gradient(to top,
rgba(0,0,0,.95),
transparent);

}

/* INFO */

.info{

position:absolute;
bottom:0;
left:0;

width:100%;
padding:28px;

z-index:5;

}

.top-info{

display:flex;
align-items:center;
gap:10px;

margin-bottom:8px;

}

.name{

font-size:38px;
font-weight:700;

}

.verified{

color:#3ea6ff;
font-size:20px;

}

.distance{

opacity:.8;
font-size:14px;

margin-bottom:14px;

}

.bio{

font-size:15px;
line-height:1.5;

opacity:.92;

margin-bottom:18px;

}

/* TAGS */

.tags{

display:flex;
gap:10px;
flex-wrap:wrap;

}

.tag{

padding:10px 16px;

border-radius:999px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(10px);

font-size:13px;

}

/* ACTIONS */

.actions{

position:absolute;

bottom:105px;
left:50%;

transform:translateX(-50%);

display:flex;
gap:24px;

z-index:60;

}

.action{

width:78px;
height:78px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:30px;

cursor:pointer;

transition:.3s;

backdrop-filter:blur(25px);

}

.dislike{

background:rgba(255,255,255,.08);

color:#ff4d6d;

}

.like{

background:
linear-gradient(45deg,#ff0066,#ff4d8d);

box-shadow:
0 0 40px rgba(255,0,102,.45);

}

.action:hover{

transform:scale(1.12);

}

/* NAV */

.nav{

position:absolute;
bottom:0;
left:0;

width:100%;
height:88px;

display:flex;
justify-content:space-around;
align-items:center;

background:rgba(0,0,0,.55);

backdrop-filter:blur(25px);

border-top:1px solid rgba(255,255,255,.05);

z-index:100;

}

.nav-item{

display:flex;
flex-direction:column;
align-items:center;

gap:6px;

font-size:12px;

opacity:.55;

transition:.25s;

cursor:pointer;

}

.nav-item.active{

opacity:1;
color:#ff4d8d;

}

.nav-item i{

font-size:21px;

}

/* MATCH EFFECT */

.match{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%) scale(.5);

font-size:120px;

opacity:0;

pointer-events:none;

z-index:999;

}

.showMatch{

animation:match .8s ease;

}

@keyframes match{

0%{
opacity:0;
transform:translate(-50%,-50%) scale(.3);
}

50%{
opacity:1;
transform:translate(-50%,-50%) scale(1.2);
}

100%{
opacity:0;
transform:translate(-50%,-50%) scale(1.8);
}

}

</style>

</head>

<body>

<div class="app">

<!-- PARTICLES -->

<div class="particle" style="width:6px;height:6px;left:10%;animation-delay:0s;"></div>
<div class="particle" style="width:4px;height:4px;left:25%;animation-delay:2s;"></div>
<div class="particle" style="width:8px;height:8px;left:60%;animation-delay:4s;"></div>
<div class="particle" style="width:5px;height:5px;left:85%;animation-delay:1s;"></div>

<!-- HEADER -->

<div class="header">

<div class="logo">
Laço
</div>

<div class="header-actions">

<div class="header-btn">
<i class="fa-solid fa-magnifying-glass"></i>
</div>

<div class="header-btn">
<i class="fa-solid fa-bell"></i>
</div>

</div>

</div>

<!-- STACK -->

<div class="cards" id="cards"></div>

<!-- ACTIONS -->

<div class="actions">

<div class="action dislike" onclick="dislike()">
<i class="fa-solid fa-xmark"></i>
</div>

<div class="action like" onclick="like()">
<i class="fa-solid fa-heart"></i>
</div>

</div>

<!-- NAV -->

<div class="nav">

<div class="nav-item active">
<i class="fa-solid fa-house"></i>
<span>Início</span>
</div>

<div class="nav-item">
<i class="fa-solid fa-fire"></i>
<span>Likes</span>
</div>

<div class="nav-item">
<i class="fa-solid fa-comments"></i>
<span>Chat</span>
</div>

<div class="nav-item">
<i class="fa-solid fa-location-dot"></i>
<span>Vibe</span>
</div>

<div class="nav-item">
<i class="fa-solid fa-user"></i>
<span>Perfil</span>
</div>

</div>

<!-- EFFECT -->

<div class="match" id="match">
💘
</div>

</div>

<script type="module">

/* FIREBASE */

import {

auth,
db

}

from "./js/firebase.js";

import {

collection,
addDoc,
serverTimestamp

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* USERS */

const users = [

{

id:1,

nome:"Amanda",
idade:24,

cidade:"Rio de Janeiro",

distancia:"3 km",

bio:"Apaixonada por viagens, vinho e conexões reais.",

foto:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200",

tags:["Viagens","Vinho","Música"]

},

{

id:2,

nome:"Beatriz",
idade:26,

cidade:"São Paulo",

distancia:"6 km",

bio:"Fotógrafa, intensa e amante de cafés escondidos.",

foto:"https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?q=80&w=1200",

tags:["Fotografia","Café","Arte"]

},

{

id:3,

nome:"Larissa",
idade:23,

cidade:"Florianópolis",

distancia:"2 km",

bio:"Surfista, fitness e apaixonada por adrenalina.",

foto:"https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200",

tags:["Praia","Surf","Academia"]

}

];

/* APP */

const cards =
document.getElementById("cards");

let current = 0;

/* CREATE */

function renderCard(){

cards.innerHTML = "";

if(current >= users.length){

current = 0;

}

const user = users[current];

const card =
document.createElement("div");

card.className = "card";

card.innerHTML = `

<img src="${user.foto}">

<div class="info">

<div class="top-info">

<div class="name">
${user.nome}, ${user.idade}
</div>

<div class="verified">
<i class="fa-solid fa-circle-check"></i>
</div>

</div>

<div class="distance">
📍 ${user.cidade} • ${user.distancia}
</div>

<div class="bio">
${user.bio}
</div>

<div class="tags">

${user.tags.map(tag=>`

<div class="tag">
${tag}
</div>

`).join("")}

</div>

</div>

`;

cards.appendChild(card);

drag(card);

}

/* LIKE */

window.like = async function(){

showMatch();

const user = users[current];

try{

await addDoc(collection(db,"likes"),{

perfil:user.nome,
idade:user.idade,
foto:user.foto,
timestamp:serverTimestamp()

});

}catch(e){

console.log(e);

}

next();

}

/* DISLIKE */

window.dislike = function(){

next();

}

/* NEXT */

function next(){

current++;

renderCard();

}

/* EFFECT */

function showMatch(){

const match =
document.getElementById("match");

match.classList.add("showMatch");

setTimeout(()=>{

match.classList.remove("showMatch");

},800);

}

/* DRAG */

function drag(card){

let startX = 0;
let currentX = 0;
let dragging = false;

card.addEventListener("mousedown",start);
card.addEventListener("touchstart",start);

function start(e){

dragging = true;

startX =
e.type.includes("mouse")
? e.clientX
: e.touches[0].clientX;

document.addEventListener("mousemove",move);
document.addEventListener("touchmove",move);

document.addEventListener("mouseup",end);
document.addEventListener("touchend",end);

}

function move(e){

if(!dragging) return;

currentX =
e.type.includes("mouse")
? e.clientX
: e.touches[0].clientX;

const diff =
currentX - startX;

card.style.transform =
`translateX(${diff}px)
rotate(${diff/10}deg)`;

}

function end(){

dragging = false;

const diff =
currentX - startX;

if(diff > 120){

like();

}

else if(diff < -120){

dislike();

}

else{

card.style.transform = "";

}

}

}

/* START */

renderCard();

</script>

</body>

</html>
