<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Laço 💘</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#060606;
overflow:hidden;
color:white;

}

/* FUNDO PREMIUM */

.bg{

position:fixed;
width:100%;
height:100%;

background:
radial-gradient(circle at top,#ff006655,transparent 30%),
radial-gradient(circle at bottom,#ff4d6d22,transparent 30%),
#060606;

z-index:-3;

}

/* PARTÍCULAS */

.particles{

position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:-2;

}

.particles span{

position:absolute;
display:block;

width:4px;
height:4px;

background:#ff4d6d;

border-radius:50%;

animation:float 10s linear infinite;

opacity:.3;

}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

50%{
opacity:.4;
}

100%{
transform:translateY(-100vh);
opacity:0;
}

}

/* APP */

.app{

max-width:430px;
height:100vh;

margin:auto;

position:relative;

overflow:hidden;

}

/* HEADER */

.header{

padding:20px;

display:flex;

justify-content:space-between;

align-items:center;

backdrop-filter:blur(20px);

background:rgba(255,255,255,.03);

border-bottom:1px solid rgba(255,255,255,.05);

}

.logo{

font-size:28px;
font-weight:700;

background:linear-gradient(45deg,#ff0066,#ff4d6d);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.top-icons{

display:flex;
gap:12px;

}

.top-btn{

width:42px;
height:42px;

border-radius:15px;

background:rgba(255,255,255,.05);

display:flex;
justify-content:center;
align-items:center;

font-size:18px;

backdrop-filter:blur(10px);

}

/* CARD */

.card-area{

display:flex;
justify-content:center;
align-items:center;

height:calc(100vh - 180px);

padding:20px;

}

.card{

position:relative;

width:100%;
height:100%;

max-height:650px;

border-radius:35px;

overflow:hidden;

background:#111;

box-shadow:
0 0 50px rgba(255,0,102,.15);

animation:fade .6s ease;

}

@keyframes fade{

from{
opacity:0;
transform:scale(.9);
}

to{
opacity:1;
transform:scale(1);
}

}

.card img{

width:100%;
height:100%;
object-fit:cover;

}

/* OVERLAY */

.overlay{

position:absolute;

bottom:0;

width:100%;

padding:30px;

background:linear-gradient(
transparent,
rgba(0,0,0,.95)
);

}

/* INFO */

.nome{

font-size:34px;
font-weight:700;

}

.bio{

margin-top:10px;

opacity:.8;

line-height:1.5;

}

/* TAGS */

.tags{

display:flex;
gap:10px;

margin-top:15px;

flex-wrap:wrap;

}

.tag{

padding:8px 14px;

border-radius:20px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(10px);

font-size:13px;

}

/* ACTIONS */

.actions{

position:absolute;

bottom:120px;

width:100%;

display:flex;

justify-content:center;

gap:20px;

}

.action{

width:70px;
height:70px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:30px;

backdrop-filter:blur(20px);

cursor:pointer;

transition:.3s;

}

.action:hover{

transform:scale(1.1);

}

.nope{

background:rgba(255,255,255,.08);

}

.like{

background:linear-gradient(45deg,#ff0066,#ff4d6d);

box-shadow:
0 0 30px rgba(255,0,102,.5);

}

/* MENU */

.menu{

position:absolute;

bottom:20px;

left:50%;

transform:translateX(-50%);

width:92%;

height:75px;

border-radius:30px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

display:flex;

justify-content:space-around;

align-items:center;

border:1px solid rgba(255,255,255,.05);

}

.menu-btn{

display:flex;
flex-direction:column;

align-items:center;

gap:5px;

font-size:12px;

opacity:.7;

transition:.3s;

cursor:pointer;

}

.menu-btn:hover{

opacity:1;
transform:translateY(-3px);

}

.icon{

font-size:24px;

}

.active{

opacity:1;

}

/* MOBILE */

@media(max-width:500px){

.card-area{

padding:12px;

}

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="particles">

<span style="left:10%;animation-delay:0s"></span>
<span style="left:20%;animation-delay:2s"></span>
<span style="left:35%;animation-delay:4s"></span>
<span style="left:50%;animation-delay:1s"></span>
<span style="left:70%;animation-delay:3s"></span>
<span style="left:85%;animation-delay:5s"></span>

</div>

<div class="app">

<!-- HEADER -->

<div class="header">

<div class="logo">
Laço 💘
</div>

<div class="top-icons">

<div class="top-btn">
🔍
</div>

<div class="top-btn">
🔔
</div>

</div>

</div>

<!-- CARD -->

<div class="card-area">

<div class="card">

<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop">

<div class="overlay">

<div class="nome">
Amanda, 24
</div>

<div class="bio">

✨ Apaixonada por viagens,
música e pessoas intensas.

📍 3km de você

</div>

<div class="tags">

<div class="tag">
🍷 Vinho
</div>

<div class="tag">
🎵 Música
</div>

<div class="tag">
✈️ Viagens
</div>

</div>

</div>

</div>

</div>

<!-- ACTIONS -->

<div class="actions">

<div class="action nope">
❌
</div>

<div class="action like">
💘
</div>

</div>

<!-- MENU -->

<div class="menu">

<div class="menu-btn active">
<div class="icon">🏠</div>
<span>Início</span>
</div>

<div class="menu-btn">
<div class="icon">🔥</div>
<span>Likes</span>
</div>

<div class="menu-btn">
<div class="icon">💬</div>
<span>Chat</span>
</div>

<div class="menu-btn">
<div class="icon">📍</div>
<span>Vibe</span>
</div>

<div class="menu-btn">
<div class="icon">👤</div>
<span>Perfil</span>
</div>

</div>

</div>

</body>
</html>
