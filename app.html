<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Laço 💘</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff4d6d, #6a00f4);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* CONTAINER */
#app {
  width: 100%;
  max-width: 350px;
  height: 600px;
  position: relative;
}

/* CARD */
.card {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 25px;
  overflow: hidden;
  background: #000;
  box-shadow: 0 25px 50px rgba(0,0,0,0.4);
  cursor: grab;
  transition: transform 0.3s ease;
}

/* IMAGEM CORRIGIDA */
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* GRADIENTE */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40%;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
}

/* INFO */
.info {
  position: absolute;
  bottom: 20px;
  left: 20px;
  color: white;
}

.info h2 {
  margin: 0;
  font-size: 26px;
}

.info p {
  margin: 5px 0 0;
}

/* BADGES */
.badge {
  position: absolute;
  top: 20px;
  padding: 10px 20px;
  border: 3px solid;
  font-size: 22px;
  font-weight: bold;
  opacity: 0;
}

.like {
  left: 20px;
  color: #00ff88;
  border-color: #00ff88;
}

.nope {
  right: 20px;
  color: #ff4d4d;
  border-color: #ff4d4d;
}
</style>

</head>

<body>

<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, arrayUnion } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",
  authDomain: "lacoapp.firebaseapp.com",
  projectId: "lacoapp"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const container = document.getElementById("app");

let usuarios = [];
let index = 0;
let usuarioId = null;

async function carregarUsuarios() {
  const snap = await getDocs(collection(db, "usuarios"));
  usuarios = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  criarCard();
}

function criarCard() {
  if (index >= usuarios.length) return;

  const user = usuarios[index];

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div class="badge like">LIKE</div>
    <div class="badge nope">NOPE</div>

    <img src="${user.foto || 'https://via.placeholder.com/300'}">

    <div class="overlay"></div>

    <div class="info">
      <h2>${user.nome}, ${user.idade}</h2>
    </div>
  `;

  container.appendChild(card);

  let startX = 0;

  card.addEventListener("mousedown", (e) => {
    startX = e.clientX;

    document.onmousemove = (e) => {
      let moveX = e.clientX - startX;
      card.style.transform = `translateX(${moveX}px) rotate(${moveX/15}deg)`;

      if (moveX > 80) {
        card.querySelector(".like").style.opacity = 1;
      } else {
        card.querySelector(".like").style.opacity = 0;
      }

      if (moveX < -80) {
        card.querySelector(".nope").style.opacity = 1;
      } else {
        card.querySelector(".nope").style.opacity = 0;
      }
    };

    document.onmouseup = async (e) => {
      let moveX = e.clientX - startX;

      if (moveX > 120) {
        // LIKE
        await updateDoc(doc(db, "usuarios", usuarioId), {
          likes: arrayUnion(user.id)
        });

        card.style.transform = "translateX(1000px)";
      } else if (moveX < -120) {
        card.style.transform = "translateX(-1000px)";
      } else {
        card.style.transform = "";
      }

      document.onmousemove = null;
      document.onmouseup = null;

      setTimeout(() => {
        card.remove();
        index++;
        criarCard();
      }, 300);
    };
  });
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    usuarioId = user.uid;
    carregarUsuarios();
  } else {
    window.location.href = "login.html";
  }
});
</script>

</body>
</html>
