<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vibe Local • Laço 💘</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
color:white;
font-family:Segoe UI;
overflow:hidden;
}

/* FUNDO MAPA FAKE */

.mapa{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, rgba(255,0,90,.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,150,255,.15), transparent 40%),
#000;
filter:blur(2px);
}

/* TOPO */

.topo{
position:absolute;
top:0;
width:100%;
padding:20px;
display:flex;
justify-content:space-between;
z-index:2;
}

.logo{
font-size:24px;
color:#ff2d75;
}

.voltar{
background:#111;
padding:8px 14px;
border-radius:20px;
color:white;
text-decoration:none;
}

/* LOCAIS */

.lista{
position:absolute;
bottom:0;
width:100%;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
z-index:2;
}

/* CARD */

.card{
background:#090909;
border:1px solid #1d1d1d;
border-radius:20px;
padding:15px;
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:scale(1.02);
border-color:#ff2d75;
}

.nome{
font-size:20px;
font-weight:bold;
}

.desc{
opacity:.8;
margin-top:5px;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:none;
flex-direction:column;
z-index:3;
}

.topo2{
padding:20px;
display:flex;
justify-content:space-between;
}

.pessoas{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

/* USER */

.user{
display:flex;
gap:12px;
align-items:center;
background:#111;
padding:10px;
border-radius:15px;
cursor:pointer;
}

.user img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}

/* BOTÃO */

.btn{
margin:15px;
padding:15px;
border:none;
border-radius:30px;
background:#ff2d75;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="mapa"></div>

<div class="topo">
<div class="logo">Vibe 🔥</div>
<a href="app.html" class="voltar">Voltar</a>
</div>

<div class="lista" id="lista"></div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="topo2">
<div id="titulo"></div>
<button onclick="fechar()">X</button>
</div>

<div class="pessoas" id="pessoas"></div>

<button class="btn" onclick="entrar()">
Entrar no rolê 🔥
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getFirestore,collection,getDocs,doc,getDoc,updateDoc,arrayUnion
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
getAuth,onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBJM2Oo0tR4CT1vDoeXcNhqw2tIpj1VXnw",
authDomain: "lacoapp.firebaseapp.com",
projectId: "lacoapp"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const lista = document.getElementById("lista");
const modal = document.getElementById("modal");
const pessoasDiv = document.getElementById("pessoas");
const titulo = document.getElementById("titulo");

let atual = null;
let meuId = null;

/* LOCAIS */

const locais = [
{id:"bar", nome:"Bar do Centro 🍻", desc:"Hoje • 22:00"},
{id:"balada", nome:"Balada Neon 💃", desc:"Hoje • 23:30"},
{id:"estadio", nome:"Estádio 🏟️", desc:"Jogo hoje • 21:00"}
];

/* LOGIN */

onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location.href="login.html";
return;
}

meuId = user.uid;

render();

});

/* RENDER */

function render(){

locais.forEach(l=>{

lista.innerHTML += `
<div class="card" onclick="abrir('${l.id}','${l.nome}')">
<div class="nome">${l.nome}</div>
<div class="desc">${l.desc}</div>
</div>
`;

});

}

/* ABRIR */

window.abrir = async function(id,nome){

atual = id;
titulo.innerText = nome;

modal.style.display="flex";
pessoasDiv.innerHTML="Carregando...";

const snap = await getDocs(collection(db,"usuarios"));

pessoasDiv.innerHTML="";

snap.forEach(docu=>{

const u = docu.data();

if(u.locais && u.locais.includes(id)){

pessoasDiv.innerHTML += `
<div class="user" onclick="chat('${docu.id}')">
<img src="${u.foto}">
<div>${u.nome}</div>
</div>
`;

}

});

};

/* FECHAR */

window.fechar = function(){
modal.style.display="none";
};

/* ENTRAR */

window.entrar = async function(){

await updateDoc(doc(db,"usuarios",meuId),{
locais:arrayUnion(atual)
});

alert("Você entrou 🔥");

};

/* CHAT */

window.chat = function(id){
window.location.href = "bate-papo.html?id="+id;
};

</script>

</body>
</html>
